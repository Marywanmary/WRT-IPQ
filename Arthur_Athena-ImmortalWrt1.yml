name: Arthur_Athena-ImmWrt

on:
  # 手动触发
  workflow_dispatch:
  # 定时触发：北京时间周五0点 = UTC周四16点
  schedule:
    - cron: '0 16 * * 4'
  # 清理后触发
  workflow_run:
    workflows: ["All-Clean"]
    types:
      - completed

env:
  REPO_URL: https://github.com/laipeng668/immortalwrt.git
  REPO_BRANCH: master
  #GENERAL_CONFIG_FILE: configs/General.config
  DIY_SCRIPT: scripts/Roc-script.sh
  CLASH_KERNEL: amd64
  MADS: true
  UPLOAD_BIN_DIR: false
  FIRMWARE_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  Build-Matrix:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - config: Athena_Full
          - config: Athena_Lite
          - config: Arthur_Full
          - config: Arthur_Lite
      max-parallel: 2
      fail-fast: false

    steps:
    - name: Check Server Performance（检查服务器性能）
      run: |
        echo "警告⚠"
        echo "分配的服务器性能有限，若选择的插件过多，务必注意CPU性能！"
        echo -e "⚡已知CPU型号（降序）：7763，8370C，8272CL，8171M，E5-2673 \n"
        echo "--------------------------CPU信息--------------------------"
        echo "⚡CPU物理数量：$(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
        echo -e "⚡CPU核心信息：$(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c) \n"
        echo "--------------------------内存信息--------------------------"
        echo "📦已安装内存详细信息："
        echo -e "$(sudo lshw -short -C memory | grep GiB) \n"
        echo "--------------------------硬盘信息--------------------------"
        echo "💾硬盘数量：$(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT

    - name: Maximize Available Disk Space（最大化预留磁盘空间）
      if: env.MADS == 'true'
      uses: AdityaGarg8/remove-unwanted-software@master
      with:
        remove-dotnet: "true"
        remove-android: "true"
        remove-haskell: "true"
        remove-codeql: "true"
        remove-docker-images: "true"
        remove-large-packages: "true"
        remove-cached-tools: "true"
        remove-swapfile: "true"

    - name: Initialization Environment（初始化环境）
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -y update
        sudo -E apt-get -y install $(curl -fsSL is.gd/depends_ubuntu_2204)
        sudo -E systemctl daemon-reload
        sudo -E apt-get -y autoremove --purge
        sudo -E apt-get -y clean
        sudo timedatectl set-timezone "$TZ"

    - name: Checkout（检出代码）
      uses: actions/checkout@main

    - name: Clone Source Code（克隆源代码）
      run: |
        df -hT $GITHUB_WORKSPACE
        sudo mkdir -p /mnt/openwrt
        sudo chown -R $(id -u):$(id -g) /mnt/openwrt
        git clone --depth 1 -b $REPO_BRANCH --single-branch $REPO_URL /mnt/openwrt
        cd /mnt/openwrt
        echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV
        VERSION_INFO=$(git show -s --date=short --format="Author: %an<br/>Time: %cd<br/>Content: %s<br/>Hash: %H")
        echo "VERSION_INFO=$VERSION_INFO" >> $GITHUB_ENV
        VERSION_KERNEL=$(grep -oP 'LINUX_KERNEL_HASH-\K[0-9]+\.[0-9]+\.[0-9]+' target/linux/generic/kernel-6.12 2>/dev/null || echo "unknown")
        echo "VERSION_KERNEL=$VERSION_KERNEL" >> $GITHUB_ENV

    - name: Generate Variables（生成变量）
      run: |
        CONFIG_FILE="configs/${{ matrix.config }}.config"
        if [ ! -f "$CONFIG_FILE" ]; then
          echo "Configuration file $CONFIG_FILE not found!"
          exit 1
        fi
        cp $CONFIG_FILE $OPENWRT_PATH/.config
        cd $OPENWRT_PATH
        make defconfig > /dev/null 2>&1
        SOURCE_REPO="$(echo $REPO_URL | awk -F '/' '{print $(NF)}')"
        echo "SOURCE_REPO=$SOURCE_REPO" >> $GITHUB_ENV
        DEVICE_TARGET=$(cat .config | grep CONFIG_TARGET_BOARD | awk -F '"' '{print $2}')
        echo "DEVICE_TARGET=$DEVICE_TARGET" >> $GITHUB_ENV
        DEVICE_SUBTARGET=$(cat .config | grep CONFIG_TARGET_SUBTARGET | awk -F '"' '{print $2}')
        echo "DEVICE_SUBTARGET=$DEVICE_SUBTARGET" >> $GITHUB_ENV
        echo "HASH=$(git log -1 --pretty=format:'%h')" >> $GITHUB_ENV
        echo "CACHE_DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV
        echo "FIRMWARE_TAG=${{ matrix.config }}" >> $GITHUB_ENV

    - name: Cache Toolchain（缓存工具链）
      uses: actions/cache@main
      with:
        key: toolchain-${{ env.SOURCE_REPO }}-${{ env.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-${{ env.HASH }}-${{ matrix.config }}
        restore-keys: |
          toolchain-${{ env.SOURCE_REPO }}-${{ env.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-${{ matrix.config }}-
        path: |
          ${{ env.OPENWRT_PATH }}/.ccache
          ${{ env.OPENWRT_PATH }}/staging_dir

    - name: Restore DL Cache（恢复DL缓存）
      uses: actions/cache@main
      with:
        path: /mnt/openwrt/dl-${{ matrix.config }}.tar.zst
        key: dl-${{ matrix.config }}-${{ hashFiles(format('configs/{0}.config', matrix.config)) }}
        restore-keys: |
          dl-${{ matrix.config }}-

    - name: Setup DL Directory（设置DL目录）
      run: |
        cd /mnt/openwrt
        if [ -f "dl-${{ matrix.config }}.tar.zst" ]; then
          tar --zstd -xf dl-${{ matrix.config }}.tar.zst
        else
          mkdir -p dl
        fi

    - name: Restore Feeds Cache（恢复Feeds缓存）
      uses: actions/cache@main
      with:
        path: /mnt/openwrt/feeds-${{ matrix.config }}.tar.zst
        key: feeds-${{ matrix.config }}-${{ hashFiles(format('configs/{0}.config', matrix.config)) }}
        restore-keys: |
          feeds-${{ matrix.config }}-

    - name: Setup Feeds Directory（设置Feeds目录）
      run: |
        cd /mnt/openwrt
        if [ -f "feeds-${{ matrix.config }}.tar.zst" ]; then
          tar --zstd -xf feeds-${{ matrix.config }}.tar.zst
        else
          mkdir -p feeds
        fi

    - name: Refresh The Cache（刷新缓存）
      run: |
        if [ -d "$OPENWRT_PATH/staging_dir" ]; then
          find "$OPENWRT_PATH/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r dir; do
              find "$dir" -type f -exec touch {} +
          done
        fi

    - name: Install Feeds（安装feeds）
      run: |
        cd $OPENWRT_PATH
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load Custom Configuration（加载自定义配置）
      run: |
        CONFIG_FILE="configs/${{ matrix.config }}.config"
        if [ -f "$CONFIG_FILE" ]; then
          cat $CONFIG_FILE > $OPENWRT_PATH/.config
        else
          echo "Configuration file $CONFIG_FILE not found!"
          exit 1
        fi
        if [ -f "$DIY_SCRIPT" ]; then
          chmod +x $DIY_SCRIPT
          cd $OPENWRT_PATH
          $GITHUB_WORKSPACE/$DIY_SCRIPT
        else
          echo "DIY script $DIY_SCRIPT not found, skipping..."
        fi

    - name: Download DL Package（下载DL软件包）
      run: |
        cd $OPENWRT_PATH
        make defconfig
        make download -j$(nproc)
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile Firmware with Monitoring（编译固件并监控）
      id: compile
      timeout-minutes: 180
      run: |
        cd $OPENWRT_PATH
        echo -e "$(nproc) thread compile"
        echo "## Compilation Log - ${{ matrix.config }}" > build.log
        echo "Start compilation time: $(date)" >> build.log
        echo "========================" >> build.log
        (
          if ! make -j$(nproc); then
            echo "Parallel compilation failed, trying single thread..."
            if ! make -j1; then
              echo "Single thread compilation failed, trying with verbose output..."
              make -j1 V=s
            fi
          fi
        ) 2>&1 | tee -a build.log &
        BUILD_PID=$!
        echo "编译进程 PID: $BUILD_PID"
        while kill -0 $BUILD_PID 2>/dev/null; do
          sleep 900
          echo "====================== 编译期间系统占用监控 ======================"
          echo "🕒 监控时间: $(date)"
          echo "💾 磁盘使用情况:"
          df -hT | grep -E '^(Filesystem|/dev/)'
          echo "📦 内存使用情况:"
          free -h
          echo "⚡ CPU 负载:"
          uptime
          echo "=========================================================="
          {
            echo "## 🔄 编译期间系统占用监控 （频率 15分钟）"
            echo "- 🕐 当前时间: $(date)"
            echo "- 💾 磁盘使用率: $(df -h / | tail -1 | awk '{print $5}')"
            echo "- 📦 内存使用率: $(free | grep Mem | awk '{printf("%.1f%%", $3/$2 * 100.0)}')"
            echo ""
          } >> $GITHUB_STEP_SUMMARY
          sync
        done
        wait $BUILD_PID
        BUILD_RESULT=$?
        echo "编译结束时间: $(date)" >> build.log
        echo "编译结果: $BUILD_RESULT" >> build.log
        if [ $BUILD_RESULT -ne 0 ]; then
          echo "status=failed" >> $GITHUB_OUTPUT
          echo "Compilation failed for ${{ matrix.config }}" >> $GITHUB_STEP_SUMMARY
          exit 1
        else
          echo "status=success" >> $GITHUB_OUTPUT
          echo "DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV
          echo "FILE_DATE=$(date +"%Y.%m.%d")" >> $GITHUB_ENV
        fi

    - name: Check Space Usage（检查空间使用情况）
      if: (!cancelled())
      run: df -hT

    - name: Organize Files（整理文件）
      if: steps.compile.outputs.status == 'success'
      run: |
        cd $OPENWRT_PATH/bin/targets/*/*
        cp $OPENWRT_PATH/.config ${{ matrix.config }}.config
        if [ -f "config.buildinfo" ]; then
          mv config.buildinfo ${{ matrix.config }}.config.buildinfo
        fi
        if [ -f "immortalwrt-qualcommax-ipq60xx.manifest" ]; then
          mv immortalwrt-qualcommax-ipq60xx.manifest immortalwrt-qualcommax-ipq60xx-${{ matrix.config }}.manifest
        fi
        if [ -d "$OPENWRT_PATH/bin/packages" ]; then
          mkdir -p packages
          mv -f $OPENWRT_PATH/bin/packages/*/*/*.ipk packages 2>/dev/null || echo "No IPK files found"
          tar -zcf ${{ matrix.config }}.Packages.tar.gz packages
          rm -rf packages
        fi
        cp $OPENWRT_PATH/build.log ./build-${{ matrix.config }}.log
        rm -f feeds.buildinfo version.buildinfo sha256sums profiles.json 2>/dev/null || true
        echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV

    - name: Clean Intermediate Files（清理中间文件）
      if: steps.compile.outputs.status == 'success'
      run: |
        cd $OPENWRT_PATH
        make clean
        rm -rf build_dir/*/tmp/
        rm -rf staging_dir
        echo "Intermediate files cleaned."

    - name: Save DL Cache（保存DL缓存）
      if: success()
      run: |
        cd /mnt/openwrt
        tar --zstd -cf dl-${{ matrix.config }}.tar.zst dl
        rm -rf dl

    - name: Save Feeds Cache（保存Feeds缓存）
      if: success()
      run: |
        cd /mnt/openwrt
        find feeds -name ".git" -type d -exec rm -rf {} + 2>/dev/null || true
        tar --zstd -cf feeds-${{ matrix.config }}.tar.zst feeds
        rm -rf feeds

    - name: Save Build Cache（保存Build缓存）
      if: success()
      run: |
        cd /mnt/openwrt
        tar --zstd -cf build-${{ matrix.config }}.tar.zst build_dir
        rm -rf build_dir

    - name: Save Packages Cache（保存Packages缓存）
      if: success()
      run: |
        cd /mnt/openwrt
        if [ -d "bin/packages" ]; then
          tar --zstd -cf packages-${{ matrix.config }}.tar.zst bin/packages
        fi

    - name: Upload Firmware To Release # 发布固件
      if: steps.compile.outputs.status == 'success' && env.FIRMWARE_RELEASE == 'true'
      uses: ncipollo/release-action@main
      with:
        name: ${{ env.DATE }} for ${{ matrix.config }}
        allowUpdates: true
        tag: ${{ matrix.config }}
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: ${{ env.FIRMWARE_PATH }}/*
        body: |
          **This is OpenWrt Firmware for ${{ matrix.config }}**
          ### 📒 固件信息
          - 这是开启全功能NSS的6.12内核固件，默认主题为Argon；该固件在ImmortalWrt的基础上，添加了额外的软件包，并添加了若干工具，具体详见对应机型的config。
          - 💻 这是 ${{ matrix.config }} 平台使用的 OpenWrt 固件
          - ⚽ 固件源码: ${{ env.REPO_URL }}
          - 💝 源码分支: ${{ env.REPO_BRANCH }}
          - 🌐 默认地址: **192.168.111.1**
          - 🔑 默认密码: none
          - 🚀 WiFi名称: **Star**
          - 🔑 WiFi密码: 12345678
          ### 🧊 固件版本
          - 固件内核版本：**${{ env.VERSION_KERNEL }}**
          - 固件编译前最后一次➦[主源码](${{ env.REPO_URL }})更新记录
          - ${{ env.VERSION_INFO }}

    - name: Delete Old Cache（删除旧缓存）
      if: steps.compile.outputs.status == 'success'
      run: |
        gh cache list --key toolchain-${{ env.SOURCE_REPO }}-${{ env.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-${{ matrix.config }}- --json key --jq '.[] | .key' 2>/dev/null | while read -r key; do
          gh cache delete "$key" 2>/dev/null || echo "Failed to delete cache: $key"
        done
        echo "========cache status========"
        if [ -d "$OPENWRT_PATH/.ccache" ]; then
          echo "ccache: $(du -sh $OPENWRT_PATH/.ccache 2>/dev/null | cut -f 1)"
        fi
        if [ -d "$OPENWRT_PATH/staging_dir" ]; then
          echo "staging: $(du -sh $OPENWRT_PATH/staging_dir 2>/dev/null | cut -f 1)"
        fi
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  Handle-Errors:
    needs: Build-Matrix
    if: failure()
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code（检出代码）
        uses: actions/checkout@main

      - name: Create Error Report（创建错误报告）
        run: |
          echo "## Compilation Error Report" > error_report.md
          echo "### Summary" >> error_report.md
          echo "- Error time: $(date)" >> error_report.md
          echo "- Runner: ${{ runner.os }}" >> error_report.md
          echo "### System Status" >> error_report.md
          echo "\`\`\`" >> error_report.md
          df -h >> error_report.md
          free -h >> error_report.md
          echo "\`\`\`" >> error_report.md
          echo "Please check the build logs for details and make necessary adjustments." >> error_report.md

      - name: Collect Failed Build Logs（收集失败的编译日志）
        run: |
          mkdir -p error_logs
          cd error_logs
          for config in Athena_Full Arthur_Full Arthur_Lite Athena_Lite; do
            if [ -f "/mnt/openwrt/build.log" ]; then
              cp /mnt/openwrt/build.log ./error-build-${config}.log
              echo "Collected log for $config from /mnt/openwrt"
            elif [ -f "${{ github.workspace }}/build.log" ]; then
              cp ${{ github.workspace }}/build.log ./error-build-${config}.log
              echo "Collected log for $config from workspace"
            else
              echo "No build log found for $config"
              echo "No log available for $config - compilation may have failed before log creation" > ./error-build-${config}.log
            fi
          done
          echo "=== Collected Logs ==="
          ls -la *.log 2>/dev/null || echo "No build logs found"
          echo "======================"

      - name: Upload Error Report to Release（上传错误报告到Release）
        uses: ncipollo/release-action@main
        with:
          name: "Compilation Error Report - $(date +%Y-%m-%d)"
          allowUpdates: true
          tag: "compilation-error"
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: |
            error_report.md
            error_logs/*.log
          body: |
            ## Compilation Error Report
            One or more firmware configurations failed to compile.
            Please check the build logs and make necessary adjustments.
            
            ### Error Details
            - Error time: $(date)
            - Affected configurations: Arthur_Full, Arthur_Lite, Athena_Full, Athena_Lite

      - name: Upload Error Logs to Artifacts（上传错误日志到Artifacts）
        uses: actions/upload-artifact@main
        with:
          name: error-logs
          path: |
            error_logs/*.log
            error_report.md
