name: AA.Copilot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * 4'

env:
  FIRMWARE_TAG: "ipq60xx.Copilot"

jobs:
  build:
    name: Build ${{ matrix.repo.repo_short }}:${{ matrix.repo.repo_branch }} - ${{ matrix.config_type }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo:
          - repo_short: "ImmWrt"
            repo_url: "https://github.com/laipeng668/immortalwrt.git"
            repo_branch: "master"
          - repo_short: "OpenWrt"
            repo_url: "https://github.com/laipeng668/openwrt.git"
            repo_branch: "master"
          - repo_short: "LibWrt"
            repo_url: "https://github.com/laipeng668/openwrt-6.x.git"
            repo_branch: "k6.12-nss"
        config_type: [ "Pro", "Max", "Ultra" ]
      fail-fast: false

    env:
      REPO_SHORT: ${{ matrix.repo.repo_short }}
      REPO_URL: ${{ matrix.repo.repo_url }}
      REPO_BRANCH: ${{ matrix.repo.repo_branch }}
      CONFIG_TYPE: ${{ matrix.config_type }}
      OPENWRT_PATH: ${{ github.workspace }}/openwrt
      WORKSPACE: ${{ github.workspace }}

    steps:
      - name: Checkout workflow repo (contains configs)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Clone target OpenWrt repo
        run: |
          rm -rf "${OPENWRT_PATH}"
          git clone --depth=1 "${REPO_URL}" -b "${REPO_BRANCH}" "${OPENWRT_PATH}"
        shell: bash

      - name: Show selected repo and config
        run: |
          echo "REPO_SHORT=${REPO_SHORT}"
          echo "REPO_URL=${REPO_URL}"
          echo "REPO_BRANCH=${REPO_BRANCH}"
          echo "CONFIG_TYPE=${CONFIG_TYPE}"
          echo "OPENWRT_PATH=${OPENWRT_PATH}"
        shell: bash

      - name: Prepare .config (merge if LibWrt)
        run: |
          CONFIG_SRC="${WORKSPACE}/configs/ipq60xx_${CONFIG_TYPE}.config"
          LIB_CONFIG="${WORKSPACE}/configs/LibWrt.config"
          TARGET_CONFIG="${OPENWRT_PATH}/.config"
          echo "Using base config: ${CONFIG_SRC}"
          if [ "${REPO_SHORT}" = "LibWrt" ]; then
            echo "Merging ${CONFIG_SRC} + ${LIB_CONFIG} -> ${TARGET_CONFIG}"
            cat "${CONFIG_SRC}" > "${TARGET_CONFIG}"
            echo "" >> "${TARGET_CONFIG}"
            cat "${LIB_CONFIG}" >> "${TARGET_CONFIG}"
            echo "Merged config list (unique non-comment lines):"
            grep -v '^#' "${TARGET_CONFIG}" | sed '/^\s*$/d' | sort -u || true
            echo "Merged .config (first 200 lines):"
            sed -n '1,200p' "${TARGET_CONFIG}" || true
          else
            echo "Copying ${CONFIG_SRC} -> ${TARGET_CONFIG}"
            cp "${CONFIG_SRC}" "${TARGET_CONFIG}" || true
            echo "Config contents (first 200 lines):"
            sed -n '1,200p' "${TARGET_CONFIG}" || true
          fi
        shell: bash

      - name: Update feeds and prepare build
        run: |
          set -e
          cd "${OPENWRT_PATH}"
          if [ -f scripts/feeds ]; then
            scripts/feeds update -a || true
            scripts/feeds install -a || true
          fi
        shell: bash

      - name: Build OpenWrt
        run: |
          set -e
          cd "${OPENWRT_PATH}"
          if [ -f .config ]; then
            make defconfig || true
          fi
          make -j$(nproc) || true
        shell: bash

      - name: Generate oplist.txt (list of files and directories under OPENWRT_PATH)
        run: |
          ls -laR "${OPENWRT_PATH}" > "${WORKSPACE}/oplist.txt" || true
          echo "===== oplist.txt (first 200 lines) ====="
          sed -n '1,200p' "${WORKSPACE}/oplist.txt" || true
        shell: bash

      - name: Rename/move .config to REPO_SHORT_CONFIG_TYPE.config and show it
        run: |
          SRC="${OPENWRT_PATH}/.config"
          DST="${OPENWRT_PATH}/${REPO_SHORT}_${CONFIG_TYPE}.config"
          echo "Renaming ${SRC} -> ${DST}"
          mv "${SRC}" "${DST}" || true
          echo "Resulting config file path:"
          ls -l "${DST}" || true
          echo "Contents (first 200 lines):"
          sed -n '1,200p' "${DST}" || true
        shell: bash

      - name: Rename config.buildinfo to REPO_SHORT_CONFIGTYPE.buildinfo
        run: |
          SRC="${OPENWRT_PATH}/config.buildinfo"
          DST="${OPENWRT_PATH}/${REPO_SHORT}_${CONFIG_TYPE}.buildinfo"
          echo "Renaming ${SRC} -> ${DST}"
          mv "${SRC}" "${DST}" || true
          echo "Result:"
          ls -l "${DST}" || true
        shell: bash

      - name: Package ipk/apk files into ipq60xx.Packages.tar.gz
        run: |
          PKG_DIR="${WORKSPACE}/_packages_for_archive"
          mkdir -p "${PKG_DIR}"
          find "${OPENWRT_PATH}" -type f \( -name '*.ipk' -o -name '*.apk' \) -print0 | while IFS= read -r -d '' f; do
            dest="${PKG_DIR}/$(dirname "${f#"${OPENWRT_PATH}/"}")"
            mkdir -p "${dest}"
            cp -a "${f}" "${dest}/" || true
          done
          TAR="${WORKSPACE}/ipq60xx.Packages.tar.gz"
          if [ -d "${PKG_DIR}" ] && [ "$(ls -A "${PKG_DIR}")" ]; then
            tar -C "${PKG_DIR}" -czf "${TAR}" . || true
            echo "Created ${TAR}"
            ls -l "${TAR}" || true
          else
            echo "No .ipk or .apk files found; creating empty tar as placeholder"
            tar -czf "${TAR}" --files-from /dev/null || true
            ls -l "${TAR}" || true
          fi
        shell: bash

      - name: Rename all .bin firmware files by prefixing with REPO_SHORT_CONFIGTYPE
        run: |
          echo "Renaming .bin files under ${OPENWRT_PATH}"
          find "${OPENWRT_PATH}" -type f -name '*.bin' -print0 | while IFS= read -r -d '' file; do
            dir=$(dirname "$file")
            base=$(basename "$file")
            newname="${dir}/${REPO_SHORT}_${CONFIG_TYPE}_${base}"
            echo "mv \"$file\" -> \"$newname\""
            mv "$file" "$newname" || true
          done
          echo "Renamed .bin files:"
          find "${OPENWRT_PATH}" -type f -name "${REPO_SHORT}_${CONFIG_TYPE}_*.bin" -print || true
        shell: bash

      - name: Show files to be uploaded (summary)
        run: |
          echo "oplist.txt:"
          ls -la "${WORKSPACE}/oplist.txt" || true
          echo "Renamed config (in OPENWRT_PATH):"
          ls -la "${OPENWRT_PATH}/${REPO_SHORT}_${CONFIG_TYPE}.config" || true
          echo "Renamed buildinfo (in OPENWRT_PATH):"
          ls -la "${OPENWRT_PATH}/${REPO_SHORT}_${CONFIG_TYPE}.buildinfo" || true
          echo "Packages archive:"
          ls -la "${WORKSPACE}/ipq60xx.Packages.tar.gz" || true
          echo ".bin files:"
          find "${OPENWRT_PATH}" -type f -name "${REPO_SHORT}_${CONFIG_TYPE}_*.bin" -print || true
        shell: bash

      - name: Upload oplist.txt
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.repo.repo_short }}_${{ matrix.config_type }}-oplist"
          path: "${WORKSPACE}/oplist.txt"

      - name: Upload renamed .config
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.repo.repo_short }}_${{ matrix.config_type }}.config"
          path: "${OPENWRT_PATH}/${REPO_SHORT}_${CONFIG_TYPE}.config"

      - name: Upload renamed buildinfo
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.repo.repo_short }}_${{ matrix.config_type }}.buildinfo"
          path: "${OPENWRT_PATH}/${REPO_SHORT}_${CONFIG_TYPE}.buildinfo"

      - name: Upload ipq60xx.Packages.tar.gz
        uses: actions/upload-artifact@v4
        with:
          name: "ipq60xx.Packages.tar.gz.${{ matrix.repo.repo_short }}_${{ matrix.config_type }}"
          path: "${WORKSPACE}/ipq60xx.Packages.tar.gz"

      - name: Upload renamed firmware .bin files (if any)
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.repo.repo_short }}_${{ matrix.config_type }}-firmware-bins"
          path: |
            ${{ github.workspace }}/openwrt/**/${{ matrix.repo.repo_short }}_${{ matrix.config_type }}_*.bin
          if-no-files-found: ignore

      - name: Final artifact list (debug)
        run: |
          echo "Artifacts uploaded for ${REPO_SHORT}_${CONFIG_TYPE}"
          ls -la "${WORKSPACE}" || true
        shell: bash

  publish:
    name: Create single Release and upload all artifacts
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Set DATE for release name (UTC YYYY-MM-DD)
        run: |
          echo "DATE=$(date -u +%F)" >> $GITHUB_ENV
          echo "DATE now set to $(date -u +%F)"
        shell: bash

      - name: Download all artifacts from this workflow run
        uses: actions/download-artifact@v4
        with:
          path: downloaded_artifacts

      - name: Prepare release_assets directory (flatten and collect)
        run: |
          set -e
          ASSET_DIR="${{ github.workspace }}/release_assets"
          rm -rf "${ASSET_DIR}"
          mkdir -p "${ASSET_DIR}"
          # Copy all files found under downloaded_artifacts into release_assets
          # Prefix with artifact directory name to avoid name collisions
          for ART in downloaded_artifacts/*; do
            if [ -d "${ART}" ]; then
              ARTNAME=$(basename "${ART}")
              find "${ART}" -type f -print0 | while IFS= read -r -d '' f; do
                BN=$(basename "${f}")
                # Add artifact folder prefix to filename
                cp -a "${f}" "${ASSET_DIR}/${ARTNAME}_${BN}" || true
              done
            fi
          done
          echo "Files staged to ${ASSET_DIR}:"
          find "${ASSET_DIR}" -type f -print || true
        shell: bash

      - name: Build release body (markdown)
        run: |
          BODY="${{ github.workspace }}/release_body.md"
          cat > "${BODY}" <<'EOF'
          
          **This is OpenWrt Firmware for $FIRMWARE_TAG**
          ### 📒 固件信息
          - 这是开启全功能NSS的6.12内核固件，默认主题为Argon；该固件在ImmortalWrt的基础上，添加了额外的软件包cpufreq、ddns、ttyd、upnp、wolplus、samba4、vlmcsd、aria2、autoreboot、uhttpd、wifischedule、frps、frpc、diskman、hd-idle、banip、acme、arpbind、usb-printer、homeproxy、openlist、adguardhome、oaf、sqm、wireguard、watchcat、3cat（**Taiyi**额外增加了filebrowser、dockerman、gecoosac、lucky），并添加了若干工具，具体详见对应机型的config。
          - 🌐 默认地址: **192.168.2.1**
          - 🔑 默认密码: none
          - 🚀 WiFi名称: **Star**
          - 🔑 WiFi密码: 12345678
          ### 📦 包含的文件（自动列出）
          EOF
          # Append file list
          for f in release_assets/*; do
            echo "- $(basename "${f}")" >> "${BODY}"
          done
          echo ""
          echo "Release body prepared at ${BODY}"
        shell: bash

      - name: Create single GitHub Release and upload assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.FIRMWARE_TAG }}-${{ env.DATE }}
          name: ${{ env.DATE }} for ${{ env.FIRMWARE_TAG }}
          body_path: release_body.md
          files: release_assets/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify release upload results (list release assets via REST)
        run: |
          TAG="${{ env.FIRMWARE_TAG }}-${{ env.DATE }}"
          echo "Listing assets for release tag: ${TAG}"
          curl -s -H "Authorization: token ${GITHUB_TOKEN}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}" | jq -r '.assets[]?.name' || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
