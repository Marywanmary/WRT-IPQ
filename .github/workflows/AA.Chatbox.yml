name: AA.Chatbox

on:
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug mode'
        required: false
        default: 'false'
        type: boolean

env:
  REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest
    
    # 使用run-name而不是name来显示正在编译的具体分支和配置
    run-name: Building: ${{ matrix.REPO_SHORT }} - ${{ matrix.CONFIG_TYPE }}
    
    strategy:
      matrix:
        REPO_SHORT: ['ImmWrt', 'OpenWrt', 'LibWrt']
        CONFIG_TYPE: ['Pro', 'Max', 'Ultra']
        include:
          - REPO_SHORT: 'ImmWrt'
            url: 'https://github.com/laipeng668/immortalwrt.git'
            branch: 'master'
          - REPO_SHORT: 'OpenWrt'
            url: 'https://github.com/laipeng668/openwrt.git'
            branch: 'master'
          - REPO_SHORT: 'LibWrt'
            url: 'https://github.com/laipeng668/openwrt-6.x.git'
            branch: 'k6.12-nss'
    
    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install -y build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
        python3-distutils rsync unzip zlib1g-dev file wget time subversion \
        curl qemu-utils cpio xz-utils device-tree-compiler \
        python3-pyelftools libelf-dev python3-pip python3-setuptools \
        python3-wheel python3-yaml python3-jsonschema python3-requests \
        aria2 upx-ucl
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        
    - name: Check disk space
      run: |
        df -h
        # 检查可用空间，如果小于20GB则清理
        AVAILABLE_SPACE=$(df -BG --output=avail . | tail -1 | tr -d 'G ')
        if [ "$AVAILABLE_SPACE" -lt 20 ]; then
          echo "Cleaning up disk space..."
          sudo apt-get clean
          docker system prune -a -f
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        fi
        
    - name: Clone source code
      run: |
        git clone ${{ matrix.url }} -b ${{ matrix.branch }} openwrt
        cd openwrt
        echo "OPENWRT_PATH=$(pwd)" >> $GITHUB_ENV
        
    - name: Generate file list
      run: |
        cd $OPENWRT_PATH
        find . -type f -not -path './.git/*' | sort > oplist.txt
        
    - name: Load configuration
      run: |
        cd $OPENWRT_PATH
        
        # Base configs for all repos
        cat ../configs/General.config > .config
        cat ../configs/ipq60xx.config >> .config
        
        # Add configs based on CONFIG_TYPE
        if [ "${{ matrix.CONFIG_TYPE }}" == "Pro" ]; then
          cat ../configs/Pro.config >> .config
        elif [ "${{ matrix.CONFIG_TYPE }}" == "Max" ]; then
          cat ../configs/Max.config >> .config
        elif [ "${{ matrix.CONFIG_TYPE }}" == "Ultra" ]; then
          cat ../configs/Max.config >> .config
          cat ../configs/Ultra.config >> .config
        fi
        
        # Add LibWrt specific config if REPO_SHORT is LibWrt
        if [ "${{ matrix.REPO_SHORT }}" == "LibWrt" ]; then
          # Check if LibWrt.config exists, if not create an empty one
          if [ -f ../configs/LibWrt.config ]; then
            cat ../configs/LibWrt.config >> .config
          else
            echo "# LibWrt specific configuration" >> .config
            echo "# CONFIG_TARGET_ipq60xx=y" >> .config
          fi
        fi
        
        # Enable debug mode if requested
        if [ "${{ github.event.inputs.debug }}" == "true" ]; then
          echo "CONFIG_DEBUG=y" >> .config
        fi
        
    - name: Update feeds
      run: |
        cd $OPENWRT_PATH
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
    - name: Generate configuration
      run: |
        cd $OPENWRT_PATH
        make defconfig
        
    - name: Download package sources
      run: |
        cd $OPENWRT_PATH
        make download -j$(nproc)
        
    - name: Compile firmware
      run: |
        cd $OPENWRT_PATH
        make -j$(nproc) || make -j1 V=s
        
        # 如果编译失败，收集日志
        if [ $? -ne 0 ]; then
          echo "Compilation failed, collecting logs..."
          find . -name "*.log" -type f | xargs tar -czf compile_logs.tar.gz
          echo "::error::Compilation failed. Check compile_logs.tar.gz for details."
          exit 1
        fi
        
    - name: Organize files
      run: |
        cd $OPENWRT_PATH
        
        # Rename .config file
        mv .config ${{ matrix.REPO_SHORT }}${{ matrix.CONFIG_TYPE }}.config || true
        
        # Rename config.buildinfo
        [ -f config.buildinfo ] && mv config.buildinfo ${{ matrix.REPO_SHORT }}${{ matrix.CONFIG_TYPE }}.buildinfo || true
        
        # Package ipk/apk files
        if [ -d bin/targets/*/packages ]; then
          tar -zcf ${{ matrix.REPO_SHORT }}${{ matrix.CONFIG_TYPE }}.Packages.tar.gz -C bin/targets/*/packages .
        fi
        
        # Rename .bin files with safer handling
        if [ -d bin/targets ]; then
          find bin/targets -name "*.bin" -type f -print0 | while IFS= read -r -d '' bin_file; do
            dir=$(dirname "$bin_file")
            filename=$(basename "$bin_file")
            new_filename="${filename%.*}"
            new_filename="${{ matrix.REPO_SHORT }}${{ matrix.CONFIG_TYPE }}_${new_filename}.bin"
            mv "$bin_file" "$dir/$new_filename"
          done
        fi
        
    - name: Upload artifacts
      uses: actions/upload-artifact@main
      with:
        name: ${{ matrix.REPO_SHORT }}-${{ matrix.CONFIG_TYPE }}-firmware
        path: |
          ${{ env.OPENWRT_PATH }}/${{ matrix.REPO_SHORT }}${{ matrix.CONFIG_TYPE }}.config
          ${{ env.OPENWRT_PATH }}/${{ matrix.REPO_SHORT }}${{ matrix.CONFIG_TYPE }}.buildinfo
          ${{ env.OPENWRT_PATH }}/${{ matrix.REPO_SHORT }}${{ matrix.CONFIG_TYPE }}.Packages.tar.gz
          ${{ env.OPENWRT_PATH }}/bin/targets/
          ${{ env.OPENWRT_PATH }}/oplist.txt
          ${{ env.OPENWRT_PATH }}/compile_logs.tar.gz
        retention-days: 30
