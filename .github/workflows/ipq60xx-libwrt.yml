# .github/workflows/ipq60xx-libwrt.yml
name: 编译IPQ60XX设备固件 (Libwrt)

on:
  workflow_dispatch:
    inputs:
      version_suffix:
        description: '版本后缀'
        required: false
        default: ''
      clean_build:
        description: '清理编译环境'
        type: boolean
        default: false

env:
  REPO_URL: https://github.com/laipeng668/openwrt-6.x.git
  REPO_BRANCH: k6.12-nss
  CONFIG_FILE: configs/ipq60xx.config
  DEVICE_NAMES: jdcloud_re-ss-01,jdcloud_re-cs-02
  FEEDS_CONF: feeds.conf.default

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 初始化编译环境 (Initialize build environment)
        uses: actions/checkout@v4

      - name: 检查磁盘空间 (Check disk space)
        run: |
          echo "剩余磁盘空间:"
          df -h
          bash scripts/disk-monitor.sh &

      - name: 安装编译依赖 (Install build dependencies)
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget curl \
            libelf-dev ecj fastjar java-propose-classpath

      - name: 下载源码 (Download source code)
        run: |
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 添加自定义软件源 (Add custom feeds)
        run: |
          cd openwrt
          echo "src-git small https://github.com/kenzok8/small-package" >> feeds.conf.default
          echo "src-git netspeedtest https://github.com/sirpdboy/luci-app-netspeedtest" >> feeds.conf.default
          echo "src-git partexp https://github.com/sirpdboy/luci-app-partexp" >> feeds.conf.default
          echo "src-git taskplan https://github.com/sirpdboy/luci-app-taskplan" >> feeds.conf.default
          echo "src-git smbuser https://github.com/sbwml/luci-app-smbuser" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 配置编译选项 (Configure build options)
        run: |
          cd openwrt
          cp ../$CONFIG_FILE .config
          make defconfig

      - name: 下载编译依赖包 (Download build dependencies)
        run: |
          cd openwrt
          make download -j8 || make download -j1 V=s

      - name: 编译固件 (Build firmware)
        run: |
          cd openwrt
          # 编译Lite版本
          echo "CONFIG_TARGET_DEVICE_qualcommax_ipq60xx_DEVICE_jdcloud_re-ss-01_lite=y" >> .config
          echo "CONFIG_TARGET_DEVICE_qualcommax_ipq60xx_DEVICE_jdcloud_re-cs-02_lite=y" >> .config
          make defconfig
          make target/compile -j$(nproc) || make target/compile -j1 V=s
          make package/compile -j$(nproc) || make package/compile -j1 V=s
          make package/index
          
          # 重命名并保存Lite版本
          mkdir -p ../firmware/lite
          cp bin/targets/qualcommax/ipq60xx/*lite* ../firmware/lite/ || true
          
          # 清理并编译Full版本
          rm -rf bin/
          make clean
          sed -i '/_lite=y/d' .config
          make defconfig
          make target/compile -j$(nproc) || make target/compile -j1 V=s
          make package/compile -j$(nproc) || make package/compile -j1 V=s
          make package/index
          
          # 保存Full版本
          mkdir -p ../firmware/full
          cp bin/targets/qualcommax/ipq60xx/* ../firmware/full/ || true

      - name: 收集编译产物 (Collect build artifacts)
        run: |
          cd openwrt
          mkdir -p ../artifacts
          cp .config ../artifacts/config-libwrt-ipq60xx.txt
          cp bin/targets/qualcommax/ipq60xx/sha256sums ../artifacts/ || true

      - name: 上传固件 (Upload firmware)
        uses: actions/upload-artifact@v4
        with:
          name: libwrt-ipq60xx-firmware
          path: firmware/

      - name: 上传配置文件 (Upload config files)
        uses: actions/upload-artifact@v4
        with:
          name: libwrt-ipq60xx-config
          path: artifacts/

      - name: 发布Release (Create Release)
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'workflow_dispatch'
        with:
          tag_name: libwrt-ipq60xx-${{ github.run_number }}${{ github.event.inputs.version_suffix }}
          name: libwrt IPQ60XX 固件 ${{ github.run_number }}${{ github.event.inputs.version_suffix }}
          files: |
            firmware/**/*.trx
            firmware/**/*.bin
            firmware/**/*.img
            artifacts/*
