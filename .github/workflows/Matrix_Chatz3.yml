name: Matrix_Chatz3

on:
  workflow_dispatch:
  workflow_call:
  schedule:
    - cron: 0 16 * * 4

env:
  TZ: Asia/Shanghai

jobs:
  Build:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          # ImmortalWrt 分支
          - repo_short: ImmWrt
            repo_url: https://github.com/laipeng668/immortalwrt.git
            repo_branch: master
            config_type: Pro
          - repo_short: ImmWrt
            repo_url: https://github.com/laipeng668/immortalwrt.git
            repo_branch: master
            config_type: Max
          - repo_short: ImmWrt
            repo_url: https://github.com/laipeng668/immortalwrt.git
            repo_branch: master
            config_type: Ultra
          
          # OpenWrt 分支
          - repo_short: OpenWrt
            repo_url: https://github.com/laipeng668/openwrt.git
            repo_branch: master
            config_type: Pro
          - repo_short: OpenWrt
            repo_url: https://github.com/laipeng668/openwrt.git
            repo_branch: master
            config_type: Max
          - repo_short: OpenWrt
            repo_url: https://github.com/laipeng668/openwrt.git
            repo_branch: master
            config_type: Ultra
          
          # LibWrt 分支
          - repo_short: LibWrt
            repo_url: https://github.com/laipeng668/openwrt-6.x.git
            repo_branch: k6.12-nss
            config_type: Pro
          - repo_short: LibWrt
            repo_url: https://github.com/laipeng668/openwrt-6.x.git
            repo_branch: k6.12-nss
            config_type: Max
          - repo_short: LibWrt
            repo_url: https://github.com/laipeng668/openwrt-6.x.git
            repo_branch: k6.12-nss
            config_type: Ultra

    steps:
    - name: Maximize Available Disk Space
      if: env.MADS == 'true'
      uses: AdityaGarg8/remove-unwanted-software@master
      with:
        remove-dotnet: "true"
        remove-android: "true"
        remove-haskell: "true"
        remove-codeql: "true"
        remove-docker-images: "true"
        remove-large-packages: "true"
        remove-cached-tools: "true"
        remove-swapfile: "true"

    - name: Initialization Environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -y update
        sudo -E apt-get -y install $(curl -fsSL is.gd/depends_ubuntu_2204)
        sudo -E systemctl daemon-reload
        sudo -E apt-get -y autoremove --purge
        sudo -E apt-get -y clean
        sudo timedatectl set-timezone "$TZ"

    - name: Checkout
      uses: actions/checkout@main

    - name: Clone Source Code
      run: |
        df -hT $GITHUB_WORKSPACE
        sudo mkdir -p /mnt/openwrt
        sudo chown -R $(id -u):$(id -g) /mnt/openwrt
        git clone --depth 1 -b ${{ matrix.repo_branch }} --single-branch ${{ matrix.repo_url }} /mnt/openwrt
        cd /mnt/openwrt
        echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV
        VERSION_INFO=$(git show -s --date=short --format="作者: %an<br/>时间: %cd<br/>内容: %s<br/>hash: %H")
        echo "VERSION_INFO=$VERSION_INFO" >> $GITHUB_ENV
        VERSION_KERNEL=$(grep -oP 'LINUX_KERNEL_HASH-\K[0-9]+\.[0-9]+\.[0-9]+' target/linux/generic/kernel-6.12)
        echo "VERSION_KERNEL=$VERSION_KERNEL" >> $GITHUB_ENV

    - name: Generate Variables
      run: |
        echo "REPO_SHORT=${{ matrix.repo_short }}" >> $GITHUB_ENV
        echo "CONFIG_TYPE=${{ matrix.config_type }}" >> $GITHUB_ENV
        echo "DEVICE_TARGET=ipq60xx" >> $GITHUB_ENV
        echo "DEVICE_SUBTARGET=jdcloud" >> $GITHUB_ENV
        echo "HASH=$(git log -1 --pretty=format:'%h')" >> $GITHUB_ENV
        echo "CACHE_DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV
        echo "FIRMWARE_TAG=${{ matrix.repo_short }}-${{ matrix.config_type }}" >> $GITHUB_ENV

    - name: Cache Toolchain
      uses: actions/cache@main
      with:
        key: ${{ env.REPO_SHORT }}-${{ env.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-${{ env.HASH }} ${{ env.CACHE_DATE }}
        restore-keys: ${{ env.REPO_SHORT }}-${{ env.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-
        path: |
          ${{ env.OPENWRT_PATH }}/.ccache
          ${{ env.OPENWRT_PATH }}/staging_dir

    - name: Refresh The Cache
      run: |
        if [ -d "$OPENWRT_PATH/staging_dir" ]; then
          find "$OPENWRT_PATH/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r dir; do
              find "$dir" -type f -exec touch {} +
          done
        fi

    - name: Install Feeds
      run: |
        cd $OPENWRT_PATH
        ./scripts/feeds update -a
        ./scripts/feeds install -a
  
    - name: Load Custom Configuration
      run: |
        # 根据配置类型合并配置文件
        case "${{ matrix.config_type }}" in
          Pro)
            cat configs/General.config configs/ipq60xx.config > $OPENWRT_PATH/.config
            ;;
          Max)
            cat configs/General.config configs/ipq60xx.config configs/Max.config > $OPENWRT_PATH/.config
            ;;
          Ultra)
            cat configs/General.config configs/ipq60xx.config configs/Max.config configs/Ultra.config > $OPENWRT_PATH/.config
            ;;
        esac
        
        # 如果是LibWrt分支，添加LibWrt配置
        if [ "${{ matrix.repo_short }}" = "LibWrt" ]; then
          cat configs/LibWrt.config >> $OPENWRT_PATH/.config
        fi
        
        chmod +x scripts/Script.sh
        cd $OPENWRT_PATH
        $GITHUB_WORKSPACE/scripts/Script.sh

    - name: Download DL Package
      run: |
        cd $OPENWRT_PATH
        make defconfig
        make download -j$(nproc)
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile Firmware
      id: compile
      run: |
        cd $OPENWRT_PATH
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        echo "DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV
        echo "FILE_DATE=$(date +"%Y.%m.%d")" >> $GITHUB_ENV

    - name: Check Space Usage
      if: (!cancelled())
      run: df -hT

    - name: Organize Files
      if: steps.compile.outputs.status == 'success'
      run: |
        cd $OPENWRT_PATH/bin/targets/*/*
        
        # 复制配置文件
        cp $OPENWRT_PATH/.config ${{ matrix.repo_short }}_IPQ60XX_${{ matrix.config_type }}.config
        mv config.buildinfo ${{ matrix.repo_short }}_IPQ60XX_${{ matrix.config_type }}.config.buildinfo || true
        
        # 移动包文件
        mkdir -p packages
        mv -f $OPENWRT_PATH/bin/packages/*/*/*.ipk packages/ 2>/dev/null || true
        mv -f $OPENWRT_PATH/bin/packages/*/*/*.apk packages/ 2>/dev/null || true
        tar -zcf IPQ60XX_${{ matrix.config_type }}.Packages.tar.gz packages
        
        # 清理不需要的文件
        rm -rf packages feeds.buildinfo version.buildinfo sha256sums Maxfiles.json
        
        # 重命名固件文件
        for file in *.bin; do
          # 提取设备型号部分 (re-ss-01 或 re-cs-02)
          device=$(echo "$file" | grep -oP 're-(ss-01|cs-02)')
          if [ -n "$device" ]; then
            # 构建新文件名
            prefix="${{ matrix.repo_short }}-${{ matrix.config_type }}"
            new_name="${prefix}_${device}-$(echo "$file" | cut -d'-' -f5-)"
            mv "$file" "$new_name"
          fi
        done
        
        echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV

    - name: Upload Firmware To Artifact
      if: steps.compile.outputs.status == 'success' && env.FIRMWARE_RELEASE != 'true'
      uses: actions/upload-artifact@main
      with:
        name: ${{ env.REPO_SHORT }}-${{ env.CONFIG_TYPE }}-firmware-${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE_PATH }}

    - name: Upload Firmware To Release
      if: steps.compile.outputs.status == 'success' && env.FIRMWARE_RELEASE == 'true'
      uses: ncipollo/release-action@main
      with:
        name: ${{ env.DATE }} for ${{ env.FIRMWARE_TAG }}
        allowUpdates: true
        tag: ${{ env.FIRMWARE_TAG }}
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: ${{ env.FIRMWARE_PATH }}/*
        body: |
          **This is OpenWrt Firmware for ${{ env.FIRMWARE_TAG }}**
          ### 📒 固件信息
          - 这是开启全功能NSS的6.12内核固件，默认主题为Argon；
          - 该固件在${{ matrix.repo_short }}的基础上，添加了额外的软件包，并添加了若干工具，具体详见对应机型的config。
          - 💻 固件源码: ${{ matrix.repo_url }}
          - 💝 源码分支: ${{ matrix.repo_branch }}
          - 🌐 默认地址: **192.168.111.1**
          - 🔑 默认密码: none
          - 🚀 WiFi名称: **Star**
          - 🔑 WiFi密码: 12345678
          ### 📒 固件版本
          - 固件内核版本：**${{ env.VERSION_KERNEL }}**
          - 固件编译前最后一次➦[主源码](${{ matrix.repo_url }})更新记录
          - ${{ env.VERSION_INFO }}

    - name: Delete Old Cache
      run: |
        gh cache list --key ${{ env.REPO_SHORT }}-${{ env.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}- --json key --jq '.[] | .key' | while read -r key; do
          gh cache delete "$key"
        done
        echo "========cache status========"
        echo "ccache: $(du -sh $OPENWRT_PATH/.ccache | cut -f 1)"
        echo "staging: $(du -sh $OPENWRT_PATH/staging_dir | cut -f 1)"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
