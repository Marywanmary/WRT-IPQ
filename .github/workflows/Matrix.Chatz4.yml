name: Matrix.Chatz4

run-name: ${{ github.workflow }} by ${{ github.actor }} - ${{ github.event_name == 'schedule' && 'Scheduled build' || github.event_name == 'workflow_dispatch' && 'Manual build' || github.event_name == 'workflow_call' && 'Called build' }} (${{ github.run_number }})

on:
  workflow_dispatch:
  workflow_call:
  schedule:
    - cron: '0 16 * * 4'

env:
  GENERAL_CONFIG_FILE: configs/General.config
  DIY_SCRIPT: scripts/Script.sh
  MADS: false
  UPLOAD_BIN_DIR: false
  FIRMWARE_RELEASE: true
  TZ: Asia/Shanghai
  COMPILE_TIMEOUT: 360

jobs:
  Build:
    runs-on: ubuntu-22.04
    
    strategy:
      matrix:
        repository:
          - {
              repo_url: "https://github.com/laipeng668/immortalwrt.git",
              branch: "master",
              short_name: "ImmWrt"
            }
          - {
              repo_url: "https://github.com/laipeng668/openwrt.git",
              branch: "master",
              short_name: "OpenWrt"
            }
          - {
              repo_url: "https://github.com/laipeng668/openwrt-6.x.git",
              branch: "k6.12-nss",
              short_name: "LibWrt"
            }
        config_type: ["Pro", "Max", "Ultra"]
        device: ["re-ss-01", "re-cs-02"]
      
      max-parallel: 6
      fail-fast: false
    
    env:
      REPO_URL: ${{ matrix.repository.repo_url }}
      REPO_BRANCH: ${{ matrix.repository.branch }}
      REPO_SHORT: ${{ matrix.repository.short_name }}
      CONFIG_TYPE: ${{ matrix.config_type }}
      DEVICE: ${{ matrix.device }}
      DEVICE_TARGET: ipq60xx
      CONFIG_FILE: configs/${{ matrix.config_type }}.config

    steps:
    - name: Check Server Performance(检查服务器性能)
      run: |
        echo "警告⚠"
        echo "分配的服务器性能有限，若选择的插件过多，务必注意CPU性能！"
        echo -e "已知CPU型号（降序）：7763，8370C，8272CL，8171M，E5-2673 \n"
        echo "--------------------------CPU信息--------------------------"
        echo "CPU物理数量：$(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
        echo -e "CPU核心信息：$(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c) \n"
        echo "--------------------------内存信息--------------------------"
        echo "已安装内存详细信息："
        echo -e "$(sudo lshw -short -C memory | grep GiB) \n"
        echo "--------------------------硬盘信息--------------------------"
        echo "硬盘数量：$(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT
      timeout-minutes: 5

    - name: Maximize Available Disk Space(最大化可用磁盘空间​)
      if: env.MADS == 'true'
      uses: AdityaGarg8/remove-unwanted-software@v1
      with:
        remove-dotnet: "true"
        remove-android: "true"
        remove-haskell: "true"
        remove-codeql: "true"
        remove-docker-images: "true"
        remove-large-packages: "true"
        remove-cached-tools: "true"
        remove-swapfile: "true"
      timeout-minutes: 10

    - name: Initialization Environment(初始化环境)
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        set -e
        
        echo "更新软件包列表..."
        if ! sudo -E apt-get -y update; then
          echo "错误：更新软件包列表失败！"
          exit 1
        fi
        
        echo "安装依赖软件包..."
        if ! DEPS=$(curl -fsSL is.gd/depends_ubuntu_2204); then
          echo "错误：获取依赖列表失败！"
          exit 1
        fi
        
        if ! sudo -E apt-get -y install $DEPS; then
          echo "错误：安装依赖软件包失败！"
          exit 1
        fi
        
        sudo -E systemctl daemon-reload
        sudo -E apt-get -y autoremove --purge
        sudo -E apt-get -y clean
        
        echo "环境初始化完成！"
      timeout-minutes: 30

    - name: Checkout(检出代码)
      uses: actions/checkout@v4
      timeout-minutes: 5

    - name: Clone Source Code(克隆源代码)
      run: |
        set -e
        
        df -hT "$GITHUB_WORKSPACE"
        
        echo "检查目标目录..."
        if [ -d "/mnt/openwrt" ]; then
          echo "目标目录已存在，检查是否为空..."
          if [ "$(ls -A /mnt/openwrt)" ]; then
            echo "目标目录不为空，正在清理..."
            sudo rm -rf /mnt/openwrt || {
              echo "错误：无法删除现有目录！"
              exit 1
            }
            echo "目标目录已清理"
          else
            echo "目标目录为空，直接使用"
          fi
        fi
        
        echo "创建源码目录..."
        if ! sudo mkdir -p /mnt/openwrt; then
          echo "错误：创建源码目录失败！"
          exit 1
        fi
        
        if ! sudo chown -R $(id -u):$(id -g) /mnt/openwrt; then
          echo "错误：修改目录权限失败！"
          exit 1
        fi
        
        echo "克隆源码仓库: $REPO_URL"
        if ! git clone --depth 1 -b "$REPO_BRANCH" --single-branch "$REPO_URL" /mnt/openwrt; then
          echo "错误：克隆源码仓库失败！"
          exit 1
        fi
        
        cd /mnt/openwrt
        echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV
        
        echo "获取版本信息..."
        if ! VERSION_INFO=$(git show -s --date=short --format="作者: %an<br/>时间: %cd<br/>内容: %s<br/>hash: %H"); then
          echo "警告：获取版本信息失败，使用默认值"
          VERSION_INFO="未知"
        fi
        echo "VERSION_INFO=$VERSION_INFO" >> $GITHUB_ENV
        
        echo "提取内核版本..."
        KERNEL_VERSION_FILE="target/linux/generic/kernel-6.12"
        VERSION_KERNEL="未知"
        
        if [ -f "$KERNEL_VERSION_FILE" ]; then
          VERSION_KERNEL=$(grep -oP 'LINUX_KERNEL_HASH-\K[0-9]+\.[0-9]+\.[0-9]+' "$KERNEL_VERSION_FILE" 2>/dev/null || echo "未知")
        else
          echo "标准路径不存在，尝试其他路径..."
          VERSION_KERNEL=$(find . -name "kernel-*" -type f -exec grep -oP 'LINUX_KERNEL_HASH-\K[0-9]+\.[0-9]+\.[0-9]+' {} \; 2>/dev/null | head -1 || echo "未知")
        fi
        
        echo "内核版本: $VERSION_KERNEL"
        echo "VERSION_KERNEL=$VERSION_KERNEL" >> $GITHUB_ENV
      timeout-minutes: 30

    - name: Generate Variables(生成区域变量并传递)
      run: |
        set -e
        
        WORKSPACE_DIR="$GITHUB_WORKSPACE"
        CONFIGS_DIR="$WORKSPACE_DIR/configs"
        
        CONFIG_FILE="${CONFIGS_DIR}/${CONFIG_TYPE}.config"
        echo "配置文件标识: $CONFIG_FILE"
        
        if [ ! -f "$CONFIG_FILE" ]; then
          echo "错误：配置文件 $CONFIG_FILE 不存在！"
          echo "可用配置文件:"
          ls -la "$CONFIGS_DIR/" || echo "配置目录不存在"
          exit 1
        fi
        
        if [ ! -f "$WORKSPACE_DIR/$GENERAL_CONFIG_FILE" ]; then
          echo "错误：通用配置文件 $WORKSPACE_DIR/$GENERAL_CONFIG_FILE 不存在！"
          exit 1
        fi
        
        IPQ60XX_CONFIG_FILE="${CONFIGS_DIR}/ipq60xx.config"
        if [ ! -f "$IPQ60XX_CONFIG_FILE" ]; then
          echo "错误：ipq60xx配置文件 $IPQ60XX_CONFIG_FILE 不存在！"
          exit 1
        fi
        
        MAX_CONFIG_FILE="${CONFIGS_DIR}/Max.config"
        if [ ! -f "$MAX_CONFIG_FILE" ]; then
          echo "错误：Max配置文件 $MAX_CONFIG_FILE 不存在！"
          exit 1
        fi
        
        ULTRA_CONFIG_FILE="${CONFIGS_DIR}/Ultra.config"
        if [ ! -f "$ULTRA_CONFIG_FILE" ]; then
          echo "错误：Ultra配置文件 $ULTRA_CONFIG_FILE 不存在！"
          exit 1
        fi
        
        LIBWRT_CONFIG_FILE="${CONFIGS_DIR}/LibWrt.config"
        if [ "$REPO_SHORT" = "LibWrt" ] && [ ! -f "$LIBWRT_CONFIG_FILE" ]; then
          echo "错误：LibWrt配置文件 $LIBWRT_CONFIG_FILE 不存在！"
          exit 1
        fi
        
        FIRMWARE_TAG="${REPO_SHORT}_${DEVICE_TARGET}_${CONFIG_TYPE}_${DEVICE}"
        echo "固件标签: $FIRMWARE_TAG"
        echo "FIRMWARE_TAG=$FIRMWARE_TAG" >> $GITHUB_ENV
        
        echo "DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV
        echo "FILE_DATE=$(date +"%Y.%m.%d")" >> $GITHUB_ENV
        
        cd "$OPENWRT_PATH"
        
        echo "运行defconfig处理依赖关系..."
        if ! make defconfig > /dev/null 2>&1; then
          echo "错误：defconfig执行失败！"
          exit 1
        fi
        
        # 记录设备目标目录路径，供后续步骤使用
        echo "TARGET_BASE_DIR=$OPENWRT_PATH/bin/targets" >> $GITHUB_ENV
      timeout-minutes: 5

    - name: Cache Toolchain(缓存工具链)
      uses: actions/cache@v4
      with:
        key: ${{ env.REPO_SHORT }}-${{ env.DEVICE_TARGET }}-${{ env.CONFIG_TYPE }}-${{ github.sha }}
        restore-keys: |
          ${{ env.REPO_SHORT }}-${{ env.DEVICE_TARGET }}-${{ env.CONFIG_TYPE }}-
          ${{ env.REPO_SHORT }}-${{ env.DEVICE_TARGET }}-
        path: |
          ${{ env.OPENWRT_PATH }}/.ccache
          ${{ env.OPENWRT_PATH }}/staging_dir
      timeout-minutes: 5

    - name: Refresh The Cache(刷新缓存)
      run: |
        set -e
        
        if [ -d "$OPENWRT_PATH/staging_dir" ]; then
          echo "刷新缓存时间戳..."
          find "$OPENWRT_PATH/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r dir; do
              find "$dir" -type f -exec touch {} +
          done
          echo "缓存刷新完成！"
        else
          echo "工具链目录不存在，跳过缓存刷新"
        fi
      timeout-minutes: 5

    - name: Install Feeds(安装feeds)
      run: |
        set -e
        
        cd "$OPENWRT_PATH"
        
        echo "更新feeds列表..."
        if ! ./scripts/feeds update -a; then
          echo "错误：更新feeds失败！"
          exit 1
        fi
        
        echo "安装feeds..."
        if ! ./scripts/feeds install -a; then
          echo "错误：安装feeds失败！"
          exit 1
        fi
        
        echo "Feeds安装完成！"
      timeout-minutes: 30
  
    - name: Load Custom Configuration(加载自定义配置)
      run: |
        set -e
        
        WORKSPACE_DIR="$GITHUB_WORKSPACE"
        CONFIGS_DIR="$WORKSPACE_DIR/configs"
        
        CONFIG_FILES=("$WORKSPACE_DIR/$GENERAL_CONFIG_FILE" "$CONFIGS_DIR/ipq60xx.config")
        
        case "$CONFIG_TYPE" in
          "Pro")
            echo "Pro配置：添加基础配置文件"
            ;;
          "Max")
            echo "Max配置：添加Max配置文件"
            CONFIG_FILES+=("$CONFIGS_DIR/Max.config")
            ;;
          "Ultra")
            echo "Ultra配置：添加Max和Ultra配置文件"
            CONFIG_FILES+=("$CONFIGS_DIR/Max.config" "$CONFIGS_DIR/Ultra.config")
            ;;
        esac
        
        if [ "$REPO_SHORT" = "LibWrt" ]; then
          echo "LibWrt仓库：添加LibWrt配置文件"
          CONFIG_FILES+=("$CONFIGS_DIR/LibWrt.config")
        fi
        
        echo "将要合并的配置文件："
        for file in "${CONFIG_FILES[@]}"; do
          echo "  - $file"
        done
        
        echo "合并配置文件..."
        echo "" > "$OPENWRT_PATH/.config"
        
        for file in "${CONFIG_FILES[@]}"; do
          if [ ! -f "$file" ]; then
            echo "错误：配置文件 $file 不存在！"
            exit 1
          fi
          echo "添加: $file"
          cat "$file" >> "$OPENWRT_PATH/.config"
          echo "" >> "$OPENWRT_PATH/.config"
        done
        
        if ! chmod +x "$WORKSPACE_DIR/$DIY_SCRIPT"; then
          echo "错误：给DIY脚本添加执行权限失败！"
          exit 1
        fi
        
        cd "$OPENWRT_PATH"
        
        echo "执行自定义DIY脚本..."
        if ! "$WORKSPACE_DIR/$DIY_SCRIPT"; then
          echo "错误：执行DIY脚本失败！"
          exit 1
        fi
        
        echo "运行defconfig处理新增依赖..."
        if ! make defconfig > /dev/null 2>&1; then
          echo "错误：defconfig执行失败！"
          exit 1
        fi
      timeout-minutes: 10

    - name: Download DL Package(下载DL软件包)
      run: |
        set -e
        
        cd "$OPENWRT_PATH"
        
        echo "运行defconfig确保配置正确..."
        if ! make defconfig; then
          echo "错误：defconfig执行失败！"
          exit 1
        fi
        
        echo "下载软件包..."
        if ! make download -j$(nproc); then
          echo "错误：下载软件包失败！"
          exit 1
        fi
        
        echo "检查下载失败的文件..."
        find dl -size -1024c -exec ls -l {} \;
        
        echo "清理无效下载文件..."
        find dl -size -1024c -exec rm -f {} \;
        
        echo "软件包下载完成！"
      timeout-minutes: 60

    - name: Compile Firmware(开始编译固件)
      id: compile
      run: |
        set -e
        
        cd "$OPENWRT_PATH"
        
        THREADS=$(nproc)
        echo "使用 $THREADS 线程编译"
        
        echo "开始并行编译..."
        if ! make -j$THREADS V=s 2>&1 | tee build.log; then
          echo "并行编译失败，尝试单线程编译..."
          
          if ! make -j1 V=s 2>&1 | tee build-single.log; then
            echo "编译失败！"
            echo "status=failed" >> $GITHUB_OUTPUT
            
            echo "=== 编译错误日志（最后200行）==="
            tail -200 build-single.log
            
            echo "=== 检查常见错误原因 ==="
            if grep -q "No space left on device" build-single.log; then
              echo "错误：磁盘空间不足！"
              df -h
            fi
            if grep -q "Cannot allocate memory" build-single.log; then
              echo "错误：内存不足！"
              free -h
            fi
            if grep -q "Permission denied" build-single.log; then
              echo "错误：权限问题！"
            fi
            if grep -q "error:" build-single.log | head -5; then
              echo "错误：发现编译错误！"
            fi
            
            echo "保存完整错误日志..."
            cp build-single.log "$GITHUB_WORKSPACE/compile-error.log"
            
            exit 1
          fi
        fi
        
        echo "编译成功！"
        echo "status=success" >> $GITHUB_OUTPUT
        
        echo "DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV
        echo "FILE_DATE=$(date +"%Y.%m.%d")" >> $GITHUB_ENV
        
        if [ ! -d "bin/targets" ]; then
          echo "错误：未生成固件目录！"
          echo "status=failed" >> $GITHUB_OUTPUT
          exit 1
        fi
        
        echo "固件目录内容："
        find bin/targets -type f | head -20
        
        FIRMWARE_COUNT=$(find bin/targets -name "*.bin" | wc -l)
        echo "找到 $FIRMWARE_COUNT 个固件文件"
        
        if [ $FIRMWARE_COUNT -eq 0 ]; then
          echo "警告：没有找到任何固件文件！"
          echo "bin目录内容："
          find bin -type f | head -20
        fi
      timeout-minutes: ${{ env.COMPILE_TIMEOUT }}

    - name: Monitor Resources(监控资源使用)
      if: always()
      run: |
        echo "=== 内存使用情况 ==="
        free -h
        echo "=== 磁盘使用情况 ==="
        df -h
        echo "=== CPU使用情况 ==="
        top -bn1 | head -20
      timeout-minutes: 5

    - name: Check Space Usage(检查空间使用情况)
      if: (!cancelled())
      run: df -hT
      timeout-minutes: 5

    - name: Upload Build Logs(上传编译日志)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.REPO_SHORT }}-build-logs-${{ env.DEVICE_TARGET }}-${{ env.CONFIG_TYPE }}-${{ env.DEVICE }}-${{ env.FILE_DATE }}
        path: |
          ${{ env.OPENWRT_PATH }}/build.log
          ${{ env.OPENWRT_PATH }}/build-single.log
          ${{ github.workspace }}/compile-error.log
        retention-days: 7
      timeout-minutes: 5

    - name: Organize Files(整理文件)
      if: steps.compile.outputs.status == 'success'
      run: |
        set -e
        
        # 创建调试信息目录
        DEBUG_DIR="$GITHUB_WORKSPACE/debug-info"
        mkdir -p "$DEBUG_DIR"
        
        # 导出整个bin目录结构（用于调试）
        echo "=== 导出bin目录结构 ==="
        echo "bin目录结构:" > "$DEBUG_DIR/bin-structure.txt"
        find "$OPENWRT_PATH/bin" -type d | sort >> "$DEBUG_DIR/bin-structure.txt"
        echo "bin目录文件列表:" >> "$DEBUG_DIR/bin-structure.txt"
        find "$OPENWRT_PATH/bin" -type f | sort >> "$DEBUG_DIR/bin-structure.txt"
        
        # 导出targets目录详细内容
        echo "=== 导出targets目录详细内容 ===" > "$DEBUG_DIR/targets-detail.txt"
        echo "targets目录结构:" >> "$DEBUG_DIR/targets-detail.txt"
        find "$OPENWRT_PATH/bin/targets" -type d | sort >> "$DEBUG_DIR/targets-detail.txt"
        echo "" >> "$DEBUG_DIR/targets-detail.txt"
        echo "targets目录文件列表:" >> "$DEBUG_DIR/targets-detail.txt"
        find "$OPENWRT_PATH/bin/targets" -type f | sort >> "$DEBUG_DIR/targets-detail.txt"
        echo "" >> "$DEBUG_DIR/targets-detail.txt"
        echo "所有.bin文件:" >> "$DEBUG_DIR/targets-detail.txt"
        find "$OPENWRT_PATH/bin/targets" -name "*.bin" -type f -exec ls -la {} \; >> "$DEBUG_DIR/targets-detail.txt"
        
        # 查找包含.bin文件的目录
        echo "=== 查找包含.bin文件的目录 ==="
        FIRMWARE_DIRS=$(find "$OPENWRT_PATH/bin/targets" -type d -exec sh -c 'test -f "$1"/*.bin' _ {} \; -print)
        
        if [ -z "$FIRMWARE_DIRS" ]; then
          echo "错误：在整个targets目录中没有找到包含.bin文件的目录！"
          echo "所有目录内容:" >> "$DEBUG_DIR/error-log.txt"
          find "$OPENWRT_PATH/bin/targets" -type d | while read dir; do
            echo "目录: $dir" >> "$DEBUG_DIR/error-log.txt"
            ls -la "$dir" >> "$DEBUG_DIR/error-log.txt"
            echo "" >> "$DEBUG_DIR/error-log.txt"
          done
          
          # 即使出错也保存所有编译结果
          echo "=== 保存所有编译结果 ==="
          BACKUP_DIR="$GITHUB_WORKSPACE/backup-all"
          mkdir -p "$BACKUP_DIR"
          cp -r "$OPENWRT_PATH/bin" "$BACKUP_DIR/"
          echo "所有编译文件已备份到: $BACKUP_DIR"
          echo "BACKUP_CREATED=true" >> $GITHUB_ENV
          
          exit 1
        fi
        
        # 如果找到多个目录，选择第一个（通常每个任务只编译一个设备，所以应该只有一个）
        FIRMWARE_DIR=$(echo "$FIRMWARE_DIRS" | head -n 1)
        echo "找到固件目录: $FIRMWARE_DIR"
        echo "固件目录内容:" > "$DEBUG_DIR/firmware-dir-content.txt"
        ls -la "$FIRMWARE_DIR" >> "$DEBUG_DIR/firmware-dir-content.txt"
        
        # 进入固件目录
        cd "$FIRMWARE_DIR" || {
          echo "错误：无法进入固件目录 $FIRMWARE_DIR！"
          
          # 即使出错也保存所有编译结果
          echo "=== 保存所有编译结果 ==="
          BACKUP_DIR="$GITHUB_WORKSPACE/backup-all"
          mkdir -p "$BACKUP_DIR"
          cp -r "$OPENWRT_PATH/bin" "$BACKUP_DIR/"
          echo "所有编译文件已备份到: $BACKUP_DIR"
          echo "BACKUP_CREATED=true" >> $GITHUB_ENV
          
          exit 1
        }
        
        # 复制配置文件到当前目录
        echo "复制配置文件..."
        if ! cp "$OPENWRT_PATH/.config" "${FIRMWARE_TAG}.config"; then
          echo "错误：复制配置文件失败！"
          exit 1
        fi
        
        # 重命名构建信息文件
        echo "重命名构建信息文件..."
        if [ -f "config.buildinfo" ]; then
          if ! mv config.buildinfo "${FIRMWARE_TAG}.buildinfo"; then
            echo "错误：重命名构建信息文件失败！"
            exit 1
          fi
        else
          echo "警告：config.buildinfo文件不存在"
        fi
        
        # 创建packages目录
        mkdir -p packages
        
        # 移动所有.ipk文件到packages目录
        echo "移动.ipk文件..."
        find "$OPENWRT_PATH/bin/packages" -name "*.ipk" -exec mv {} packages/ \; 2>/dev/null || true
        
        # 移动所有.apk文件到packages目录
        echo "移动.apk文件..."
        find "$OPENWRT_PATH/bin/packages" -name "*.apk" -exec mv {} packages/ \; 2>/dev/null || true
        
        # 将packages目录打包成tar.gz文件
        echo "打包packages目录..."
        if [ -d "packages" ] && [ "$(ls -A packages)" ]; then
          if ! tar -zcf "${FIRMWARE_TAG}.Packages.tar.gz" packages; then
            echo "错误：打包packages目录失败！"
            exit 1
          fi
        else
          echo "packages目录为空，跳过打包"
        fi
        
        # 删除不需要的文件
        echo "清理不需要的文件..."
        rm -rf packages feeds.buildinfo version.buildinfo sha256sums profiles.json 2>/dev/null || true
        
        # 根据仓库类型确定固件前缀
        case "$REPO_SHORT" in
          "ImmWrt") FIRMWARE_PREFIX="immortalwrt" ;;
          "OpenWrt"|"LibWrt") FIRMWARE_PREFIX="openwrt" ;;
          *) FIRMWARE_PREFIX="openwrt" ;;
        esac
        
        # 查找并重命名固件文件
        echo "=== 查找并重命名固件文件 ==="
        RENAME_COUNT=0
        
        # 列出当前目录的所有.bin文件
        echo "当前目录的.bin文件："
        ls -la *.bin 2>/dev/null || echo "没有找到.bin文件"
        
        # 首先尝试查找所有.bin文件
        for file in *.bin; do
          if [ -f "$file" ]; then
            echo "处理文件: $file"
            
            # 如果是工厂固件
            if [[ "$file" == *"factory.bin" ]]; then
              NEW_NAME="${REPO_SHORT}_${DEVICE}_${CONFIG_TYPE}-squashfs-factory.bin"
              echo "重命名为: $NEW_NAME"
              if ! mv "$file" "$NEW_NAME"; then
                echo "错误：重命名文件失败！"
                exit 1
              fi
              RENAME_COUNT=$((RENAME_COUNT+1))
            # 如果是升级固件
            elif [[ "$file" == *"sysupgrade.bin" ]]; then
              NEW_NAME="${REPO_SHORT}_${DEVICE}_${CONFIG_TYPE}-squashfs-sysupgrade.bin"
              echo "重命名为: $NEW_NAME"
              if ! mv "$file" "$NEW_NAME"; then
                echo "错误：重命名文件失败！"
                exit 1
              fi
              RENAME_COUNT=$((RENAME_COUNT+1))
            # 如果是其他类型的.bin文件
            else
              EXTENSION="${file##*.}"
              NEW_NAME="${REPO_SHORT}_${DEVICE}_${CONFIG_TYPE}.${EXTENSION}"
              echo "重命名为: $NEW_NAME"
              if ! mv "$file" "$NEW_NAME"; then
                echo "错误：重命名文件失败！"
                exit 1
              fi
              RENAME_COUNT=$((RENAME_COUNT+1))
            fi
          fi
        done
        
        # 如果没有找到.bin文件，尝试在其他位置查找
        if [ $RENAME_COUNT -eq 0 ]; then
          echo "在当前目录中没有找到.bin文件，尝试在其他位置查找..."
          
          # 在整个bin/targets目录中查找.bin文件
          for file in $(find "$OPENWRT_PATH/bin/targets" -name "*.bin" -type f); do
            echo "找到文件: $file"
            
            # 复制文件到当前目录
            cp "$file" ./
            filename=$(basename "$file")
            
            # 重命名文件
            if [[ "$filename" == *"factory.bin" ]]; then
              NEW_NAME="${REPO_SHORT}_${DEVICE}_${CONFIG_TYPE}-squashfs-factory.bin"
            elif [[ "$filename" == *"sysupgrade.bin" ]]; then
              NEW_NAME="${REPO_SHORT}_${DEVICE}_${CONFIG_TYPE}-squashfs-sysupgrade.bin"
            else
              EXTENSION="${filename##*.}"
              NEW_NAME="${REPO_SHORT}_${DEVICE}_${CONFIG_TYPE}.${EXTENSION}"
            fi
            
            echo "重命名为: $NEW_NAME"
            if ! mv "$filename" "$NEW_NAME"; then
              echo "错误：重命名文件失败！"
              exit 1
            fi
            RENAME_COUNT=$((RENAME_COUNT+1))
          done
        fi
        
        # 验证重命名结果
        echo "=== 重命名后的文件 ==="
        ls -la *.bin 2>/dev/null || echo "没有找到.bin文件"
        
        # 检查是否至少有一个文件被重命名
        if [ $RENAME_COUNT -eq 0 ]; then
          echo "错误：没有找到任何固件文件进行重命名！"
          echo "当前目录的所有文件：" > "$DEBUG_DIR/final-dir-content.txt"
          ls -la >> "$DEBUG_DIR/final-dir-content.txt"
          
          # 即使出错也保存所有编译结果
          echo "=== 保存所有编译结果 ==="
          BACKUP_DIR="$GITHUB_WORKSPACE/backup-all"
          mkdir -p "$BACKUP_DIR"
          cp -r "$OPENWRT_PATH/bin" "$BACKUP_DIR/"
          echo "所有编译文件已备份到: $BACKUP_DIR"
          echo "BACKUP_CREATED=true" >> $GITHUB_ENV
          
          exit 1
        fi
        
        # 将当前目录路径保存到环境变量（供上传步骤使用）
        echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV
        
        # 保存最终目录内容
        echo "最终目录内容:" > "$DEBUG_DIR/final-success-content.txt"
        ls -la >> "$DEBUG_DIR/final-success-content.txt"
        
        # 标记整理文件成功
        echo "ORGANIZE_SUCCESS=true" >> $GITHUB_ENV
      timeout-minutes: 10

    - name: Upload Debug Information and Backup(上传调试信息和备份)
      if: always() && steps.compile.outputs.status == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.REPO_SHORT }}-debug-${{ env.DEVICE_TARGET }}-${{ env.CONFIG_TYPE }}-${{ env.DEVICE }}-${{ env.FILE_DATE }}
        path: |
          ${{ github.workspace }}/debug-info/
          ${{ github.workspace }}/backup-all/
        retention-days: 30  # 调试信息保留更长时间
      timeout-minutes: 30

    - name: Debug Information(调试信息)
      if: always()
      run: |
        echo "=== 环境变量 ==="
        env | grep -E "(REPO_|CONFIG_|DEVICE|FIRMWARE|BACKUP_CREATED|ORGANIZE_SUCCESS)" | sort
        echo "=== 工作目录内容 ==="
        ls -la "$GITHUB_WORKSPACE"
        echo "=== 源码目录内容 ==="
        ls -la "$OPENWRT_PATH" 2>/dev/null || echo "源码目录不存在"
        echo "=== 配置文件验证 ==="
        if [ -f "$CONFIG_FILE" ]; then
          echo "配置文件存在: $CONFIG_FILE"
          head -10 "$CONFIG_FILE"
        else
          echo "配置文件不存在: $CONFIG_FILE"
        fi
      timeout-minutes: 5

    - name: Upload Firmware To Artifact(将固件上传到Artifact)
      if: steps.compile.outputs.status == 'success' && env.FIRMWARE_RELEASE != 'true' && env.ORGANIZE_SUCCESS == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.REPO_SHORT }}-firmware-${{ env.DEVICE_TARGET }}-${{ env.CONFIG_TYPE }}-${{ env.DEVICE }}-${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE_PATH }}
        retention-days: 7
      timeout-minutes: 30

    - name: Upload Firmware To Release(发布固件)
      if: steps.compile.outputs.status == 'success' && env.FIRMWARE_RELEASE == 'true' && env.ORGANIZE_SUCCESS == 'true'
      uses: ncipollo/release-action@v1
      with:
        name: ${{ env.DATE }}-${{ env.FIRMWARE_TAG }}
        allowUpdates: true
        tag: ${{ env.FIRMWARE_TAG }}
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: ${{ env.FIRMWARE_PATH }}/*
        body: |
          **This is OpenWrt Firmware for ${{ env.FIRMWARE_TAG }}**
          ### 📒 固件信息
          - 这是开启全功能NSS的6.12内核固件，默认主题为Argon；
          - 该固件在${{ env.REPO_SHORT }}的基础上，添加了额外的软件包，并添加了若干工具，具体详见对应机型的config。
          - 💻 固件源码: ${{ env.REPO_URL }}
          - 💝 源码分支: ${{ env.REPO_BRANCH }}
          - 🌐 默认地址: **192.168.111.1**
          - 🔑 默认密码: 无
          - 🚀 WiFi名称: **Star**
          - 🔑 WiFi密码: 12345678
          ### 📒 固件版本
          - 固件内核版本：**${{ env.VERSION_KERNEL }}**
          - 固件编译前最后一次➦[主源码](${{ env.REPO_URL }})更新记录
          - ${{ env.VERSION_INFO }}
      timeout-minutes: 30

    - name: Clean Up(清理临时文件)
      if: always()
      run: |
        set -e
        
        echo "清理构建文件..."
        if [ -d "/mnt/openwrt/build_dir" ]; then
          sudo rm -rf /mnt/openwrt/build_dir/target-* || true
          sudo rm -rf /mnt/openwrt/build_dir/host-* || true
          echo "构建文件清理完成！"
        else
          echo "构建目录不存在，跳过清理"
        fi
      timeout-minutes: 10

    - name: Delete Old Cache(删除旧缓存)
      if: always()
      run: |
        set -e
        
        echo "删除旧缓存..."
        gh cache list --key ${{ env.REPO_SHORT }}-${{ env.DEVICE_TARGET }}-${{ env.CONFIG_TYPE }}-${{ env.DEVICE }}- --json key --jq '.[] | .key' | while read -r key; do
          gh cache delete "$key"
        done || echo "删除旧缓存失败，但继续执行"
        
        echo "========cache status========"
        if [ -d "$OPENWRT_PATH/.ccache" ]; then
          echo "ccache: $(du -sh $OPENWRT_PATH/.ccache | cut -f 1)"
        else
          echo "ccache: 目录不存在"
        fi
        
        if [ -d "$OPENWRT_PATH/staging_dir" ]; then
          echo "staging: $(du -sh $OPENWRT_PATH/staging_dir | cut -f 1)"
        else
          echo "staging: 目录不存在"
        fi
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      timeout-minutes: 10
