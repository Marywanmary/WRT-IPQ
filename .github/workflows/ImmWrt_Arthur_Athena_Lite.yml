name: ImmWrt_Arthur_Athena_Lite

on:
  workflow_dispatch:
  workflow_call:
  schedule:
    - cron: '0 16 * * 4'

env: # 定义全局变量
  REPO_URL: https://github.com/laipeng668/immortalwrt.git
  REPO_BRANCH: master
  REPO_SHORT: ImmWrt
  # REPO_URL: https://github.com/laipeng668/openwrt-6.x.git
  # REPO_BRANCH: k6.12-nss
  # REPO_SHORT: LibWrt
  CONFIG_TARGET: IPQ60XX
  CONFIG_TYPE: _Lite
  #CONFIG_TYPE: _Full
  CONFIGS_DIR: configs
  # CONFIG_FILE: configs/IPQ60XX_Full.config
  # CONFIG_FILE: configs/IPQ60XX_Lite.config
  GENERAL_CONFIG_FILE: configs/General.config
  DIY_SCRIPT: scripts/Script.sh
  #CLASH_KERNEL: amd64S
  MADS: false
  UPLOAD_BIN_DIR: false
  FIRMWARE_RELEASE: true
  # FIRMWARE_TAG: IPQ60XX
  TZ: Asia/Shanghai

jobs:
  Build:
    runs-on: ubuntu-22.04

    steps:
    - name: Check Server Performance(检查服务器性能)
      run: |
        echo "警告⚠"
        echo "分配的服务器性能有限，若选择的插件过多，务必注意CPU性能！"
        echo -e "已知CPU型号（降序）：7763，8370C，8272CL，8171M，E5-2673 \n"
        echo "--------------------------CPU信息--------------------------"
        echo "CPU物理数量：$(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
        echo -e "CPU核心信息：$(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c) \n"
        echo "--------------------------内存信息--------------------------"
        echo "已安装内存详细信息："
        echo -e "$(sudo lshw -short -C memory | grep GiB) \n"
        echo "--------------------------硬盘信息--------------------------"
        echo "硬盘数量：$(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT

    - name: Maximize Available Disk Space(最大化可用磁盘空间​)
      if: env.MADS == 'true'
      uses: AdityaGarg8/remove-unwanted-software@master
      with:
        remove-dotnet: "true"
        remove-android: "true"
        remove-haskell: "true"
        remove-codeql: "true"
        remove-docker-images: "true"
        remove-large-packages: "true"
        remove-cached-tools: "true"
        remove-swapfile: "true"

    - name: Initialization Environment(初始化环境)
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -y update
        sudo -E apt-get -y install $(curl -fsSL is.gd/depends_ubuntu_2204)
        sudo -E systemctl daemon-reload
        sudo -E apt-get -y autoremove --purge
        sudo -E apt-get -y clean

    - name: Checkout(检出代码)
      uses: actions/checkout@main

    - name: Clone Source Code(克隆源代码)
      run: |
        df -hT $GITHUB_WORKSPACE
        sudo mkdir -p /mnt/$REPO_SHORT
        sudo chown -R $(id -u):$(id -g) /mnt/$REPO_SHORT
        # 克隆源代码
        git clone --depth 1 -b $REPO_BRANCH --single-branch $REPO_URL /mnt/$REPO_SHORT
        cd /mnt/$REPO_SHORT
        echo "SOURCE_PATH=$PWD" >> $GITHUB_ENV
        VERSION_INFO=$(git show -s --date=short --format="作者: %an<br/>时间: %cd<br/>内容: %s<br/>hash: %H")
        echo "VERSION_INFO=$VERSION_INFO" >> $GITHUB_ENV
        VERSION_KERNEL=$(grep -oP 'LINUX_KERNEL_HASH-\K[0-9]+\.[0-9]+\.[0-9]+' target/linux/generic/kernel-6.12)
        echo "VERSION_KERNEL=$VERSION_KERNEL" >> $GITHUB_ENV

    - name: Generate Variables(生成区域变量并传递)
      run: |
        # 定义核心变量
        echo "DEVICE_TARGET=$CONFIG_TARGET" >> $GITHUB_ENV
        echo "SOURCE_REPO=${{ env.REPO_SHORT }}" >> $GITHUB_ENV
        echo "FIRMWARE_TAG=$CONFIG_TARGET$CONFIG_TYPE" >> $GITHUB_ENV
        # 直接使用GITHUB_WORKSPACE下的配置文件路径
        echo "CONFIG_FILE=$GITHUB_WORKSPACE/$CONFIGS_DIR/${CONFIG_TARGET}${CONFIG_TYPE}.config" >> $GITHUB_ENV
        echo "DIY_SCRIPT_PATH=$GITHUB_WORKSPACE/$DIY_SCRIPT" >> $GITHUB_ENV
        echo "HASH=$(git log -1 --pretty=format:'%h')" >> $GITHUB_ENV
    
    - name: Cache Toolchain(缓存工具链)
      uses: actions/cache@main
      with:
        key: ${{ env.SOURCE_REPO }}-${{ env.DEVICE_TARGET }}-${{ env.HASH }}
        restore-keys: ${{ env.SOURCE_REPO }}-${{ env.DEVICE_TARGET }}-
        path: |
          ${{ env.SOURCE_PATH }}/.ccache
          ${{ env.SOURCE_PATH }}/staging_dir

    - name: Refresh The Cache(刷新缓存)
      run: |
        if [ -d "$SOURCE_PATH/staging_dir" ]; then
          find "$SOURCE_PATH/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r dir; do
              find "$dir" -type f -exec touch {} +
          done
        fi

    - name: Install Feeds(安装feeds)
      run: |
        cd $SOURCE_PATH
        ./scripts/feeds update -a
        ./scripts/feeds install -a
  
    - name: Load Custom Configuration(加载自定义配置)
      run: |
        # 直接使用GITHUB_WORKSPACE下的配置文件和脚本，不进行复制
        cat $GITHUB_WORKSPACE/$GENERAL_CONFIG_FILE $CONFIG_FILE > $SOURCE_PATH/.config
        chmod +x $DIY_SCRIPT
        cd $SOURCE_PATH  # 切换到源代码目录
        $DIY_SCRIPT_PATH  # 执行位于GITHUB_WORKSPACE下的脚本
        # 规范化配置文件（处理依赖关系和默认值）
        make defconfig > /dev/null 2>&1

    - name: Download DL Package(下载DL软件包)
      run: |
        cd $SOURCE_PATH
        make defconfig
        make download -j$(nproc)
        # 清理小于 1KB 的无效文件
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile Firmware(开始编译固件)
      id: compile
      run: |
        cd $SOURCE_PATH
        echo -e "使用$(nproc) 线程编译"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        echo "DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV
        echo "FILE_DATE=$(date +"%Y.%m.%d")" >> $GITHUB_ENV

    - name: Check Space Usage(检查空间使用情况)
      if: (!cancelled())
      run: df -hT

    - name: Upload Bin Directory(上传固件)
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      uses: actions/upload-artifact@main
      with:
        name: ${{ env.SOURCE_REPO }}-bin-${{ env.DEVICE_TARGET }}-${{ env.FILE_DATE }}
        path: ${{ env.SOURCE_PATH }}/bin

    - name: Organize Files(整理文件)
      if: steps.compile.outputs.status == 'success'
      run: |
        cd $SOURCE_PATH/bin/targets/*/*
        cp $SOURCE_PATH/.config ${{ env.FIRMWARE_TAG }}.config
        mv config.buildinfo ${{ env.FIRMWARE_TAG }}.buildinfo || true
        # 同时mv *.ipk 和 *.apk，保障代码健壮性,同时使用 || true 来忽略 mv 命令的错误 (例如文件不存在)
        mv -f $SOURCE_PATH/bin/packages/*/*/*.ipk packages/ || true
        mv -f $SOURCE_PATH/bin/packages/*/*/*.apk packages/ || true
        tar -zcf ${{ env.FIRMWARE_TAG }}.Packages.tar.gz packages
        rm -rf packages feeds.buildinfo version.buildinfo sha256sums profiles.json
        echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV

    - name: Upload Firmware To Artifact(将固件上传到Artifact)
      if: steps.compile.outputs.status == 'success' && env.FIRMWARE_RELEASE != 'true'
      uses: actions/upload-artifact@main
      with:
        name: ${{ env.SOURCE_REPO }}-firmware-${{ env.DEVICE_TARGET }}-${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE_PATH }}

    - name: Upload Firmware To Release(发布固件)
      if: steps.compile.outputs.status == 'success' && env.FIRMWARE_RELEASE == 'true'
      uses: ncipollo/release-action@main
      with:
        name: ${{ env.DATE }}-${{ env.FIRMWARE_TAG }}
        allowUpdates: true
        tag: ${{ env.FIRMWARE_TAG }}
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: ${{ env.FIRMWARE_PATH }}/*
        body: |
          **This is OpenWrt Firmware for ${{ env.FIRMWARE_TAG }}**
          ### 📒 固件信息
          - 这是开启全功能NSS的6.12内核固件，默认主题为Argon；
          - 该固件在ImmortalWrt/LibWrt的基础上，添加了额外的软件包，并添加了若干工具，具体详见对应机型的config。
          - 💻 固件源码: ${{ env.REPO_URL }}
          - 💝 源码分支: ${{ env.REPO_BRANCH }}
          - 🌐 默认地址: **192.168.111.1**
          - 🔑 默认密码: none
          - 🚀 WiFi名称: **Star**
          - 🔑 WiFi密码: 12345678
          ### 📒 固件版本
          - 固件内核版本：**${{ env.VERSION_KERNEL }}**
          - 固件编译前最后一次➦[主源码](${{ env.REPO_URL }})更新记录
          - ${{ env.VERSION_INFO }}

    - name: Delete Old Cache(删除旧缓存)
      run: |
        # 获取缓存列表并删除
        gh cache list --key ${{ env.SOURCE_REPO }}-${{ env.DEVICE_TARGET }}- --json key --jq '.[] | .key' | while read -r key; do
          gh cache delete "$key"
        done
        # 输出缓存状态
        echo "========cache status========"
        echo "ccache: $(du -sh $SOURCE_PATH/.ccache | cut -f 1)"
        echo "staging: $(du -sh $SOURCE_PATH/staging_dir | cut -f 1)"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
