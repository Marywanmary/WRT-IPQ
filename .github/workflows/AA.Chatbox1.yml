name: Auto_Build_ipq60xx.Chatbox

on:
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug mode'
        required: false
        default: 'false'
        type: boolean

env:
  REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
  TZ: Asia/Shanghai
  TAG: ipq60xx
  UPLOAD_BIN_DIR: false

jobs:
  build:
    runs-on: ubuntu-22.04
    
    strategy:
      matrix:
        REPO_SHORT: ['ImmWrt', 'OpenWrt', 'LibWrt']
        CONFIG_TYPE: ['Pro', 'Max', 'Ultra']
        include:
          - REPO_SHORT: 'ImmWrt'
            url: 'https://github.com/laipeng668/immortalwrt.git'
            branch: 'master'
          - REPO_SHORT: 'OpenWrt'
            url: 'https://github.com/laipeng668/openwrt.git'
            branch: 'master'
          - REPO_SHORT: 'LibWrt'
            url: 'https://github.com/laipeng668/openwrt-6.x.git'
            branch: 'k6.12-nss'
    
    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization Environment(初始化环境)
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -y update
        sudo -E apt-get -y install $(curl -fsSL is.gd/depends_ubuntu_2204)
        sudo -E systemctl daemon-reload
        sudo -E apt-get -y autoremove --purge
        sudo -E apt-get -y clean
        sudo timedatectl set-timezone "$TZ"
        
    - name: Free up disk space before build
      run: |
        echo "Freeing up disk space..."
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo apt-get clean
        docker system prune -a -f
        sudo -E apt-get -y autoremove --purge
        sudo -E apt-get -y clean
        df -h
        
    - name: Check disk space
      run: |
        df -h
        AVAILABLE_SPACE=$(df -BG --output=avail . | tail -1 | tr -d 'G ')
        echo "Available space: ${AVAILABLE_SPACE}GB"
        
    - name: Clone source code
      run: |
        git clone ${{ matrix.url }} -b ${{ matrix.branch }} openwrt
        cd openwrt
        echo "OPENWRT_PATH=$(pwd)" >> $GITHUB_ENV
        
    - name: Generate file list
      run: |
        cd $OPENWRT_PATH
        find . -type f -not -path './.git/*' | sort > oplist.txt
        
    - name: Load configuration
      run: |
        cd $OPENWRT_PATH
        
        echo "=== Loading configuration files ==="
        
        # Base configs for all repos
        echo "Loading General.config"
        cat ../configs/General.config > .config
        echo "Loading ipq60xx.config"
        cat ../configs/ipq60xx.config >> .config
        
        # Add configs based on CONFIG_TYPE
        if [ "${{ matrix.CONFIG_TYPE }}" == "Pro" ]; then
          echo "Loading Pro.config"
          cat ../configs/Pro.config >> .config
        elif [ "${{ matrix.CONFIG_TYPE }}" == "Max" ]; then
          echo "Loading Max.config"
          cat ../configs/Max.config >> .config
        elif [ "${{ matrix.CONFIG_TYPE }}" == "Ultra" ]; then
          echo "Loading Max.config"
          cat ../configs/Max.config >> .config
          echo "Loading Ultra.config"
          cat ../configs/Ultra.config >> .config
        fi
        
        # Add LibWrt specific config if REPO_SHORT is LibWrt
        if [ "${{ matrix.REPO_SHORT }}" == "LibWrt" ]; then
          # Check if LibWrt.config exists, if not create an empty one
          if [ -f ../configs/LibWrt.config ]; then
            echo "Loading LibWrt.config"
            cat ../configs/LibWrt.config >> .config
          else
            echo "Creating empty LibWrt specific configuration"
            echo "# LibWrt specific configuration" >> .config
            echo "# CONFIG_TARGET_ipq60xx=y" >> .config
          fi
        fi
        
        # Enable debug mode if requested
        if [ "${{ github.event.inputs.debug }}" == "true" ]; then
          echo "Enabling debug mode"
          echo "CONFIG_DEBUG=y" >> .config
        fi
        
        echo "=== Configuration files loaded ==="
        echo "=== Final .config content ==="
        cat .config
        echo "=== End of .config content ==="
        
    - name: Load Custom Configuration(加载自定义配置)
      run: |
        chmod +x $GITHUB_WORKSPACE/scripts/Script.sh
        cd $OPENWRT_PATH
        $GITHUB_WORKSPACE/scripts/Script.sh
        
    - name: Update feeds
      run: |
        cd $OPENWRT_PATH
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
    - name: Generate configuration
      run: |
        cd $OPENWRT_PATH
        make defconfig
        
    - name: Free up disk space before download
      run: |
        df -h
        AVAILABLE_SPACE=$(df -BG --output=avail . | tail -1 | tr -d 'G ')
       
