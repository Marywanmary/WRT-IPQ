name: ipq60xx-Matrix-Build

on:
  workflow_dispatch:
  schedule:
    - cron: 0 16 * * 4  # 每周四16点触发

permissions:
  contents: write

env:
  TZ: Asia/Shanghai
  FIRMWARE_TAG: ipq60xx

jobs:
  Build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false  # 一个作业失败不影响其他作业
      matrix:
        repo:
          - name: ImmWrt
            url: https://github.com/laipeng668/immortalwrt.git
            branch: master
          - name: OpenWrt
            url: https://github.com/laipeng668/openwrt.git
            branch: master
          - name: LibWrt
            url: https://github.com/laipeng668/openwrt-6.x
            branch: k6.12-nss
        config:
          - name: Pro
            file: configs/ipq60xx_Pro.config
          - name: Max
            file: configs/ipq60xx_Max.config
          - name: Ultra
            file: configs/ipq60xx_Ultra.config
      max-parallel: 9  # 充分利用GitHub Actions并发能力
    
    steps:
    - name: Check Dependencies
      run: |
        # 检查必要工具是否安装
        for cmd in curl git gh sed awk; do
          command -v $cmd >/dev/null 2>&1 || { echo "Error: $cmd is required but not installed."; exit 1; }
        done
        echo "All dependencies are installed."

    - name: Initialization Environment(初始化环境)
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -y update
        sudo -E apt-get -y install $(curl -fsSL is.gd/depends_ubuntu_2204)
        sudo -E systemctl daemon-reload
        sudo -E apt-get -y autoremove --purge
        sudo -E apt-get -y clean
        sudo timedatectl set-timezone "$TZ"

    - name: Checkout(检出代码)
      uses: actions/checkout@v4

    - name: Clone Source Code(克隆源代码)
      env:
        REPO_URL: ${{ matrix.repo.url }}
        REPO_BRANCH: ${{ matrix.repo.branch }}
      run: |
        set -e  # 遇到错误立即退出
        df -hT $GITHUB_WORKSPACE
        sudo mkdir -p /mnt/openwrt
        sudo chown -R $(id -u):$(id -g) /mnt/openwrt
        git clone --depth 1 -b $REPO_BRANCH --single-branch $REPO_URL /mnt/openwrt
        cd /mnt/openwrt
        echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV
        VERSION_INFO=$(git show -s --date=short --format="作者: %an<br/>时间: %cd<br/>内容: %s<br/>hash: %H")
        echo "VERSION_INFO=$VERSION_INFO" >> $GITHUB_ENV
        # 根据不同仓库提取内核版本
        if [[ "${{ matrix.repo.name }}" == "LibWrt" ]]; then
          VERSION_KERNEL=$(grep -oP 'LINUX_KERNEL_HASH-\K[0-9]+\.[0-9]+\.[0-9]+' target/linux/generic/kernel-6.12 || echo "6.12")
        else
          VERSION_KERNEL=$(grep -oP 'LINUX_KERNEL_HASH-\K[0-9]+\.[0-9]+\.[0-9]+' target/linux/generic/kernel-6.12 || echo "6.12")
        fi
        echo "VERSION_KERNEL=$VERSION_KERNEL" >> $GITHUB_ENV

    - name: Generate Variables(生成变量)
      env:
        REPO_URL: ${{ matrix.repo.url }}
        REPO_BRANCH: ${{ matrix.repo.branch }}
        REPO_SHORT: ${{ matrix.repo.name }}
        CONFIG_FILE: ${{ matrix.config.file }}
      run: |
        set -e
        echo "CONFIG_FILE=$CONFIG_FILE" >> $GITHUB_ENV
        SOURCE_REPO="$(echo $REPO_URL | awk -F '/' '{print $(NF)}')"
        echo "SOURCE_REPO=$SOURCE_REPO" >> $GITHUB_ENV
        echo "CONFIG_TYPE=$(basename $CONFIG_FILE .config)" >> $GITHUB_ENV

    - name: Merge Config for LibWrt
      if: matrix.repo.name == 'LibWrt'
      run: |
        set -e
        # 创建合并后的配置文件
        MERGED_CONFIG="$GITHUB_WORKSPACE/merged_${{ matrix.config.name }}.config"
        echo "合并配置文件: ${{ matrix.config.file }} + configs/LibWrt.config"
        
        # 检查特定配置文件是否存在
        if [ ! -f "$GITHUB_WORKSPACE/${{ matrix.config.file }}" ]; then
          echo "错误: 特定配置文件 ${{ matrix.config.file }} 不存在"
          exit 1
        fi
        
        # 检查基础配置文件是否存在
        if [ ! -f "$GITHUB_WORKSPACE/configs/LibWrt.config" ]; then
          echo "错误: 基础配置文件 configs/LibWrt.config 不存在"
          exit 1
        fi
        
        # 合并配置文件：特定配置 + 基础配置（LibWrt.config覆盖）
        cat "$GITHUB_WORKSPACE/${{ matrix.config.file }}" > "$MERGED_CONFIG"
        cat "$GITHUB_WORKSPACE/configs/LibWrt.config" >> "$MERGED_CONFIG"
        
        # 更新CONFIG_FILE环境变量为合并后的文件
        echo "CONFIG_FILE=$MERGED_CONFIG" >> $GITHUB_ENV
        echo "合并后的配置文件已创建: $MERGED_CONFIG"
        
        # 显示合并后的配置文件大小和行数
        echo "合并后配置文件大小: $(wc -c < "$MERGED_CONFIG") 字节"
        echo "合并后配置文件行数: $(wc -l < "$MERGED_CONFIG") 行"

    - name: Load Custom Configuration(加载自定义配置)
      env:
        CONFIG_FILE: ${{ env.CONFIG_FILE }}
        DIY_SCRIPT: scripts/Script.sh
      run: |
        set -e
        # 检查配置文件是否存在
        if [ ! -f "$CONFIG_FILE" ]; then
          echo "错误: 配置文件 $CONFIG_FILE 不存在"
          exit 1
        fi
        
        # 加载配置文件
        cat $CONFIG_FILE > $OPENWRT_PATH/.config
        chmod +x $DIY_SCRIPT
        cd $OPENWRT_PATH
        
        # 运行自定义脚本
        $GITHUB_WORKSPACE/$DIY_SCRIPT

    - name: Generate Variables After Config Load
      run: |
        set -e
        cd $OPENWRT_PATH
        make defconfig > /dev/null 2>&1
        # 只保留HASH变量，删除DEVICE_TARGET和DEVICE_SUBTARGET
        echo "HASH=$(git log -1 --pretty=format:'%h')" >> $GITHUB_ENV

    - name: Cache Toolchain(缓存工具链)
      uses: actions/cache@v4
      with:
        key: ${{ matrix.repo.name }}-${{ env.HASH }}-${{ matrix.config.name }}
        restore-keys: |
          ${{ matrix.repo.name }}-
        path: |
          ${{ env.OPENWRT_PATH }}/.ccache
          ${{ env.OPENWRT_PATH }}/staging_dir

    - name: Refresh The Cache(刷新缓存)
      run: |
        if [ -d "$OPENWRT_PATH/staging_dir" ]; then
          find "$OPENWRT_PATH/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r dir; do
              find "$dir" -type f -exec touch {} +
          done
        fi

    - name: Install Feeds(安装feeds)
      run: |
        set -e
        cd $OPENWRT_PATH
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Download DL Package(下载DL软件包)
      run: |
        set -e
        cd $OPENWRT_PATH
        make defconfig
        make download -j$(nproc)
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile Firmware(开始编译固件)
      id: compile
      env:
        REPO_SHORT: ${{ matrix.repo.name }}
        CONFIG_TYPE: ${{ env.CONFIG_TYPE }}
      run: |
        set -e
        cd $OPENWRT_PATH
        echo -e "$(nproc) thread compile"
        if make -j$(nproc); then
          echo "编译成功完成"
        elif make -j1; then
          echo "编译成功完成(使用-j1)"
        elif make -j1 V=s; then
          echo "编译成功完成(使用-j1 V=s)"
        else
          echo "编译失败"
          echo "status=failed" >> $GITHUB_OUTPUT
          exit 1
        fi
        echo "status=success" >> $GITHUB_OUTPUT
        echo "DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV
        echo "FILE_DATE=$(date +"%Y.%m.%d")" >> $GITHUB_ENV

    - name: Check Space Usage(检查空间使用情况)
      if: (!cancelled())
      run: df -hT

    - name: Organize Files(整理文件)
      if: steps.compile.outputs.status == 'success'
      env:
        REPO_SHORT: ${{ matrix.repo.name }}
        CONFIG_TYPE: ${{ env.CONFIG_TYPE }}
      run: |
        set -e
        cd $OPENWRT_PATH/bin/targets/*/*
        
        # 确保无论如何都设置FIRMWARE_PATH（修复格式错误）
        echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV
        
        # 首先列出目录中的所有文件，以便调试
        echo "目录中的所有文件:"
        ls -la
        
        # 重命名配置和清单文件 - 查找所有可能的文件名
        echo "处理配置和清单文件..."
        
        # 查找所有.config文件（可能包含FIRMWARE_TAG或其他名称）
        config_files=$(find . -maxdepth 1 -name "*.config" -type f)
        if [ -n "$config_files" ]; then
          for config_file in $config_files; do
            echo "找到配置文件: $config_file"
            new_name="$REPO_SHORT-$CONFIG_TYPE.config"
            echo "重命名 $config_file 为 $new_name"
            mv "$config_file" "$new_name"
          done
        else
          echo "警告: 未找到任何.config文件"
        fi
        
        # 查找所有.config.buildinfo文件（修复查找逻辑）
        buildinfo_files=$(find . -maxdepth 1 -name "*.buildinfo" -type f | grep -v "feeds.buildinfo" | grep -v "version.buildinfo")
        if [ -n "$buildinfo_files" ]; then
          for buildinfo_file in $buildinfo_files; do
            echo "找到构建信息文件: $buildinfo_file"
            new_name="$REPO_SHORT-$CONFIG_TYPE.config.buildinfo"
            echo "重命名 $buildinfo_file 为 $new_name"
            mv "$buildinfo_file" "$new_name"
          done
        else
          echo "警告: 未找到任何.config.buildinfo文件"
        fi
        
        # 查找所有.manifest文件
        manifest_files=$(find . -maxdepth 1 -name "*.manifest" -type f)
        if [ -n "$manifest_files" ]; then
          for manifest_file in $manifest_files; do
            echo "找到清单文件: $manifest_file"
            new_name="$REPO_SHORT-$CONFIG_TYPE.manifest"
            echo "重命名 $manifest_file 为 $new_name"
            mv "$manifest_file" "$new_name"
          done
        else
          echo "警告: 未找到任何.manifest文件"
        fi
        
        # 收集ipk/apk文件
        mkdir -p packages-temp
        mv -f $OPENWRT_PATH/bin/packages/*/*/*.apk packages-temp/ 2>/dev/null || true
        mv -f $OPENWRT_PATH/bin/packages/*/*/*.ipk packages-temp/ 2>/dev/null || true
        
        # --- 重命名所有.bin文件 ---
        echo "重命名所有.bin文件"
        for file in *.bin; do
          if [ -f "$file" ]; then
            original_name="$file"
            echo "处理文件: $original_name"
            
            # 通用文件名解析函数
            parse_filename() {
              local filename="$1"
              local name_without_suffix="${filename%.bin}"
              
              # 尝试提取设备型号和固件类型
              # 模式1: 包含"-squashfs-"的文件名
              if [[ "$name_without_suffix" == *"-squashfs-"* ]]; then
                # 提取"-squashfs-"之前的部分作为设备型号
                device_part="${name_without_suffix%%-squashfs-*}"
                # 提取"-squashfs-"之后的部分作为固件类型
                firmware_type="${name_without_suffix#*-squashfs-}"
              else
                # 模式2: 不包含"-squashfs-"的文件名
                # 使用最后一个"-"分割
                device_part="${name_without_suffix%-*}"
                firmware_type="${name_without_suffix##*-}"
              fi
              
              # 清理设备型号中的前缀（如libwrt-qualcommax-ipq60xx-）
              # 移除常见前缀
              device_part="${device_part#libwrt-qualcommax-ipq60xx-}"
              device_part="${device_part#immortalwrt-qualcommax-ipq60xx-}"
              device_part="${device_part#openwrt-qualcommax-ipq60xx-}"
              
              echo "$device_part|$firmware_type"
            }
            
            # 解析文件名
            parsed_result=$(parse_filename "$original_name")
            device_part=$(echo "$parsed_result" | cut -d'|' -f1)
            firmware_type=$(echo "$parsed_result" | cut -d'|' -f2)
            
            # 验证解析结果
            if [ -z "$device_part" ] || [ -z "$firmware_type" ]; then
              echo "警告: 无法从文件名 $original_name 中提取设备型号和固件类型，跳过重命名"
              continue
            fi
            
            # 构建新文件名，不再添加REPO_SHORT前缀，因为原始文件名已经包含了仓库信息
            newname="${device_part}-${firmware_type}-${CONFIG_TYPE}.bin"
            echo "重命名 $original_name 为 $newname"
            mv "$original_name" "$newname"
          else
            echo "警告: 没有找到.bin文件"
          fi
        done
        
        # 打包ipk/apk文件
        if [ -d "packages-temp" ] && [ "$(ls -A packages-temp)" ]; then
          tar -zcf $REPO_SHORT-$CONFIG_TYPE-packages.tar.gz -C packages-temp .
          rm -rf packages-temp
        fi
        
        # 显示最终目录内容
        echo "最终目录内容:"
        ls -la

    - name: Debug Before Upload
      if: steps.compile.outputs.status == 'success'
      run: |
        echo "编译状态: ${{ steps.compile.outputs.status }}"
        echo "FIRMWARE_PATH: ${{ env.FIRMWARE_PATH }}"
        echo "目录内容:"
        ls -la ${{ env.FIRMWARE_PATH }}
        echo "检查.bin文件:"
        find ${{ env.FIRMWARE_PATH }} -name "*.bin" -type f
        echo "检查.config文件:"
        find ${{ env.FIRMWARE_PATH }} -name "*.config" -type f

    - name: Upload Firmware as Artifact
      if: steps.compile.outputs.status == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: firmware-${{ matrix.repo.name }}-${{ matrix.config.name }}
        path: |
          ${{ env.FIRMWARE_PATH }}/*.bin
          ${{ env.FIRMWARE_PATH }}/*.config
          ${{ env.FIRMWARE_PATH }}/*.config.buildinfo
          ${{ env.FIRMWARE_PATH }}/*.manifest
          ${{ env.FIRMWARE_PATH }}/*-packages.tar.gz
        retention-days: 14

    - name: Delete Old Cache
      if: always()
      run: |
        # 为当前仓库清理缓存
        echo "清理缓存: ${{ matrix.repo.name }}"
        
        # 使用简化的缓存键前缀
        REPO_NAME="${{ matrix.repo.name }}"
        CONFIG_NAME="${{ matrix.config.name }}"
        
        echo "仓库: $REPO_NAME"
        echo "配置: $CONFIG_NAME"
        
        # 构建缓存键前缀（匹配简化后的格式）
        CACHE_PREFIX="${REPO_NAME}-${CONFIG_NAME}-"
        echo "缓存键前缀: $CACHE_PREFIX"
        
        # 获取缓存列表并删除，忽略错误
        gh cache list --key "$CACHE_PREFIX" --json key --jq '.[] | .key' | while read -r key; do
          echo "尝试删除缓存: $key"
          if ! gh cache delete "$key" &>/dev/null; then
            echo "删除缓存失败: $key (可能已被删除或无权限)"
          else
            echo "成功删除缓存: $key"
          fi
        done
        
        # 输出缓存状态
        echo "========cache status========"
        echo "ccache: $(du -sh $OPENWRT_PATH/.ccache 2>/dev/null | cut -f1 || echo "N/A")"
        echo "staging: $(du -sh $OPENWRT_PATH/staging_dir 2>/dev/null | cut -f1 || echo "N/A")"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true  # 即使这一步失败，也继续执行

  # 新增作业：检查编译结果并创建Release
  Create-Release:
    needs: Build
    runs-on: ubuntu-latest
    steps:
    - name: Check Build Results
      id: check-builds
      run: |
        echo "检查构建结果..."
        echo "当前运行ID: ${{ github.run_id }}"
        
        # 获取运行状态
        echo "运行状态:"
        gh run view ${{ github.run_id }} --json status,conclusion --jq '. | {status: .status, conclusion: .conclusion}'
        
        # 获取作业列表
        echo "作业列表:"
        gh run view ${{ github.run_id }} --json jobs --jq '.jobs[] | {name: .name, status: .status, conclusion: .conclusion}'
        
        # 创建临时目录存储artifact列表
        mkdir -p artifacts-list
        
        # 尝试下载所有artifacts
        echo "尝试下载artifacts..."
        gh run download ${{ github.run_id }} --dir artifacts-list --name "*" 2>&1 || echo "下载artifacts时出错"
        
        # 检查artifacts
        echo "artifacts目录内容:"
        ls -la artifacts-list/ || echo "artifacts目录不存在或为空"
        
        # 检查预期的artifact数量（3个仓库 × 3个配置 = 9个）
        expected_artifacts=9
        actual_artifacts=$(ls artifacts-list/ 2>/dev/null | wc -l)
        
        echo "预期artifact数量: $expected_artifacts"
        echo "实际artifact数量: $actual_artifacts"
        
        # 如果实际artifact数量等于预期数量，说明所有构建都成功
        if [ "$actual_artifacts" -eq "$expected_artifacts" ]; then
          echo "所有构建作业成功"
          echo "all_builds_success=true" >> $GITHUB_OUTPUT
        else
          echo "部分构建作业失败"
          echo "all_builds_success=false" >> $GITHUB_OUTPUT
          
          # 列出失败的构建作业
          echo "失败的构建作业:"
          for repo in ImmWrt OpenWrt LibWrt; do
            for config in Pro Max Ultra; do
              artifact_name="firmware-$repo-$config"
              if [ ! -d "artifacts-list/$artifact_name" ]; then
                echo "- $repo-$config"
              fi
            done
          done
        fi
        
        # 清理临时目录
        rm -rf artifacts-list
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Generate release tag
      id: tag
      if: steps.check-builds.outputs.all_builds_success == 'true'
      run: echo "tag=ipq60xx-$(date '+%Y%m%d-%H%M%S')-$(echo $RANDOM | cut -c1-4)" >> $GITHUB_OUTPUT

    - name: Download all artifacts
      if: steps.check-builds.outputs.all_builds_success == 'true'
      uses: actions/download-artifact@v4
      with:
        path: all-artifacts
        merge-multiple: false

    - name: Prepare release files
      if: steps.check-builds.outputs.all_builds_success == 'true'
      run: |
        set -e
        mkdir -p release-files
        mkdir -p merged-packages
        
        # 创建固件信息文件
        echo "## ipq60xx 固件发布" > release-info.md
        echo "" >> release-info.md
        echo "**发布日期**: $(date '+%Y-%m-%d %H:%M:%S')" >> release-info.md
        echo "" >> release-info.md
        echo "### 固件列表" >> release-info.md
        echo "" >> release-info.md
        echo "| 仓库 | 配置 | 设备 | 类型 | 文件名 |" >> release-info.md
        echo "|------|------|------|------|--------|" >> release-info.md
        
        # 遍历所有artifact目录，处理.bin文件
        find all-artifacts -name "*.bin" | while read file; do
          filename=$(basename "$file")
          # 从文件名提取信息: jdcloud_re-cs-02-factory-Ultra.bin
          device=$(echo "$filename" | cut -d'-' -f1-3 | tr '-' ' ')
          type=$(echo "$filename" | cut -d'-' -f4)
          config=$(echo "$filename" | cut -d'-' -f5 | cut -d'.' -f1)
          
          # 从目录名获取仓库信息
          repo=$(echo "$file" | awk -F'/' '{print $(NF-1)}' | cut -d'-' -f2)
          
          # 复制.bin文件到统一目录
          cp "$file" release-files/
          
          # 记录信息
          echo "| $repo | $config | $device | $type | $filename |" >> release-info.md
        done
        
        # 收集所有config、config.buildinfo、manifest文件
        find all-artifacts -name "*.config" ! -name "*packages*" -exec cp {} release-files/ \;
        find all-artifacts -name "*.config.buildinfo" -exec cp {} release-files/ \;
        find all-artifacts -name "*.manifest" -exec cp {} release-files/ \;
        
        # 合并所有packages文件（剔除重复项）
        echo "### 软件包信息" >> release-info.md
        echo "" >> release-info.md
        echo "本Release包含以下软件包（已剔除重复项）：" >> release-info.md
        echo "" >> release-info.md
        echo "| 软件包名 | 版本 | 大小 | 来源任务 |" >> release-info.md
        echo "|---------|------|------|--------|" >> release-info.md
        
        # 创建临时目录用于合并软件包
        mkdir -p temp-packages
        
        # 处理所有packages文件
        find all-artifacts -name "*-packages.tar.gz" | while read pkg_file; do
          # 提取任务名称
          task_name=$(basename "$pkg_file" | sed 's/-packages.tar.gz$//')
          
          # 解压到临时目录
          mkdir -p "temp-$task_name"
          tar -zxf "$pkg_file" -C "temp-$task_name"
          
          # 处理每个软件包
          find "temp-$task_name" -type f | while read pkg; do
            pkg_name=$(basename "$pkg")
            pkg_size=$(du -h "$pkg" | cut -f1)
            
            # 检查是否已存在同名软件包
            if [ -f "temp-packages/$pkg_name" ]; then
              echo "跳过重复软件包: $pkg_name (来自 $task_name)"
            else
              # 复制软件包到合并目录
              cp "$pkg" "temp-packages/"
              
              # 提取版本信息（如果可能）
              if [[ "$pkg_name" == *.ipk ]]; then
                version=$(tar -tzf "$pkg" control/control 2>/dev/null | grep "^Version:" | cut -d' ' -f2 2>/dev/null || echo "N/A")
              elif [[ "$pkg_name" == *.apk ]]; then
                version="N/A"  # 简化处理，避免依赖aapt
              else
                version="N/A"
              fi
              
              # 记录软件包信息
              echo "| $pkg_name | $version | $pkg_size | $task_name |" >> release-info.md
            fi
          done
          
          # 清理临时目录
          rm -rf "temp-$task_name"
        done
        
        # 打包合并后的软件包
        if [ -d "temp-packages" ] && [ "$(ls -A temp-packages)" ]; then
          tar -zcf release-files/packages.tar.gz -C temp-packages .
          echo "" >> release-info.md
          echo "**注意**: 所有软件包已合并到 `packages.tar.gz` 文件中。" >> release-info.md
        else
          echo "" >> release-info.md
          echo "**注意**: 未找到任何软件包。" >> release-info.md
        fi
        
        # 清理临时目录
        rm -rf temp-packages

    - name: Create Release and Upload Files
      if: steps.check-builds.outputs.all_builds_success == 'true'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -e
        # 创建Release并上传所有文件
        gh release create "${{ steps.tag.outputs.tag }}" \
          --title "ipq60xx Firmware $(date '+%Y-%m-%d')" \
          --notes-file release-info.md \
          release-files/*
        
        # 验证Release是否创建成功
        if gh release view "${{ steps.tag.outputs.tag }}" >/dev/null 2>&1; then
          echo "Release创建成功"
        else
          echo "错误: Release创建失败"
          exit 1
        fi

    - name: Notify Build Failures
      if: steps.check-builds.outputs.all_builds_success == 'false'
      run: |
        echo "部分构建作业失败，已跳过Release创建"
        echo "请查看构建日志以获取详细信息"
        echo "失败的构建作业:"
        for repo in ImmWrt OpenWrt LibWrt; do
          for config in Pro Max Ultra; do
            artifact_name="firmware-$repo-$config"
            if [ ! -d "artifacts-list/$artifact_name" ]; then
              echo "- $repo-$config"
            fi
          done
        done
