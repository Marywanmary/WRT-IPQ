name: Auto_Build_ipq60xx

on:
  workflow_dispatch:
  workflow_call:
  schedule:
    - cron: 0 16 * * 4

env:
  # 环境变量配置 - 使用统一的下划线命名约定
  CONFIG_DIR: configs
  SCRIPTS_DIR: scripts
  DIY_SCRIPT_NAME: Script.sh
  OPENWRT_ROOT_DIR: /mnt/openwrt
  TIMEZONE: Asia/Shanghai
  
  # 编译选项
  MAXIMIZE_DISK_SPACE: false
  UPLOAD_BIN_DIR: false
  FIRMWARE_RELEASE: true
  FIRMWARE_TAG: ipq60xx
  CLASH_KERNEL: amd64
  
  # 缓存选项
  CACHE_CCACHE: true
  CACHE_STAGING_DIR: true

jobs:
  Build:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        REPO_SHORT: ['ImmWrt', 'OpenWrt', 'LibWrt']
        CONFIG_TYPE: ['Pro', 'Max', 'Ultra']
        include:
          - REPO_SHORT: 'ImmWrt'
            REPO_URL: 'https://github.com/laipeng668/immortalwrt.git'
            REPO_BRANCH: 'master'
          - REPO_SHORT: 'OpenWrt'
            REPO_URL: 'https://github.com/laipeng668/openwrt.git'
            REPO_BRANCH: 'master'
          - REPO_SHORT: 'LibWrt'
            REPO_URL: 'https://github.com/laipeng668/openwrt-6.x.git'
            REPO_BRANCH: 'k6.12-nss'
    
    name: Building ${{ matrix.REPO_SHORT }}-${{ matrix.CONFIG_TYPE }}
    
    steps:
    - name: Checkout and Setup Environment(检出和设置环境)
      run: |
        # 设置严格错误处理
        set -euo pipefail
        
        # 检查服务器性能
        echo "警告⚠"
        echo "分配的服务器性能有限，若选择的插件过多，务必注意CPU性能！"
        echo -e "已知CPU型号（降序）：7763，8370C，8272CL，8171M，E5-2673 \n"
        echo "--------------------------CPU信息--------------------------"
        echo "CPU物理数量：$(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
        echo -e "CPU核心信息：$(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c) \n"
        echo "--------------------------内存信息--------------------------"
        echo "已安装内存详细信息："
        echo -e "$(sudo lshw -short -C memory | grep GiB) \n"
        echo "--------------------------硬盘信息--------------------------"
        echo "硬盘数量：$(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT

    - name: Maximize Available Disk Space(最大化可用磁盘空间​)
      if: env.MAXIMIZE_DISK_SPACE == 'true'
      uses: AdityaGarg8/remove-unwanted-software@master
      with:
        remove-dotnet: "true"
        remove-android: "true"
        remove-haskell: "true"
        remove-codeql: "true"
        remove-docker-images: "true"
        remove-large-packages: "true"
        remove-cached-tools: "true"
        remove-swapfile: "true"

    - name: Initialize Build Environment(初始化构建环境)
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        set -euo pipefail
        
        # 更新包列表并安装依赖
        sudo -E apt-get -y update
        sudo -E apt-get -y install $(curl -fsSL is.gd/depends_ubuntu_2204)
        sudo -E systemctl daemon-reload
        sudo -E apt-get -y autoremove --purge
        sudo -E apt-get -y clean
        
        # 设置系统时区
        sudo timedatectl set-timezone "$TIMEZONE"
        
        # 验证时区设置
        echo "当前时区: $(timedatectl show --property=Timezone --value)"

    - name: Checkout Source Code(检出源代码)
      uses: actions/checkout@main

    - name: Clone OpenWrt Source(克隆OpenWrt源代码)
      run: |
        set -euo pipefail
        
        # 检查磁盘空间
        df -hT $GITHUB_WORKSPACE
        
        # 创建并设置OpenWrt目录
        sudo mkdir -p ${{ env.OPENWRT_ROOT_DIR }}
        sudo chown -R $(id -u):$(id -g) ${{ env.OPENWRT_ROOT_DIR }}
        
        # 克隆源代码
        git clone --depth 1 -b ${{ matrix.REPO_BRANCH }} --single-branch ${{ matrix.REPO_URL }} ${{ env.OPENWRT_ROOT_DIR }}
        cd ${{ env.OPENWRT_ROOT_DIR }}
        
        # 设置环境变量
        echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV
        
        # 获取版本信息
        VERSION_INFO=$(git show -s --date=short --format="作者: %an<br/>时间: %cd<br/>内容: %s<br/>hash: %H")
        echo "VERSION_INFO=$VERSION_INFO" >> $GITHUB_ENV
        
        # 获取内核版本
        KERNEL_VERSION=""
        for kernel_file in target/linux/generic/kernel-6.12 target/linux/generic/kernel-6.6 target/linux/generic/kernel-6.1; do
          if [ -f "$kernel_file" ]; then
            KERNEL_VERSION=$(grep -oP 'LINUX_KERNEL_HASH-\K[0-9]+\.[0-9]+\.[0-9]+' "$kernel_file")
            break
          fi
        done
        
        [ -z "$KERNEL_VERSION" ] && KERNEL_VERSION="未知版本"
        echo "VERSION_KERNEL=$KERNEL_VERSION" >> $GITHUB_ENV

    - name: Cache Toolchain(缓存工具链)
      if: env.CACHE_CCACHE == 'true' || env.CACHE_STAGING_DIR == 'true'
      uses: actions/cache@main
      with:
        key: toolchain-${{ matrix.REPO_SHORT }}-${{ matrix.CONFIG_TYPE }}-${{ matrix.REPO_BRANCH }}-${{ hashFiles('configs/*.config') }}
        restore-keys: |
          toolchain-${{ matrix.REPO_SHORT }}-${{ matrix.CONFIG_TYPE }}-${{ matrix.REPO_BRANCH }}-
          toolchain-${{ matrix.REPO_SHORT }}-${{ matrix.CONFIG_TYPE }}-
        path: |
          ${{ env.OPENWRT_PATH }}/.ccache
          ${{ env.OPENWRT_PATH }}/staging_dir

    - name: Refresh The Cache(刷新缓存)
      if: env.CACHE_STAGING_DIR == 'true'
      run: |
        set -euo pipefail
        
        [ -d "$OPENWRT_PATH/staging_dir" ] && find "$OPENWRT_PATH/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r dir; do
          find "$dir" -type f -exec touch {} +
        done

    - name: Prepare Configuration(准备配置)
      run: |
        set -euo pipefail
        
        # 通用文件操作函数
        safe_file_op() {
          local op="$1"
          local src="$2"
          local dst="$3"
          
          [ ! -f "$src" ] && { echo "警告: 源文件 $src 不存在"; return 0; }
          
          case "$op" in
            "copy")
              cp "$src" "$dst" || { echo "错误: 无法复制 $src 到 $dst"; return 1; }
              ;;
            "move")
              mv "$src" "$dst" || { echo "错误: 无法移动 $src 到 $dst"; return 1; }
              ;;
            *)
              echo "错误: 不支持的操作: $op"
              return 1
              ;;
          esac
        }
        
        # 配置文件合并函数
        merge_configs() {
          local output_file="$1"
          shift
          local configs=("$@")
          
          echo "# 合并配置文件到 $output_file" > "$output_file"
          for config in "${configs[@]}"; do
            if [ -f "$config" ]; then
              echo "# 包含配置: $config" >> "$output_file"
              cat "$config" >> "$output_file"
            else
              echo "警告: 配置文件 $config 不存在，跳过"
            fi
          done
        }
        
        # 检查必要配置文件
        required_configs=("$GITHUB_WORKSPACE/${{ env.CONFIG_DIR }}/General.config" "$GITHUB_WORKSPACE/${{ env.CONFIG_DIR }}/ipq60xx.config")
        for config in "${required_configs[@]}"; do
          [ ! -f "$config" ] && { echo "错误: 必需的配置文件 $config 不存在"; exit 1; }
        done
        
        # 根据矩阵变量选择配置文件
        declare -a config_files=("$GITHUB_WORKSPACE/${{ env.CONFIG_DIR }}/General.config" "$GITHUB_WORKSPACE/${{ env.CONFIG_DIR }}/ipq60xx.config")
        
        case "${{ matrix.CONFIG_TYPE }}" in
          "Pro")
            config_files+=("$GITHUB_WORKSPACE/${{ env.CONFIG_DIR }}/Pro.config")
            ;;
          "Max")
            config_files+=("$GITHUB_WORKSPACE/${{ env.CONFIG_DIR }}/Max.config")
            ;;
          "Ultra")
            config_files+=("$GITHUB_WORKSPACE/${{ env.CONFIG_DIR }}/Max.config" "$GITHUB_WORKSPACE/${{ env.CONFIG_DIR }}/Ultra.config")
            ;;
          *)
            echo "错误: 未知的配置类型 ${{ matrix.CONFIG_TYPE }}"
            exit 1
            ;;
        esac
        
        # 添加LibWrt特定配置
        if [ "${{ matrix.REPO_SHORT }}" == "LibWrt" ]; then
          [ ! -f "$GITHUB_WORKSPACE/${{ env.CONFIG_DIR }}/LibWrt.config" ] && { echo "错误: LibWrt.config 文件不存在"; exit 1; }
          config_files+=("$GITHUB_WORKSPACE/${{ env.CONFIG_DIR }}/LibWrt.config")
        fi
        
        # 合并配置文件
        merge_configs "$OPENWRT_PATH/.config" "${config_files[@]}"
        
        # 生成其他变量（移除了DEVICE_TARGET和DEVICE_SUBTARGET）
        cd $OPENWRT_PATH
        make defconfig > /dev/null 2>&1
        SOURCE_REPO="$(echo ${{ matrix.REPO_URL }} | awk -F '/' '{print $(NF)}')"
        echo "SOURCE_REPO=$SOURCE_REPO" >> $GITHUB_ENV
        echo "HASH=$(git log -1 --pretty=format:'%h')" >> $GITHUB_ENV
        echo "CACHE_DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV

    - name: Install Feeds(安装feeds)
      run: |
        set -euo pipefail
        
        cd $OPENWRT_PATH
        ./scripts/feeds update -a
        ./scripts/feeds install -a
  
    - name: Load Custom Configuration(加载自定义配置)
      run: |
        set -euo pipefail
        
        # 安全执行DIY脚本
        DIY_SCRIPT="$GITHUB_WORKSPACE/${{ env.SCRIPTS_DIR }}/${{ env.DIY_SCRIPT_NAME }}"
        if [ -f "$DIY_SCRIPT" ]; then
          # 简单的安全检查
          if grep -q "rm -rf /\|wget.*\|curl.*" "$DIY_SCRIPT"; then
            echo "错误: DIY脚本包含潜在危险命令"
            exit 1
          fi
          
          chmod +x "$DIY_SCRIPT"
          cd $OPENWRT_PATH
          "$DIY_SCRIPT"
        else
          echo "警告: DIY脚本不存在，跳过"
        fi

    - name: Download Packages(下载软件包)
      run: |
        set -euo pipefail
        
        cd $OPENWRT_PATH
        make defconfig
        
        # 下载软件包，添加重试机制
        retry_count=3
        retry_delay=30
        
        for ((i=1; i<=retry_count; i++)); do
          if make download -j$(nproc); then
            break
          else
            [ $i -eq $retry_count ] && { echo "错误: 下载软件包失败，已重试 $retry_count 次"; exit 1; }
            echo "警告: 下载软件包失败，$retry_delay 秒后重试 (尝试 $i/$retry_count)"
            sleep $retry_delay
          fi
        done
        
        # 清理过小的文件
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile Firmware(编译固件)
      id: compile
      run: |
        set -euo pipefail
        
        cd $OPENWRT_PATH
        echo -e "$(nproc) thread compile"
        
        # 尝试并行编译，失败后回退到单线程
        make -j$(nproc) || make -j1 V=s
        
        echo "status=success" >> $GITHUB_OUTPUT
        echo "DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV
        echo "FILE_DATE=$(date +"%Y.%m.%d")" >> $GITHUB_ENV

    - name: Check Space Usage(检查空间使用情况)
      if: (!cancelled())
      run: df -hT

    - name: Upload Bin Directory(上传固件)
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      uses: actions/upload-artifact@main
      with:
        name: ${{ env.SOURCE_REPO }}-bin-${{ matrix.REPO_SHORT }}-${{ matrix.CONFIG_TYPE }}-${{ env.FILE_DATE }}
        path: ${{ env.OPENWRT_PATH }}/bin

    - name: Process Artifacts(处理产物)
      if: steps.compile.outputs.status == 'success'
      run: |
        set -euo pipefail
        
        # 通用文件操作函数
        safe_file_op() {
          local op="$1"
          local src="$2"
          local dst="$3"
          
          [ ! -f "$src" ] && { echo "警告: 源文件 $src 不存在"; return 0; }
          
          case "$op" in
            "copy")
              cp "$src" "$dst" || { echo "错误: 无法复制 $src 到 $dst"; return 1; }
              ;;
            "move")
              mv "$src" "$dst" || { echo "错误: 无法移动 $src 到 $dst"; return 1; }
              ;;
            *)
              echo "错误: 不支持的操作: $op"
              return 1
              ;;
          esac
        }
        
        # 列出文件和目录清单
        cd $OPENWRT_PATH
        ls -la > oplist.txt
        
        # 切换到目标目录
        cd $OPENWRT_PATH/bin/targets/*/*
        
        # 复制oplist.txt
        safe_file_op copy "$OPENWRT_PATH/oplist.txt" "./oplist.txt"
        
        # 处理配置文件
        safe_file_op copy "$OPENWRT_PATH/.config" "./${{ matrix.REPO_SHORT }}_${{ matrix.CONFIG_TYPE }}.config"
        safe_file_op move "config.buildinfo" "./${{ matrix.REPO_SHORT }}_${{ matrix.CONFIG_TYPE }}.buildinfo"
        
        # 移动ipk和apk包
        mkdir -p packages
        find "$OPENWRT_PATH/bin/packages" -name "*.ipk" -exec mv -f {} packages/ \; 2>/dev/null || true
        find "$OPENWRT_PATH/bin/packages" -name "*.apk" -exec mv -f {} packages/ \; 2>/dev/null || true
        
        # 打包软件包
        tar -zcf "./${{ matrix.REPO_SHORT }}_${{ matrix.CONFIG_TYPE }}.Packages.tar.gz" packages
        
        # 重命名固件文件
        for file in *.bin; do
          [ ! -f "$file" ] && continue
          
          # 使用正则表达式解析文件名
          if [[ "$file" =~ ^([^-]+)-(.+)$ ]]; then
            suffix="${BASH_REMATCH[2]}"
            
            # 解析后缀部分
            if [[ "$suffix" =~ ^(.+)\.(.+)$ ]]; then
              base="${BASH_REMATCH[1]}"
              ext="${BASH_REMATCH[2]}"
              new_file="${{ matrix.REPO_SHORT }}-${base}_${{ matrix.CONFIG_TYPE }}.${ext}"
              mv "$file" "$new_file" 2>/dev/null || echo "警告: 无法重命名 $file"
            else
              echo "警告: 无法解析文件名 $file 的后缀部分"
            fi
          else
            echo "警告: 文件名 $file 不符合预期格式"
          fi
        done
        
        # 清理不需要的文件
        rm -rf packages feeds.buildinfo version.buildinfo sha256sums profiles.json
        echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV

    - name: Upload Firmware To Artifact(将固件上传到Artifact)
      if: steps.compile.outputs.status == 'success' && env.FIRMWARE_RELEASE != 'true'
      uses: actions/upload-artifact@main
      with:
        name: ${{ env.SOURCE_REPO }}-firmware-${{ matrix.REPO_SHORT }}-${{ matrix.CONFIG_TYPE }}-${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE_PATH }}

    - name: Upload Firmware To Release(发布固件)
      if: steps.compile.outputs.status == 'success' && env.FIRMWARE_RELEASE == 'true'
      uses: ncipollo/release-action@main
      with:
        name: ${{ env.DATE }} for ${{ env.FIRMWARE_TAG }}-${{ matrix.REPO_SHORT }}-${{ matrix.CONFIG_TYPE }}
        allowUpdates: true
        tag: ${{ env.FIRMWARE_TAG }}-${{ matrix.REPO_SHORT }}-${{ matrix.CONFIG_TYPE }}
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: ${{ env.FIRMWARE_PATH }}/*
        body: |
          **This is OpenWrt Firmware for ${{ env.FIRMWARE_TAG }}**
          ### 📒 固件信息
          - 这是${{ matrix.REPO_SHORT }}-${{ matrix.CONFIG_TYPE }}配置的固件，默认主题为Argon；
          - 该固件在ImmortalWrt/LibWrt的基础上，添加了额外的软件包，并添加了若干工具，具体详见对应机型的config。
          - 💻 固件源码: ${{ matrix.REPO_URL }}
          - 💝 源码分支: ${{ matrix.REPO_BRANCH }}
          - 🌐 默认地址: **192.168.111.1**
          - 🔑 默认密码: none
          - 🚀 WiFi名称: **Star**
          - 🔑 WiFi密码: 12345678
          ### 📒 固件版本
          - 固件内核版本：**${{ env.VERSION_KERNEL }}**
          - 固件编译前最后一次➦[主源码](${{ matrix.REPO_URL }})更新记录
          - ${{ env.VERSION_INFO }}

    - name: Delete Old Cache(删除旧缓存)
      if: always()
      run: |
        set -euo pipefail
        
        # 获取缓存列表并删除
        gh cache list --key "toolchain-${{ matrix.REPO_SHORT }}-${{ matrix.CONFIG_TYPE }}-${{ matrix.REPO_BRANCH }}-" --json key --jq '.[] | .key' | while read -r key; do
          gh cache delete "$key"
        done
        
        # 输出缓存状态
        echo "========cache status========"
        echo "ccache: $(du -sh $OPENWRT_PATH/.ccache 2>/dev/null | cut -f 1 || echo 'N/A')"
        echo "staging: $(du -sh $OPENWRT_PATH/staging_dir 2>/dev/null | cut -f 1 || echo 'N/A')"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
