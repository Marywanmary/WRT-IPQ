name: ipq60xx-Matrix-Build

on:
  workflow_dispatch:
  schedule:
    - cron: 0 16 * * 4  # 每周四16点触发

permissions:
  contents: write

env:
  TZ: Asia/Shanghai
  FIRMWARE_TAG: ipq60xx

jobs:
  Build:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        repo:
          - name: ImmWrt
            url: https://github.com/laipeng668/immortalwrt.git
            branch: master
          - name: OpenWrt
            url: https://github.com/laipeng668/openwrt.git
            branch: master
          - name: LibWrt
            url: https://github.com/laipeng668/openwrt-6.x
            branch: k6.12-nss
        config:
          - name: Pro
            file: configs/ipq60xx_Pro.config
          - name: Max
            file: configs/ipq60xx_Max.config
          - name: Ultra
            file: configs/ipq60xx_Ultra.config
      max-parallel: 9  # 增加并发数以处理所有组合
    
    steps:
    - name: Check Dependencies
      run: |
        # 检查必要工具是否安装
        for cmd in curl git gh sed awk; do
          command -v $cmd >/dev/null 2>&1 || { echo "Error: $cmd is required but not installed."; exit 1; }
        done
        echo "All dependencies are installed."

    - name: Initialization Environment(初始化环境)
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -y update
        sudo -E apt-get -y install $(curl -fsSL is.gd/depends_ubuntu_2204)
        # 安装GitHub CLI
        curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
        sudo -E apt-get -y update
        sudo -E apt-get -y install gh
        sudo -E systemctl daemon-reload
        sudo -E apt-get -y autoremove --purge
        sudo -E apt-get -y clean
        sudo timedatectl set-timezone "$TZ"

    - name: Checkout(检出代码)
      uses: actions/checkout@main

    - name: Clone Source Code(克隆源代码)
      env:
        REPO_URL: ${{ matrix.repo.url }}
        REPO_BRANCH: ${{ matrix.repo.branch }}
      run: |
        set -e  # 遇到错误立即退出
        df -hT $GITHUB_WORKSPACE
        sudo mkdir -p /mnt/openwrt
        sudo chown -R $(id -u):$(id -g) /mnt/openwrt
        git clone --depth 1 -b $REPO_BRANCH --single-branch $REPO_URL /mnt/openwrt
        cd /mnt/openwrt
        echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV
        VERSION_INFO=$(git show -s --date=short --format="作者: %an<br/>时间: %cd<br/>内容: %s<br/>hash: %H")
        echo "VERSION_INFO=$VERSION_INFO" >> $GITHUB_ENV
        # 根据不同仓库提取内核版本
        if [[ "${{ matrix.repo.name }}" == "LibWrt" ]]; then
          VERSION_KERNEL=$(grep -oP 'LINUX_KERNEL_HASH-\K[0-9]+\.[0-9]+\.[0-9]+' target/linux/generic/kernel-6.12 || echo "6.12")
        else
          VERSION_KERNEL=$(grep -oP 'LINUX_KERNEL_HASH-\K[0-9]+\.[0-9]+\.[0-9]+' target/linux/generic/kernel-6.12 || echo "6.12")
        fi
        echo "VERSION_KERNEL=$VERSION_KERNEL" >> $GITHUB_ENV

    - name: Generate Variables(生成变量)
      env:
        REPO_URL: ${{ matrix.repo.url }}
        REPO_BRANCH: ${{ matrix.repo.branch }}
        REPO_SHORT: ${{ matrix.repo.name }}
        CONFIG_FILE: ${{ matrix.config.file }}
      run: |
        set -e
        echo "CONFIG_FILE=$CONFIG_FILE" >> $GITHUB_ENV
        SOURCE_REPO="$(echo $REPO_URL | awk -F '/' '{print $(NF)}')"
        echo "SOURCE_REPO=$SOURCE_REPO" >> $GITHUB_ENV
        echo "CONFIG_TYPE=$(basename $CONFIG_FILE .config)" >> $GITHUB_ENV

    - name: Merge Config for LibWrt
      if: matrix.repo.name == 'LibWrt'
      run: |
        set -e
        # 创建合并后的配置文件
        MERGED_CONFIG="$GITHUB_WORKSPACE/merged_${{ matrix.config.name }}.config"
        echo "合并配置文件: ${{ matrix.config.file }} + configs/LibWrt.config"
        
        # 检查特定配置文件是否存在
        if [ ! -f "$GITHUB_WORKSPACE/${{ matrix.config.file }}" ]; then
          echo "错误: 特定配置文件 ${{ matrix.config.file }} 不存在"
          exit 1
        fi
        
        # 检查基础配置文件是否存在
        if [ ! -f "$GITHUB_WORKSPACE/configs/LibWrt.config" ]; then
          echo "错误: 基础配置文件 configs/LibWrt.config 不存在"
          exit 1
        fi
        
        # 合并配置文件：特定配置 + 基础配置（LibWrt.config覆盖）
        cat "$GITHUB_WORKSPACE/${{ matrix.config.file }}" > "$MERGED_CONFIG"
        cat "$GITHUB_WORKSPACE/configs/LibWrt.config" >> "$MERGED_CONFIG"
        
        # 更新CONFIG_FILE环境变量为合并后的文件
        echo "CONFIG_FILE=$MERGED_CONFIG" >> $GITHUB_ENV
        echo "合并后的配置文件已创建: $MERGED_CONFIG"
        
        # 显示合并后的配置文件大小和行数
        echo "合并后配置文件大小: $(wc -c < "$MERGED_CONFIG") 字节"
        echo "合并后配置文件行数: $(wc -l < "$MERGED_CONFIG") 行"

    - name: Load Custom Configuration(加载自定义配置)
      env:
        CONFIG_FILE: ${{ env.CONFIG_FILE }}
        DIY_SCRIPT: scripts/Script.sh
      run: |
        set -e
        # 检查配置文件是否存在
        if [ ! -f "$CONFIG_FILE" ]; then
          echo "错误: 配置文件 $CONFIG_FILE 不存在"
          exit 1
        fi
        
        # 加载配置文件
        cat $CONFIG_FILE > $OPENWRT_PATH/.config
        chmod +x $DIY_SCRIPT
        cd $OPENWRT_PATH
        
        # 运行自定义脚本
        $GITHUB_WORKSPACE/$DIY_SCRIPT

    - name: Generate Variables After Config Load
      run: |
        set -e
        cd $OPENWRT_PATH
        make defconfig > /dev/null 2>&1
        DEVICE_TARGET=$(cat .config | grep CONFIG_TARGET_BOARD | awk -F '"' '{print $2}')
        echo "DEVICE_TARGET=$DEVICE_TARGET" >> $GITHUB_ENV
        DEVICE_SUBTARGET=$(cat .config | grep CONFIG_TARGET_SUBTARGET | awk -F '"' '{print $2}')
        echo "DEVICE_SUBTARGET=$DEVICE_SUBTARGET" >> $GITHUB_ENV
        echo "HASH=$(git log -1 --pretty=format:'%h')" >> $GITHUB_ENV
        echo "CACHE_DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV

    - name: Cache Toolchain(缓存工具链)
      uses: actions/cache@main
      with:
        key: ${{ env.SOURCE_REPO }}-${{ env.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-${{ env.HASH }}-${{ env.CACHE_DATE }}-${{ matrix.repo.name }}-${{ matrix.config.name }}
        restore-keys: ${{ env.SOURCE_REPO }}-${{ env.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-
        path: |
          ${{ env.OPENWRT_PATH }}/.ccache
          ${{ env.OPENWRT_PATH }}/staging_dir

    - name: Refresh The Cache(刷新缓存)
      run: |
        if [ -d "$OPENWRT_PATH/staging_dir" ]; then
          find "$OPENWRT_PATH/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r dir; do
              find "$dir" -type f -exec touch {} +
          done
        fi

    - name: Install Feeds(安装feeds)
      run: |
        set -e
        cd $OPENWRT_PATH
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Download DL Package(下载DL软件包)
      run: |
        set -e
        cd $OPENWRT_PATH
        make defconfig
        make download -j$(nproc)
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile Firmware(开始编译固件)
      id: compile
      env:
        REPO_SHORT: ${{ matrix.repo.name }}
        CONFIG_TYPE: ${{ env.CONFIG_TYPE }}
      run: |
        set -e
        cd $OPENWRT_PATH
        echo -e "$(nproc) thread compile"
        if make -j$(nproc) || make -j1 || make -j1 V=s; then
          echo "status=success" >> $GITHUB_OUTPUT
          echo "编译成功完成"
        else
          echo "status=failed" >> $GITHUB_OUTPUT
          echo "编译失败"
          exit 1
        fi
        echo "DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV
        echo "FILE_DATE=$(date +"%Y.%m.%d")" >> $GITHUB_ENV

    - name: Check Space Usage(检查空间使用情况)
      if: (!cancelled())
      run: df -hT

    - name: Organize Files(整理文件)
      if: steps.compile.outputs.status == 'success'
      env:
        REPO_SHORT: ${{ matrix.repo.name }}
        CONFIG_TYPE: ${{ env.CONFIG_TYPE }}
      run: |
        set -e
        cd $OPENWRT_PATH/bin/targets/*/*
        
        # 重命名配置和清单文件
        mv $FIRMWARE_TAG.config $REPO_SHORT-$CONFIG_TYPE.config || true
        mv $FIRMWARE_TAG.config.buildinfo $REPO_SHORT-$CONFIG_TYPE.config.buildinfo || true
        mv ipq60xx.manifest $REPO_SHORT-$CONFIG_TYPE.manifest || true
        
        # 收集ipk/apk文件
        mkdir -p packages-temp
        mv -f $OPENWRT_PATH/bin/packages/*/*/*.apk packages-temp/ 2>/dev/null || true
        mv -f $OPENWRT_PATH/bin/packages/*/*/*.ipk packages-temp/ 2>/dev/null || true
        
        # --- 重命名所有.bin文件 ---
        echo "重命名所有.bin文件"
        for file in *.bin; do
          if [ -f "$file" ]; then
            original_name="$file"
            echo "处理文件: $original_name"
            
            # 提取设备型号和固件类型
            if [[ "$original_name" == *"jdcloud_re-"* ]]; then
              # 提取设备型号 (如 re-cs-02)
              device_part=$(echo "$original_name" | sed -E 's/.*jdcloud_re-([a-zA-Z0-9_-]+)-squashfs-(.*)\.bin/\1/' || echo "unknown")
              # 提取固件类型 (如 factory/sysupgrade)
              firmware_type=$(echo "$original_name" | sed -E 's/.*jdcloud_re-([a-zA-Z0-9_-]+)-squashfs-(.*)\.bin/\2/' || echo "unknown")
              newname="${REPO_SHORT}-${device_part}-${firmware_type}-${CONFIG_TYPE}.bin"
            elif [[ "$original_name" == *"jdcloud-"* ]]; then
              # 提取设备型号 (如 re-ss-01)
              device_part=$(echo "$original_name" | sed -E 's/.*jdcloud-([a-zA-Z0-9_-]+)-squashfs-(.*)\.bin/\1/' || echo "unknown")
              # 提取固件类型 (如 factory/sysupgrade)
              firmware_type=$(echo "$original_name" | sed -E 's/.*jdcloud-([a-zA-Z0-9_-]+)-squashfs-(.*)\.bin/\2/' || echo "unknown")
              newname="${REPO_SHORT}-${device_part}-${firmware_type}-${CONFIG_TYPE}.bin"
            else
              # 默认情况处理
              # 提取设备型号 (如 re-cs-02)
              device_part=$(echo "$original_name" | sed -E 's/.*immortalwrt-qualcommax-ipq60xx-([a-zA-Z0-9_-]+)-squashfs-(.*)\.bin/\1/' || echo "unknown")
              # 提取固件类型 (如 factory/sysupgrade)
              firmware_type=$(echo "$original_name" | sed -E 's/.*immortalwrt-qualcommax-ipq60xx-([a-zA-Z0-9_-]+)-squashfs-(.*)\.bin/\2/' || echo "unknown")
              newname="${REPO_SHORT}-${device_part}-${firmware_type}-${CONFIG_TYPE}.bin"
            fi
            
            echo "重命名 $original_name 为 $newname"
            mv "$original_name" "$newname"
          else
            echo "警告: 没有找到.bin文件"
          fi
        done
        
        # 打包ipk/apk文件
        if [ -d "packages-temp" ] && [ "$(ls -A packages-temp)" ]; then
          tar -zcf $REPO_SHORT-$CONFIG_TYPE-packages.tar.gz -C packages-temp .
          rm -rf packages-temp
        fi
        
        echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV

    - name: Upload Firmware as Artifact
      if: steps.compile.outputs.status == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: firmware-${{ matrix.repo.name }}-${{ matrix.config.name }}
        path: |
          ${{ env.FIRMWARE_PATH }}/*.bin
          ${{ env.FIRMWARE_PATH }}/*.config
          ${{ env.FIRMWARE_PATH }}/*.config.buildinfo
          ${{ env.FIRMWARE_PATH }}/*.manifest
          ${{ env.FIRMWARE_PATH }}/*-packages.tar.gz
        retention-days: 14

    - name: Delete Old Cache
      if: always()
      run: |
        set -e
        # 为当前仓库清理缓存
        echo "清理缓存: ${{ env.SOURCE_REPO }}"
        gh cache list --key "${{ env.SOURCE_REPO }}-${{ env.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-" --json key --jq '.[] | .key' | while read -r key; do
          gh cache delete "$key"
        done
        
        # 输出缓存状态
        echo "========cache status========"
        echo "ccache: $(du -sh $OPENWRT_PATH/.ccache | cut -f 1)"
        echo "staging: $(du -sh $OPENWRT_PATH/staging_dir | cut -f 1)"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 新增作业：创建Release并上传所有固件
  Create-Release:
    needs: Build
    runs-on: ubuntu-latest
    steps:
    - name: Install GitHub CLI
      run: |
        # 安装GitHub CLI
        curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
        sudo apt-get update
        sudo apt-get install gh

    - name: Generate release tag
      id: tag
      run: echo "tag=ipq60xx-$(date '+%Y%m%d-%H%M%S')-$(echo $RANDOM | cut -c1-4)" >> $GITHUB_OUTPUT

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: all-artifacts
        merge-multiple: false

    - name: Prepare release files
      run: |
        set -e
        mkdir -p release-files
        mkdir -p merged-packages
        
        # 创建固件信息文件
        echo "## ipq60xx 固件发布" > release-info.md
        echo "" >> release-info.md
        echo "**发布日期**: $(date '+%Y-%m-%d %H:%M:%S')" >> release-info.md
        echo "" >> release-info.md
        echo "### 固件列表" >> release-info.md
        echo "" >> release-info.md
        echo "| 仓库 | 配置 | 设备 | 类型 | 文件名 |" >> release-info.md
        echo "|------|------|------|------|--------|" >> release-info.md
        
        # 遍历所有artifact目录，处理.bin文件
        find all-artifacts -name "*.bin" | while read file; do
          filename=$(basename "$file")
          # 从文件名提取信息: ImmWrt-re-cs-02-factory-Pro.bin
          repo=$(echo "$filename" | cut -d'-' -f1)
          device=$(echo "$filename" | cut -d'-' -f2-3 | tr '-' ' ')
          type=$(echo "$filename" | cut -d'-' -f4)
          config=$(echo "$filename" | cut -d'-' -f5 | cut -d'.' -f1)
          
          # 复制.bin文件到统一目录
          cp "$file" release-files/
          
          # 记录信息
          echo "| $repo | $config | $device | $type | $filename |" >> release-info.md
        done
        
        # 收集所有config、config.buildinfo、manifest文件
        find all-artifacts -name "*.config" ! -name "*packages*" -exec cp {} release-files/ \;
        find all-artifacts -name "*.config.buildinfo" -exec cp {} release-files/ \;
        find all-artifacts -name "*.manifest" -exec cp {} release-files/ \;
        
        # 合并所有packages文件（剔除重复项）
        echo "### 软件包信息" >> release-info.md
        echo "" >> release-info.md
        echo "本Release包含以下软件包（已剔除重复项）：" >> release-info.md
        echo "" >> release-info.md
        echo "| 软件包名 | 版本 | 大小 | 来源任务 |" >> release-info.md
        echo "|---------|------|------|--------|" >> release-info.md
        
        # 创建临时目录用于合并软件包
        mkdir -p temp-packages
        
        # 处理所有packages文件
        find all-artifacts -name "*-packages.tar.gz" | while read pkg_file; do
          # 提取任务名称
          task_name=$(basename "$pkg_file" | sed 's/-packages.tar.gz$//')
          
          # 解压到临时目录
          mkdir -p "temp-$task_name"
          tar -zxf "$pkg_file" -C "temp-$task_name"
          
          # 处理每个软件包
          find "temp-$task_name" -type f | while read pkg; do
            pkg_name=$(basename "$pkg")
            pkg_size=$(du -h "$pkg" | cut -f1)
            
            # 检查是否已存在同名软件包
            if [ -f "temp-packages/$pkg_name" ]; then
              echo "跳过重复软件包: $pkg_name (来自 $task_name)"
            else
              # 复制软件包到合并目录
              cp "$pkg" "temp-packages/"
              
              # 提取版本信息（如果可能）
              if [[ "$pkg_name" == *.ipk ]]; then
                version=$(tar -tzf "$pkg" control/control 2>/dev/null | grep "^Version:" | cut -d' ' -f2 2>/dev/null || echo "N/A")
              elif [[ "$pkg_name" == *.apk ]]; then
                version=$(aapt dump badging "$pkg" 2>/dev/null | grep "package: name=" | cut -d"'" -f4 2>/dev/null || echo "N/A")
              else
                version="N/A"
              fi
              
              # 记录软件包信息
              echo "| $pkg_name | $version | $pkg_size | $task_name |" >> release-info.md
            fi
          done
          
          # 清理临时目录
          rm -rf "temp-$task_name"
        done
        
        # 打包合并后的软件包
        if [ -d "temp-packages" ] && [ "$(ls -A temp-packages)" ]; then
          tar -zcf release-files/packages.tar.gz -C temp-packages .
          echo "" >> release-info.md
          echo "**注意**: 所有软件包已合并到 `packages.tar.gz` 文件中。" >> release-info.md
        else
          echo "" >> release-info.md
          echo "**注意**: 未找到任何软件包。" >> release-info.md
        fi
        
        # 清理临时目录
        rm -rf temp-packages

    - name: Create Release and Upload Files
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -e
        # 创建Release并上传所有文件
        gh release create "${{ steps.tag.outputs.tag }}" \
          --title "ipq60xx Firmware $(date '+%Y-%m-%d')" \
          --notes-file release-info.md \
          release-files/*
        
        # 验证Release是否创建成功
        if gh release view "${{ steps.tag.outputs.tag }}" >/dev/null 2>&1; then
          echo "Release创建成功"
        else
          echo "错误: Release创建失败"
          exit 1
        fi

    - name: Delete Old Releases (keep latest 5)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # 保留最新的5个Release，删除旧的
        gh release list --limit 100 --json tagName --jq '.[].tagName' | grep 'ipq60xx-' | sort -r | tail -n +6 | while read tag; do
          echo "删除旧Release: $tag"
          gh release delete "$tag" --yes
        done
