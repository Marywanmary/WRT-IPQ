name: ipq60xx-Matrix-Build1
on:
  workflow_dispatch:
  workflow_call:
  schedule:
    - cron: 0 16 * * 4
permissions:
  contents: write
  packages: write
  actions: write
env:
  REPO_URL: https://github.com/laipeng668/immortalwrt.git
  REPO_BRANCH: master
  REPO_SHORT: ImmWrt
  CONFIG_FILE: configs/ipq60xx_Pro.config
  DIY_SCRIPT: scripts/Script.sh
  CLASH_KERNEL: amd64
  UPLOAD_BIN_DIR: false
  FIRMWARE_RELEASE: true
  FIRMWARE_TAG: ipq60xx
  TZ: Asia/Shanghai
jobs:
  Build:
    runs-on: ubuntu-22.04
    steps:
    - name: Check Server Performance(检查服务器性能)
      run: |
        echo "警告⚠"
        echo "分配的服务器性能有限，若选择的插件过多，务必注意CPU性能！"
        echo -e "已知CPU型号（降序）：7763，8370C，8272CL，8171M，E5-2673 \n"
        echo "--------------------------CPU信息--------------------------"
        echo "CPU物理数量：$(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
        echo -e "CPU核心信息：$(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c) \n"
        echo "--------------------------内存信息--------------------------"
        echo "已安装内存详细信息："
        echo -e "$(sudo lshw -short -C memory | grep GiB) \n"
        echo "--------------------------硬盘信息--------------------------"
        echo "硬盘数量：$(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT
    - name: Initialization Environment(初始化环境)
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -y update
        sudo -E apt-get -y install $(curl -fsSL is.gd/depends_ubuntu_2204)
        sudo -E systemctl daemon-reload
        sudo -E apt-get -y autoremove --purge
        sudo -E apt-get -y clean
        sudo timedatectl set-timezone "$TZ"
    - name: Checkout(检出代码)
      uses: actions/checkout@main
    - name: Clone Source Code(克隆源代码)
      run: |
        df -hT $GITHUB_WORKSPACE
        sudo mkdir -p /mnt/openwrt
        sudo chown -R $(id -u):$(id -g) /mnt/openwrt
        git clone --depth 1 -b $REPO_BRANCH --single-branch $REPO_URL /mnt/openwrt
        cd /mnt/openwrt
        echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV
        VERSION_INFO=$(git show -s --date=short --format="作者: %an<br/>时间: %cd<br/>内容: %s<br/>hash: %H")
        echo "VERSION_INFO=$VERSION_INFO" >> $GITHUB_ENV
        VERSION_KERNEL=$(grep -oP 'LINUX_KERNEL_HASH-\K[0-9]+\.[0-9]+\.[0-9]+' target/linux/generic/kernel-6.12)
        echo "VERSION_KERNEL=$VERSION_KERNEL" >> $GITHUB_ENV
    - name: Generate Variables(生成变量)
      run: |
        cp $CONFIG_FILE $OPENWRT_PATH/.config
        cd $OPENWRT_PATH
        make defconfig > /dev/null 2>&1
        SOURCE_REPO="$(echo $REPO_URL | awk -F '/' '{print $(NF)}')"
        echo "SOURCE_REPO=$SOURCE_REPO" >> $GITHUB_ENV
        DEVICE_TARGET=$(cat .config | grep CONFIG_TARGET_BOARD | awk -F '"' '{print $2}')
        echo "DEVICE_TARGET=$DEVICE_TARGET" >> $GITHUB_ENV
        DEVICE_SUBTARGET=$(cat .config | grep CONFIG_TARGET_SUBTARGET | awk -F '"' '{print $2}')
        echo "DEVICE_SUBTARGET=$DEVICE_SUBTARGET" >> $GITHUB_ENV
        echo "HASH=$(git log -1 --pretty=format:'%h')" >> $GITHUB_ENV
        echo "CACHE_DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV
        # 设置目标目录路径
        echo "TARGET_DIR=$OPENWRT_PATH/bin/targets/$DEVICE_TARGET/$DEVICE_SUBTARGET" >> $GITHUB_ENV
    - name: Cache Toolchain(缓存工具链)
      uses: actions/cache@main
      with:
        key: ${{ env.SOURCE_REPO }}-${{ env.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-${{ env.HASH }} ${{ env.CACHE_DATE }}
        restore-keys: ${{ env.SOURCE_REPO }}-${{ env.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-
        path: |
          ${{ env.OPENWRT_PATH }}/.ccache
          ${{ env.OPENWRT_PATH }}/staging_dir
    - name: Refresh The Cache(刷新缓存)
      run: |
        if [ -d "$OPENWRT_PATH/staging_dir" ]; then
          find "$OPENWRT_PATH/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r dir; do
              find "$dir" -type f -exec touch {} +
          done
        fi
    - name: Install Feeds(安装feeds)
      run: |
        cd $OPENWRT_PATH
        ./scripts/feeds update -a
        ./scripts/feeds install -a
    - name: Load Custom Configuration(加载自定义配置)
      run: |
        cat $CONFIG_FILE > $OPENWRT_PATH/.config
        chmod +x $DIY_SCRIPT
        cd $OPENWRT_PATH
        # 运行自定义脚本
        $GITHUB_WORKSPACE/$DIY_SCRIPT
    - name: Download DL Package(下载DL软件包)
      run: |
        cd $OPENWRT_PATH
        make defconfig
        make download -j$(nproc)
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;
    - name: Compile Firmware(开始编译固件)
      id: compile
      run: |
        cd $OPENWRT_PATH
        echo -e "$(nproc) thread compile"
        if make -j$(nproc) || make -j1 || make -j1 V=s; then
          echo "status=success" >> $GITHUB_OUTPUT
          echo "编译成功完成"
        else
          echo "status=failed" >> $GITHUB_OUTPUT
          echo "编译失败"
          exit 1
        fi
        echo "DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV
        echo "FILE_DATE=$(date +"%Y.%m.%d")" >> $GITHUB_ENV
    - name: Check Space Usage(检查空间使用情况)
      if: (!cancelled())
      run: df -hT
    - name: Check Build Output(检查编译输出)
      if: steps.compile.outputs.status == 'success'
      run: |
        echo "检查编译输出目录结构..."
        echo "OPENWRT_PATH: $OPENWRT_PATH"
        echo "TARGET_DIR: $TARGET_DIR"
        echo "列出bin目录内容:"
        ls -la $OPENWRT_PATH/bin/
        echo "列出targets目录内容:"
        ls -la $OPENWRT_PATH/bin/targets/
        echo "列出设备目标目录内容:"
        ls -la $OPENWRT_PATH/bin/targets/$DEVICE_TARGET/
        echo "检查目标目录是否存在:"
        if [ -d "$TARGET_DIR" ]; then
          echo "目标目录存在"
          ls -la $TARGET_DIR/
        else
          echo "目标目录不存在，尝试查找可能的目录..."
          find $OPENWRT_PATH/bin/targets -type d -name "*$DEVICE_SUBTARGET*"
        fi
    - name: Organize Files(整理文件)
      if: steps.compile.outputs.status == 'success'
      run: |
        # 检查目标目录是否存在，如果不存在则创建
        if [ ! -d "$TARGET_DIR" ]; then
          echo "目标目录不存在，尝试查找可能的目录..."
          POSSIBLE_DIR=$(find $OPENWRT_PATH/bin/targets -type d -name "*$DEVICE_SUBTARGET*" | head -1)
          if [ -n "$POSSIBLE_DIR" ]; then
            echo "找到可能的目录: $POSSIBLE_DIR"
            TARGET_DIR=$POSSIBLE_DIR
            echo "TARGET_DIR=$TARGET_DIR" >> $GITHUB_ENV
          else
            echo "错误: 无法找到目标目录"
            exit 1
          fi
        fi
        
        cd "$TARGET_DIR"
        echo "当前目录: $(pwd)"
        echo "目录内容:"
        ls -la
        
        cp $OPENWRT_PATH/.config $FIRMWARE_TAG.config || true
        mv config.buildinfo $FIRMWARE_TAG.config.buildinfo || true
        mv immortalwrt-qualcommax-ipq60xx.manifest ipq60xx.manifest || true
        mv -f $OPENWRT_PATH/bin/packages/*/*/*.apk packages || true
        mv -f $OPENWRT_PATH/bin/packages/*/*/*.ipk packages || true
        tar -zcf $FIRMWARE_TAG.Packages.tar.gz packages
        rm -rf packages feeds.buildinfo version.buildinfo sha256sums profiles.json
        
        # 从 CONFIG_FILE 变量提取配置类型 (Pro/Max/Ultra)
        CONFIG_TYPE=$(basename "$CONFIG_FILE" .config)
        echo "CONFIG_TYPE=$CONFIG_TYPE"
        
        # --- 重命名所有.bin文件 ---
        echo "重命名所有.bin文件"
        for file in *.bin; do
          if [ -f "$file" ]; then
            original_name="$file"
            echo "处理文件: $original_name"
            
            # 提取设备型号和固件类型
            if [[ "$original_name" == *"jdcloud_re-"* ]]; then
              device_part=$(echo "$original_name" | sed -E 's/.*jdcloud_re-([a-zA-Z0-9_-]+)-squashfs-(.*)\.bin/\1/')
              firmware_type=$(echo "$original_name" | sed -E 's/.*jdcloud_re-([a-zA-Z0-9_-]+)-squashfs-(.*)\.bin/\2/')
              newname="${REPO_SHORT}-${device_part}-${firmware_type}-${FIRMWARE_TAG}-${CONFIG_TYPE}.bin"
            elif [[ "$original_name" == *"jdcloud-"* ]]; then
              device_part=$(echo "$original_name" | sed -E 's/.*jdcloud-([a-zA-Z0-9_-]+)-squashfs-(.*)\.bin/\1/')
              firmware_type=$(echo "$original_name" | sed -E 's/.*jdcloud-([a-zA-Z0-9_-]+)-squashfs-(.*)\.bin/\2/')
              newname="${REPO_SHORT}-${device_part}-${firmware_type}-${FIRMWARE_TAG}-${CONFIG_TYPE}.bin"
            else
              device_part=$(echo "$original_name" | sed -E 's/.*immortalwrt-qualcommax-ipq60xx-([a-zA-Z0-9_-]+)-squashfs-(.*)\.bin/\1/')
              firmware_type=$(echo "$original_name" | sed -E 's/.*immortalwrt-qualcommax-ipq60xx-([a-zA-Z0-9_-]+)-squashfs-(.*)\.bin/\2/')
              newname="${REPO_SHORT}-${device_part}-${firmware_type}-${FIRMWARE_TAG}-${CONFIG_TYPE}.bin"
            fi
            
            echo "重命名 $original_name 为 $newname"
            mv "$original_name" "$newname"
          fi
        done
        echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV
        
        # 收集所有.bin文件路径，每个路径单独一行
        echo "BIN_FILES<<EOF" >> $GITHUB_ENV
        find $PWD -maxdepth 1 -name "*.bin" -type f >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV
    - name: Debug Release Variables(调试Release变量)
      if: steps.compile.outputs.status == 'success'
      run: |
        echo "=== 调试信息 ==="
        echo "FIRMWARE_RELEASE: ${{ env.FIRMWARE_RELEASE }}"
        echo "FIRMWARE_TAG: ${{ env.FIRMWARE_TAG }}"
        echo "FIRMWARE_PATH: ${{ env.FIRMWARE_PATH }}"
        echo "DATE: ${{ env.DATE }}"
        echo "=== BIN_FILES 内容 ==="
        echo "${{ env.BIN_FILES }}"
        echo "=== 检查固件文件 ==="
        ls -la "${{ env.FIRMWARE_PATH }}/"
        echo "=== 检查 .bin 文件 ==="
        find "${{ env.FIRMWARE_PATH }}" -maxdepth 1 -name "*.bin" -type f -exec ls -la {} \;
        echo "=== 检查标签是否存在 ==="
        git tag -l "${{ env.FIRMWARE_TAG }}"
    - name: Upload Firmware To Release(发布固件)
      if: steps.compile.outputs.status == 'success' && env.FIRMWARE_RELEASE == 'true'
      uses: softprops/action-gh-release@v1
      with:
        name: ${{ env.DATE }} for ${{ env.FIRMWARE_TAG }}
        tag_name: ${{ env.FIRMWARE_TAG }}
        files: ${{ env.BIN_FILES }}
        body: |
          **This is OpenWrt Firmware for ${{ env.FIRMWARE_TAG }}**
          ### 📒 固件信息
          - 这是开启全功能NSS的6.12内核固件，默认主题为Argon；该固件在ImmortalWrt的基础上，添加了额外的软件包，并添加了若干工具，具体详见对应机型的config。
          - 💻 这是 ${{ env.FIRMWARE_TAG }} 平台使用的 OpenWrt 固件
          - ⚽ 固件源码: ${{ env.REPO_URL }}
          - 💝 源码分支: ${{ env.REPO_BRANCH }}
          - 🌐 默认地址: **192.168.111.1**
          - 🔑 默认密码: none
          - 🚀 WiFi名称: **Star**
          - 🔑 WiFi密码: 12345678
          ### 🧊 固件版本
          - 固件内核版本：**${{ env.VERSION_KERNEL }}**
          - 固件编译前最后一次➦[主源码](${{ env.REPO_URL }})更新记录
          - ${{ env.VERSION_INFO }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Upload Firmware To Artifact(将固件上传到Artifact)
      if: steps.compile.outputs.status == 'success' && env.FIRMWARE_RELEASE != 'true'
      uses: actions/upload-artifact@main
      with:
        name: ${{ env.SOURCE_REPO }}-firmware-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE_PATH }}
    - name: Delete Old Cache(删除旧缓存)
      if: always()
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set +e
        echo "尝试删除旧缓存..."
        gh cache list --key ${{ env.SOURCE_REPO }}-${{ env.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}- --json key --jq '.[] | .key' | while read -r key; do
          echo "删除缓存: $key"
          gh cache delete "$key"
        done
        
        if [ $? -eq 0 ]; then
          echo "缓存删除成功"
        else
          echo "警告: 缓存删除失败，但工作流将继续"
        fi
        
        echo "========cache status========"
        if [ -d "$OPENWRT_PATH/.ccache" ]; then
          echo "ccache: $(du -sh $OPENWRT_PATH/.ccache | cut -f 1)"
        else
          echo "ccache: 不存在"
        fi
        if [ -d "$OPENWRT_PATH/staging_dir" ]; then
          echo "staging: $(du -sh $OPENWRT_PATH/staging_dir | cut -f 1)"
        else
          echo "staging: 不存在"
        fi
