name: AA.Chatz

on:
  workflow_dispatch:
  workflow_call:
  schedule:
    - cron: 0 16 * * 4

env:
  # 以下变量将在矩阵中被覆盖
  REPO_URL: https://github.com/laipeng668/openwrt-6.x.git
  REPO_BRANCH: k6.12-nss
  # 以下变量保持不变
  CLASH_KERNEL: amd64
  MADS: false
  UPLOAD_BIN_DIR: true
  FIRMWARE_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  Build:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        REPO_SHORT: ['ImmWrt', 'OpenWrt', 'LibWrt']
        CONFIG_TYPE: ['Pro', 'Max', 'Ultra']
        include:
          - REPO_SHORT: 'ImmWrt'
            REPO_URL: 'https://github.com/laipeng668/immortalwrt.git'
            REPO_BRANCH: 'master'
          - REPO_SHORT: 'OpenWrt'
            REPO_URL: 'https://github.com/laipeng668/openwrt.git'
            REPO_BRANCH: 'master'
          - REPO_SHORT: 'LibWrt'
            REPO_URL: 'https://github.com/laipeng668/openwrt-6.x.git'
            REPO_BRANCH: 'k6.12-nss'
    
    # 在job级别设置运行名称，显示正在编译的具体分支和配置
    name: Building ${{ matrix.REPO_SHORT }}-${{ matrix.CONFIG_TYPE }}
    
    steps:
    - name: Check Server Performance(检查服务器性能)
      run: |
        echo "警告⚠"
        echo "分配的服务器性能有限，若选择的插件过多，务必注意CPU性能！"
        echo -e "已知CPU型号（降序）：7763，8370C，8272CL，8171M，E5-2673 \n"
        echo "--------------------------CPU信息--------------------------"
        echo "CPU物理数量：$(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
        echo -e "CPU核心信息：$(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c) \n"
        echo "--------------------------内存信息--------------------------"
        echo "已安装内存详细信息："
        echo -e "$(sudo lshw -short -C memory | grep GiB) \n"
        echo "--------------------------硬盘信息--------------------------"
        echo "硬盘数量：$(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT

    - name: Maximize Available Disk Space(最大化可用磁盘空间​)
      if: env.MADS == 'true'
      uses: AdityaGarg8/remove-unwanted-software@master
      with:
        remove-dotnet: "true"
        remove-android: "true"
        remove-haskell: "true"
        remove-codeql: "true"
        remove-docker-images: "true"
        remove-large-packages: "true"
        remove-cached-tools: "true"
        remove-swapfile: "true"

    - name: Initialization Environment(初始化环境)
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -y update
        sudo -E apt-get -y install $(curl -fsSL is.gd/depends_ubuntu_2204)
        sudo -E systemctl daemon-reload
        sudo -E apt-get -y autoremove --purge
        sudo -E apt-get -y clean
        sudo timedatectl set-timezone "$TZ"

    - name: Checkout(检出代码)
      uses: actions/checkout@main

    - name: Clone Source Code(克隆源代码)
      run: |
        df -hT $GITHUB_WORKSPACE
        sudo mkdir -p /mnt/openwrt
        sudo chown -R $(id -u):$(id -g) /mnt/openwrt
        git clone --depth 1 -b ${{ matrix.REPO_BRANCH }} --single-branch ${{ matrix.REPO_URL }} /mnt/openwrt
        cd /mnt/openwrt
        echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV
        VERSION_INFO=$(git show -s --date=short --format="作者: %an<br/>时间: %cd<br/>内容: %s<br/>hash: %H")
        echo "VERSION_INFO=$VERSION_INFO" >> $GITHUB_ENV
        # 尝试获取内核版本信息，不同仓库可能有不同路径
        if [ -f "target/linux/generic/kernel-6.12" ]; then
          VERSION_KERNEL=$(grep -oP 'LINUX_KERNEL_HASH-\K[0-9]+\.[0-9]+\.[0-9]+' target/linux/generic/kernel-6.12)
        elif [ -f "target/linux/generic/kernel-6.6" ]; then
          VERSION_KERNEL=$(grep -oP 'LINUX_KERNEL_HASH-\K[0-9]+\.[0-9]+\.[0-9]+' target/linux/generic/kernel-6.6)
        elif [ -f "target/linux/generic/kernel-6.1" ]; then
          VERSION_KERNEL=$(grep -oP 'LINUX_KERNEL_HASH-\K[0-9]+\.[0-9]+\.[0-9]+' target/linux/generic/kernel-6.1)
        else
          VERSION_KERNEL="未知版本"
        fi
        echo "VERSION_KERNEL=$VERSION_KERNEL" >> $GITHUB_ENV

    - name: Generate Variables(生成变量)
      run: |
        # 根据矩阵变量选择配置文件
        if [ "${{ matrix.REPO_SHORT }}" == "LibWrt" ]; then
          if [ "${{ matrix.CONFIG_TYPE }}" == "Pro" ]; then
            cat $GITHUB_WORKSPACE/configs/General.config $GITHUB_WORKSPACE/configs/ipq60xx.config $GITHUB_WORKSPACE/configs/Pro.config $GITHUB_WORKSPACE/configs/LibWrt.config > $OPENWRT_PATH/.config
          elif [ "${{ matrix.CONFIG_TYPE }}" == "Max" ]; then
            cat $GITHUB_WORKSPACE/configs/General.config $GITHUB_WORKSPACE/configs/ipq60xx.config $GITHUB_WORKSPACE/configs/Max.config $GITHUB_WORKSPACE/configs/LibWrt.config > $OPENWRT_PATH/.config
          elif [ "${{ matrix.CONFIG_TYPE }}" == "Ultra" ]; then
            cat $GITHUB_WORKSPACE/configs/General.config $GITHUB_WORKSPACE/configs/ipq60xx.config $GITHUB_WORKSPACE/configs/Max.config $GITHUB_WORKSPACE/configs/Ultra.config $GITHUB_WORKSPACE/configs/LibWrt.config > $OPENWRT_PATH/.config
          fi
        else
          if [ "${{ matrix.CONFIG_TYPE }}" == "Pro" ]; then
            cat $GITHUB_WORKSPACE/configs/General.config $GITHUB_WORKSPACE/configs/ipq60xx.config $GITHUB_WORKSPACE/configs/Pro.config > $OPENWRT_PATH/.config
          elif [ "${{ matrix.CONFIG_TYPE }}" == "Max" ]; then
            cat $GITHUB_WORKSPACE/configs/General.config $GITHUB_WORKSPACE/configs/ipq60xx.config $GITHUB_WORKSPACE/configs/Max.config > $OPENWRT_PATH/.config
          elif [ "${{ matrix.CONFIG_TYPE }}" == "Ultra" ]; then
            cat $GITHUB_WORKSPACE/configs/General.config $GITHUB_WORKSPACE/configs/ipq60xx.config $GITHUB_WORKSPACE/configs/Max.config $GITHUB_WORKSPACE/configs/Ultra.config > $OPENWRT_PATH/.config
          fi
        fi
        
        cd $OPENWRT_PATH
        make defconfig > /dev/null 2>&1
        SOURCE_REPO="$(echo ${{ matrix.REPO_URL }} | awk -F '/' '{print $(NF)}')"
        echo "SOURCE_REPO=$SOURCE_REPO" >> $GITHUB_ENV
        DEVICE_TARGET=$(cat .config | grep CONFIG_TARGET_BOARD | awk -F '"' '{print $2}')
        echo "DEVICE_TARGET=$DEVICE_TARGET" >> $GITHUB_ENV
        DEVICE_SUBTARGET=$(cat .config | grep CONFIG_TARGET_SUBTARGET | awk -F '"' '{print $2}')
        echo "DEVICE_SUBTARGET=$DEVICE_SUBTARGET" >> $GITHUB_ENV
        echo "HASH=$(git log -1 --pretty=format:'%h')" >> $GITHUB_ENV
        echo "CACHE_DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV

    - name: Cache Toolchain(缓存工具链)
      uses: actions/cache@main
      with:
        key: ${{ env.SOURCE_REPO }}-${{ matrix.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-${{ matrix.REPO_SHORT }}-${{ matrix.CONFIG_TYPE }}-${{ env.HASH }} ${{ env.CACHE_DATE }}
        restore-keys: ${{ env.SOURCE_REPO }}-${{ matrix.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-${{ matrix.REPO_SHORT }}-${{ matrix.CONFIG_TYPE }}-
        path: |
          ${{ env.OPENWRT_PATH }}/.ccache
          ${{ env.OPENWRT_PATH }}/staging_dir

    - name: Refresh The Cache(刷新缓存)
      run: |
        if [ -d "$OPENWRT_PATH/staging_dir" ]; then
          find "$OPENWRT_PATH/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r dir; do
              find "$dir" -type f -exec touch {} +
          done
        fi

    - name: Install Feeds(安装feeds)
      run: |
        cd $OPENWRT_PATH
        ./scripts/feeds update -a
        ./scripts/feeds install -a
  
    - name: Load Custom Configuration(加载自定义配置)
      run: |
        # 根据矩阵变量重新加载配置文件
        if [ "${{ matrix.REPO_SHORT }}" == "LibWrt" ]; then
          if [ "${{ matrix.CONFIG_TYPE }}" == "Pro" ]; then
            cat $GITHUB_WORKSPACE/configs/General.config $GITHUB_WORKSPACE/configs/ipq60xx.config $GITHUB_WORKSPACE/configs/Pro.config $GITHUB_WORKSPACE/configs/LibWrt.config > $OPENWRT_PATH/.config
          elif [ "${{ matrix.CONFIG_TYPE }}" == "Max" ]; then
            cat $GITHUB_WORKSPACE/configs/General.config $GITHUB_WORKSPACE/configs/ipq60xx.config $GITHUB_WORKSPACE/configs/Max.config $GITHUB_WORKSPACE/configs/LibWrt.config > $OPENWRT_PATH/.config
          elif [ "${{ matrix.CONFIG_TYPE }}" == "Ultra" ]; then
            cat $GITHUB_WORKSPACE/configs/General.config $GITHUB_WORKSPACE/configs/ipq60xx.config $GITHUB_WORKSPACE/configs/Max.config $GITHUB_WORKSPACE/configs/Ultra.config $GITHUB_WORKSPACE/configs/LibWrt.config > $OPENWRT_PATH/.config
          fi
        else
          if [ "${{ matrix.CONFIG_TYPE }}" == "Pro" ]; then
            cat $GITHUB_WORKSPACE/configs/General.config $GITHUB_WORKSPACE/configs/ipq60xx.config $GITHUB_WORKSPACE/configs/Pro.config > $OPENWRT_PATH/.config
          elif [ "${{ matrix.CONFIG_TYPE }}" == "Max" ]; then
            cat $GITHUB_WORKSPACE/configs/General.config $GITHUB_WORKSPACE/configs/ipq60xx.config $GITHUB_WORKSPACE/configs/Max.config > $OPENWRT_PATH/.config
          elif [ "${{ matrix.CONFIG_TYPE }}" == "Ultra" ]; then
            cat $GITHUB_WORKSPACE/configs/General.config $GITHUB_WORKSPACE/configs/ipq60xx.config $GITHUB_WORKSPACE/configs/Max.config $GITHUB_WORKSPACE/configs/Ultra.config > $OPENWRT_PATH/.config
          fi
        fi
        
        chmod +x $GITHUB_WORKSPACE/scripts/Script.sh
        cd $OPENWRT_PATH
        $GITHUB_WORKSPACE/scripts/Script.sh

    - name: Download DL Package(下载DL软件包)
      run: |
        cd $OPENWRT_PATH
        make defconfig
        make download -j$(nproc)
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile Firmware(开始编译固件)
      id: compile
      run: |
        cd $OPENWRT_PATH
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        echo "DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV
        echo "FILE_DATE=$(date +"%Y.%m.%d")" >> $GITHUB_ENV

    - name: Check Space Usage(检查空间使用情况)
      if: (!cancelled())
      run: df -hT

    - name: Upload Bin Directory(上传固件)
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      uses: actions/upload-artifact@main
      with:
        name: ${{ env.SOURCE_REPO }}-bin-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-${{ matrix.REPO_SHORT }}-${{ matrix.CONFIG_TYPE }}-${{ env.FILE_DATE }}
        path: ${{ env.OPENWRT_PATH }}/bin

    - name: Organize Files(整理文件)
      if: steps.compile.outputs.status == 'success'
      run: |
        cd $OPENWRT_PATH
        # 列出$OPENWRT_PATH/文件和目录清单oplist.txt
        ls -la > oplist.txt
        
        cd $OPENWRT_PATH/bin/targets/*/*
        
        # $OPENWRT_PATH/.config 改成$REPO_SHORT加上$CONFIG_TYPE.config
        cp $OPENWRT_PATH/.config ./${{ matrix.REPO_SHORT }}${{ matrix.CONFIG_TYPE }}.config || true
        
        # config.buildinfo 改成$REPO_SHORT加上$CONFIG_TYPE.buildinfo
        mv config.buildinfo ./${{ matrix.REPO_SHORT }}${{ matrix.CONFIG_TYPE }}.buildinfo || true
        
        # 移动ipk和apk包
        mkdir -p packages
        mv -f $OPENWRT_PATH/bin/packages/*/*/*.ipk packages/ || true
        mv -f $OPENWRT_PATH/bin/packages/*/*/*.apk packages/ || true
        
        # ipk包和apk包打包名为$REPO_SHORT加上$CONFIG_TYPE.Packages.tar.gz
        tar -zcf ./${{ matrix.REPO_SHORT }}${{ matrix.CONFIG_TYPE }}.Packages.tar.gz packages
        
        # 修改所有后缀为.bin的固件文件名，在.bin前添加$REPO_SHORT加上$CONFIG_TYPE
        for file in *.bin; do
          if [ -f "$file" ]; then
            mv "$file" "$(basename "$file" .bin)-${{ matrix.REPO_SHORT }}${{ matrix.CONFIG_TYPE }}.bin"
          fi
        done
        
        # 清理不需要的文件
        rm -rf packages feeds.buildinfo version.buildinfo sha256sums profiles.json
        echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV

    - name: Upload Firmware To Artifact(将固件上传到Artifact)
      if: steps.compile.outputs.status == 'success' && env.FIRMWARE_RELEASE != 'true'
      uses: actions/upload-artifact@main
      with:
        name: ${{ env.SOURCE_REPO }}-firmware-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-${{ matrix.REPO_SHORT }}-${{ matrix.CONFIG_TYPE }}-${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE_PATH }}

    - name: Upload Firmware To Release(发布固件)
      if: steps.compile.outputs.status == 'success' && env.FIRMWARE_RELEASE == 'true'
      uses: ncipollo/release-action@main
      with:
        name: ${{ env.DATE }} for ${{ matrix.REPO_SHORT }}-${{ matrix.CONFIG_TYPE }}
        allowUpdates: true
        tag: ${{ matrix.REPO_SHORT }}-${{ matrix.CONFIG_TYPE }}
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: ${{ env.FIRMWARE_PATH }}/*
        body: |
          **This is OpenWrt Firmware for ${{ matrix.REPO_SHORT }}-${{ matrix.CONFIG_TYPE }}**
          ### 📒 固件信息
          - 这是${{ matrix.REPO_SHORT }}-${{ matrix.CONFIG_TYPE }}配置的固件，默认主题为Argon；
          - 该固件在ImmortalWrt/LibWrt的基础上，添加了额外的软件包，并添加了若干工具，具体详见对应机型的config。
          - 💻 固件源码: ${{ matrix.REPO_URL }}
          - 💝 源码分支: ${{ matrix.REPO_BRANCH }}
          - 🌐 默认地址: **192.168.111.1**
          - 🔑 默认密码: none
          - 🚀 WiFi名称: **Star**
          - 🔑 WiFi密码: 12345678
          ### 📒 固件版本
          - 固件内核版本：**${{ env.VERSION_KERNEL }}**
          - 固件编译前最后一次➦[主源码](${{ matrix.REPO_URL }})更新记录
          - ${{ env.VERSION_INFO }}

    - name: Delete Old Cache(删除旧缓存)
      run: |
        # 获取缓存列表并删除
        gh cache list --key ${{ env.SOURCE_REPO }}-${{ matrix.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-${{ matrix.REPO_SHORT }}-${{ matrix.CONFIG_TYPE }}- --json key --jq '.[] | .key' | while read -r key; do
          gh cache delete "$key"
        done
        # 输出缓存状态
        echo "========cache status========"
        echo "ccache: $(du -sh $OPENWRT_PATH/.ccache | cut -f 1)"
        echo "staging: $(du -sh $OPENWRT_PATH/staging_dir | cut -f 1)"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
