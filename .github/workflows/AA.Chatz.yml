name: AA.ChatZ

on:
  workflow_dispatch:
  workflow_call:
  # schedule:
  #   - cron: * 16 * * 4

env:
  CLASH_KERNEL: amd64
  UPLOAD_BIN_DIR: false
  FIRMWARE_RELEASE: true
  FIRMWARE_TAG: ipq60xx.ChatZ
  TZ: Asia/Shanghai

jobs:
  Build:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        REPO_SHORT: ['ImmWrt', 'OpenWrt', 'LibWrt']
        CONFIG_TYPE: ['Pro', 'Max', 'Ultra']
        include:
          - REPO_SHORT: 'ImmWrt'
            url: 'https://github.com/laipeng668/immortalwrt.git'
            branch: 'master'
          - REPO_SHORT: 'OpenWrt'
            url: 'https://github.com/laipeng668/openwrt.git'
            branch: 'master'
          - REPO_SHORT: 'LibWrt'
            url: 'https://github.com/laipeng668/openwrt-6.x.git'
            branch: 'k6.12-nss'
    
    name: Build ${{ matrix.REPO_SHORT }}-${{ matrix.CONFIG_TYPE }}
    
    steps:
    - name: Check Server Performance(检查服务器性能)
      run: |
        echo "警告⚠"
        echo "分配的服务器性能有限，若选择的插件过多，务必注意CPU性能！"
        echo -e "已知CPU型号（降序）：7763，8370C，8272CL，8171M，E5-2673 \n"
        echo "--------------------------CPU信息--------------------------"
        echo "CPU物理数量：$(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
        echo -e "CPU核心信息：$(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c) \n"
        echo "--------------------------内存信息--------------------------"
        echo "已安装内存详细信息："
        echo -e "$(sudo lshw -short -C memory | grep GiB) \n"
        echo "--------------------------硬盘信息--------------------------"
        echo "硬盘数量：$(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT

    - name: Initialization Environment(初始化环境)
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -y update
        sudo -E apt-get -y install $(curl -fsSL is.gd/depends_ubuntu_2204)
        sudo -E systemctl daemon-reload
        sudo -E apt-get -y autoremove --purge
        sudo -E apt-get -y clean
        sudo timedatectl set-timezone "$TZ"

    - name: Checkout(检出代码)
      uses: actions/checkout@main

    - name: Clone Source Code(克隆源代码)
      run: |
        df -hT $GITHUB_WORKSPACE
        sudo mkdir -p /mnt/openwrt
        sudo chown -R $(id -u):$(id -g) /mnt/openwrt
        git clone --depth 1 -b ${{ matrix.branch }} --single-branch ${{ matrix.url }} /mnt/openwrt
        cd /mnt/openwrt
        echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV
        VERSION_INFO=$(git show -s --date=short --format="作者: %an<br/>时间: %cd<br/>内容: %s<br/>hash: %H")
        echo "VERSION_INFO=$VERSION_INFO" >> $GITHUB_ENV
        VERSION_KERNEL=$(grep -oP 'LINUX_KERNEL_HASH-\K[0-9]+\.[0-9]+\.[0-9]+' target/linux/generic/kernel-6.12)
        echo "VERSION_KERNEL=$VERSION_KERNEL" >> $GITHUB_ENV

    - name: Generate Variables(生成变量)
      run: |
        cp configs/ipq60xx_${{ matrix.CONFIG_TYPE }}.config $OPENWRT_PATH/.config
        cd $OPENWRT_PATH
        make defconfig > /dev/null 2>&1
        SOURCE_REPO="$(echo ${{ matrix.url }} | awk -F '/' '{print $(NF)}')"
        echo "SOURCE_REPO=$SOURCE_REPO" >> $GITHUB_ENV
        DEVICE_TARGET=$(cat .config | grep CONFIG_TARGET_BOARD | awk -F '"' '{print $2}')
        echo "DEVICE_TARGET=$DEVICE_TARGET" >> $GITHUB_ENV
        DEVICE_SUBTARGET=$(cat .config | grep CONFIG_TARGET_SUBTARGET | awk -F '"' '{print $2}')
        echo "DEVICE_SUBTARGET=$DEVICE_SUBTARGET" >> $GITHUB_ENV
        echo "HASH=$(git log -1 --pretty=format:'%h')" >> $GITHUB_ENV
        echo "CACHE_DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV

    - name: Cache Toolchain(缓存工具链)
      uses: actions/cache@main
      with:
        key: ${{ env.SOURCE_REPO }}-${{ matrix.branch }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-${{ env.HASH }} ${{ env.CACHE_DATE }}
        restore-keys: ${{ env.SOURCE_REPO }}-${{ matrix.branch }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-
        path: |
          ${{ env.OPENWRT_PATH }}/.ccache
          ${{ env.OPENWRT_PATH }}/staging_dir

    - name: Refresh The Cache(刷新缓存)
      run: |
        if [ -d "$OPENWRT_PATH/staging_dir" ]; then
          find "$OPENWRT_PATH/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r dir; do
              find "$dir" -type f -exec touch {} +
          done
        fi

    - name: Install Feeds(安装feeds)
      run: |
        cd $OPENWRT_PATH
        ./scripts/feeds update -a
        ./scripts/feeds install -a
  
    - name: Load Custom Configuration(加载自定义配置)
      run: |
        if [ "${{ matrix.REPO_SHORT }}" == "LibWrt" ]; then
          echo "合并配置文件：configs/ipq60xx_${{ matrix.CONFIG_TYPE }}.config + configs/LibWrt.config"
          cat configs/ipq60xx_${{ matrix.CONFIG_TYPE }}.config configs/LibWrt.config > $OPENWRT_PATH/.config
        else
          cat configs/ipq60xx_${{ matrix.CONFIG_TYPE }}.config > $OPENWRT_PATH/.config
        fi
        chmod +x scripts/Roc-script.sh
        cd $OPENWRT_PATH
        # 运行自定义脚本
        $GITHUB_WORKSPACE/scripts/Roc-script.sh
        # 显示合并后的config列表
        echo "===== 合并后的配置列表 ====="
        cat .config | grep "^CONFIG_" | sort

    - name: Download DL Package(下载DL软件包)
      run: |
        cd $OPENWRT_PATH
        make defconfig
        make download -j$(nproc)
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile Firmware(开始编译固件)
      id: compile
      run: |
        cd $OPENWRT_PATH
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        echo "DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV
        echo "FILE_DATE=$(date +"%Y.%m.%d")" >> $GITHUB_ENV

    - name: Check Space Usage(检查空间使用情况)
      if: (!cancelled())
      run: df -hT

    - name: Upload Bin Directory(上传固件)
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      uses: actions/upload-artifact@main
      with:
        name: ${{ matrix.REPO_SHORT }}-${{ matrix.CONFIG_TYPE }}-bin-${{ env.FILE_DATE }}
        path: ${{ env.OPENWRT_PATH }}/bin

    - name: Organize Files(整理文件)
      if: steps.compile.outputs.status == 'success'
      run: |
        cd $OPENWRT_PATH
        # 创建文件和目录清单
        echo "===== $OPENWRT_PATH 文件和目录清单 =====" > oplist.txt
        ls -la >> oplist.txt
        echo "===== 显示oplist.txt内容 ====="
        cat oplist.txt
        
        cd bin/targets/*/*
        
        # 重命名.config文件
        NEW_CONFIG_NAME="${{ matrix.REPO_SHORT }}_${{ matrix.CONFIG_TYPE }}.config"
        echo "重命名 .config 为 $NEW_CONFIG_NAME"
        cp $OPENWRT_PATH/.config "$NEW_CONFIG_NAME"
        
        # 重命名config.buildinfo文件
        NEW_BUILDINFO_NAME="${{ matrix.REPO_SHORT }}${{ matrix.CONFIG_TYPE }}.buildinfo"
        echo "重命名 config.buildinfo 为 $NEW_BUILDINFO_NAME"
        mv config.buildinfo "$NEW_BUILDINFO_NAME"
        
        # 打包ipk和apk包
        echo "创建 ipq60xx.Packages.tar.gz"
        mkdir -p packages
        mv -f $OPENWRT_PATH/bin/packages/*/*/*.apk packages/ 2>/dev/null || true
        mv -f $OPENWRT_PATH/bin/packages/*/*/*.ipk packages/ 2>/dev/null || true
        tar -zcf ipq60xx.Packages.tar.gz packages
        
        # 重命名.bin文件 - 修改后的逻辑
        echo "重命名所有.bin文件"
        for file in *.bin; do
          if [ -f "$file" ]; then
            # 提取设备型号和固件类型部分
            # 示例: immortalwrt-qualcommax-ipq60xx-jdcloud_re-cs-02-squashfs-factory.bin
            # 提取后: jdcloud_re-cs-02-squashfs-factory
            base_name=$(echo "$file" | sed -E 's/.*-ipq60xx-(.*)\.bin/\1/')
            
            # 构建新文件名: jdcloud_re-cs-02-squashfs-factory-ImmWrt-Pro.bin
            newname="${base_name}-${{ matrix.REPO_SHORT }}-${{ matrix.CONFIG_TYPE }}.bin"
            echo "重命名 $file 为 $newname"
            mv "$file" "$newname"
          fi
        done
        
        # 清理不需要的文件
        rm -rf packages feeds.buildinfo version.buildinfo sha256sums profiles.json
        
        echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV

    - name: Upload Config and List Files(上传配置和清单文件)
      if: steps.compile.outputs.status == 'success'
      uses: actions/upload-artifact@main
      with:
        name: ${{ matrix.REPO_SHORT }}-${{ matrix.CONFIG_TYPE }}-config-list-${{ env.FILE_DATE }}
        path: |
          ${{ env.OPENWRT_PATH }}/oplist.txt
          ${{ env.FIRMWARE_PATH }}/${{ matrix.REPO_SHORT }}_${{ matrix.CONFIG_TYPE }}.config
          ${{ env.FIRMWARE_PATH }}/${{ matrix.REPO_SHORT }}${{ matrix.CONFIG_TYPE }}.buildinfo

    - name: Upload Packages(上传软件包)
      if: steps.compile.outputs.status == 'success'
      uses: actions/upload-artifact@main
      with:
        name: ipq60xx-Packages-${{ matrix.REPO_SHORT }}-${{ matrix.CONFIG_TYPE }}-${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE_PATH }}/ipq60xx.Packages.tar.gz

    - name: Upload Firmware To Artifact(将固件上传到Artifact)
      if: steps.compile.outputs.status == 'success' && env.FIRMWARE_RELEASE != 'true'
      uses: actions/upload-artifact@main
      with:
        name: ${{ matrix.REPO_SHORT }}-${{ matrix.CONFIG_TYPE }}-firmware-${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE_PATH }}

    - name: Upload Firmware To Release(发布固件)
      if: steps.compile.outputs.status == 'success' && env.FIRMWARE_RELEASE == 'true'
      uses: ncipollo/release-action@main
      with:
        name: ${{ env.DATE }} for ${{ env.FIRMWARE_TAG }}-${{ matrix.REPO_SHORT }}-${{ matrix.CONFIG_TYPE }}
        allowUpdates: true
        tag: ${{ env.FIRMWARE_TAG }}-${{ matrix.REPO_SHORT }}-${{ matrix.CONFIG_TYPE }}
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: ${{ env.FIRMWARE_PATH }}/*
        body: |
          **This is OpenWrt Firmware for ${{ env.FIRMWARE_TAG }}-${{ matrix.REPO_SHORT }}-${{ matrix.CONFIG_TYPE }}**
          ### 📒 固件信息
          - 这是开启全功能NSS的6.12内核固件，默认主题为Argon；该固件在ImmortalWrt的基础上，添加了额外的软件包cpufreq、ddns、ttyd、upnp、wolplus、samba4、vlmcsd、aria2、autoreboot、uhttpd、wifischedule、frps、frpc、diskman、hd-idle、banip、acme、arpbind、usb-printer、homeproxy、openlist、adguardhome、oaf、sqm、wireguard、watchcat、3cat（**Taiyi**额外增加了filebrowser、dockerman、gecoosac、lucky），并添加了若干工具，具体详见对应机型的config。
          - 💻 这是 ${{ matrix.REPO_SHORT }}-${{ matrix.CONFIG_TYPE }} 平台使用的 OpenWrt 固件
          - ⚽ 固件源码: ${{ matrix.url }}
          - 💝 源码分支: ${{ matrix.branch }}
          - 🌐 默认地址: **192.168.2.1**
          - 🔑 默认密码: none
          - 🚀 WiFi名称: **Star**
          - 🔑 WiFi密码: 12345678
          ### 🧊 固件版本
          - 固件内核版本：**${{ env.VERSION_KERNEL }}**
          - 固件编译前最后一次➦[主源码](${{ matrix.url }})更新记录
          - ${{ env.VERSION_INFO }}

    - name: Delete Old Cache(删除旧缓存)
      run: |
        # 获取缓存列表并删除
        gh cache list --key ${{ env.SOURCE_REPO }}-${{ matrix.branch }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}- --json key --jq '.[] | .key' | while read -r key; do
          gh cache delete "$key"
        done
        # 输出缓存状态
        echo "========cache status========"
        echo "ccache: $(du -sh $OPENWRT_PATH/.ccache | cut -f 1)"
        echo "staging: $(du -sh $OPENWRT_PATH/staging_dir | cut -f 1)"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
