# 整个 workflow: 编译多仓库多配置的 OpenWrt，整理产物并统一上传到同一个 Release
# 说明（高层）：
# - matrix 同时编译 3 个仓库（ImmWrt/OpenWrt/LibWrt）* 3 种配置（Pro/Max/Ultra）
# - 在 LibWrt 情况下会把 configs/ipq60xx_${CONFIG_TYPE}.config 与 configs/LibWrt.config 合并
# - 仅在 bin/targets/*/* 目录中重命名最终的固件（factory/sysupgrade 等），避免修改 build_dir 中的中间产物
# - 整理好的文件先作为 artifacts 上传（每个矩阵项一个 artifact），最后由 publish job 下载所有 artifacts 并一次性上传到单个 Release
# - 全局环境变量 FIRMWARE_TAG 用于 Release 命名与说明
on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  # 固定固件标识（Release 名称会引用）
  FIRMWARE_TAG: "ipq60xx.Copilot"

jobs:
  build:
    name: Build ${{ matrix.repo.repo_short }}:${{ matrix.repo.repo_branch }} - ${{ matrix.config_type }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 这里定义要编译的三个仓库与分支
        repo:
          - repo_short: "ImmWrt"
            repo_url: "https://github.com/laipeng668/immortalwrt.git"
            repo_branch: "master"
          - repo_short: "OpenWrt"
            repo_url: "https://github.com/laipeng668/openwrt.git"
            repo_branch: "master"
          - repo_short: "LibWrt"
            repo_url: "https://github.com/laipeng668/openwrt-6.x.git"
            repo_branch: "k6.12-nss"
        # 三种配置类型
        config_type: [ "Pro", "Max", "Ultra" ]
      fail-fast: false

    env:
      # 在步骤中方便引用的环境变量
      REPO_SHORT: ${{ matrix.repo.repo_short }}
      REPO_URL: ${{ matrix.repo.repo_url }}
      REPO_BRANCH: ${{ matrix.repo.repo_branch }}
      CONFIG_TYPE: ${{ matrix.config_type }}
      OPENWRT_PATH: ${{ github.workspace }}/openwrt
      WORKSPACE: ${{ github.workspace }}

    steps:
      - name: Checkout workflow repo (包含 configs 等文件)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Clone target OpenWrt repo
        run: |
          # 清理后克隆指定仓库到 OPENWRT_PATH
          rm -rf "${OPENWRT_PATH}"
          git clone --depth=1 "${REPO_URL}" -b "${REPO_BRANCH}" "${OPENWRT_PATH}"
        shell: bash

      - name: 显示选择的仓库与配置（方便日志查看）
        run: |
          echo "REPO_SHORT=${REPO_SHORT}"
          echo "REPO_URL=${REPO_URL}"
          echo "REPO_BRANCH=${REPO_BRANCH}"
          echo "CONFIG_TYPE=${CONFIG_TYPE}"
          echo "OPENWRT_PATH=${OPENWRT_PATH}"
        shell: bash

      - name: 准备 .config（如果是 LibWrt 则合并）
        run: |
          # CONFIG_SRC: workflow 仓库中的基础配置文件
          CONFIG_SRC="${WORKSPACE}/configs/ipq60xx_${CONFIG_TYPE}.config"
          LIB_CONFIG="${WORKSPACE}/configs/LibWrt.config"
          TARGET_CONFIG="${OPENWRT_PATH}/.config"

          echo "使用的基础配置: ${CONFIG_SRC}"
          if [ "${REPO_SHORT}" = "LibWrt" ]; then
            # 当目标是 LibWrt 时，把两个 config 合并
            echo "检测到 LibWrt：将 ${CONFIG_SRC} 与 ${LIB_CONFIG} 合并为 ${TARGET_CONFIG}"
            cat "${CONFIG_SRC}" > "${TARGET_CONFIG}"
            echo "" >> "${TARGET_CONFIG}"
            cat "${LIB_CONFIG}" >> "${TARGET_CONFIG}"
            echo "合并后的 .config（前200行）："
            sed -n '1,200p' "${TARGET_CONFIG}" || true
            echo "合并后的配置项（去注释、去空行并去重）:"
            grep -v '^#' "${TARGET_CONFIG}" | sed '/^\s*$/d' | sort -u || true
          else
            # 其余仓库直接复制
            echo "复制 ${CONFIG_SRC} 到 ${TARGET_CONFIG}"
            cp "${CONFIG_SRC}" "${TARGET_CONFIG}" || true
            echo ".config（前200行）："
            sed -n '1,200p' "${TARGET_CONFIG}" || true
          fi
        shell: bash

      - name: 更新 feeds（若存在）并准备构建
        run: |
          set -e
          cd "${OPENWRT_PATH}"
          if [ -f scripts/feeds ]; then
            # 更新并安装所有 feeds（如果出错仍继续，某些仓库可能不需要）
            scripts/feeds update -a || true
            scripts/feeds install -a || true
          fi
        shell: bash

      - id: compile
        name: Compile OpenWrt (执行 make)
        # 编译步骤：我们捕获编译的返回码，并把状态写到步骤输出中（成功/失败）
        run: |
          set -e
          cd "${OPENWRT_PATH}"

          # 如果存在 .config，则运行 defconfig 以确保配置被应用
          if [ -f .config ]; then
            echo "运行 make defconfig 以应用 .config ..."
            make defconfig || true
          fi

          # 开始编译（并捕获返回码）
          echo "开始 make -j$(nproc) ..."
          make -j$(nproc)
          rc=$?
          if [ $rc -eq 0 ]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
            echo "编译成功 (make 返回 0)"
          else
            echo "status=failure" >> "$GITHUB_OUTPUT"
            echo "编译返回非 0（失败或部分失败），已记录状态，后续整理步骤将按条件运行"
          fi

          # 注意：此处不以非 0 退出，这样 workflow 可以继续到整理与上传步骤（根据 status 决定是否执行）
          exit 0
        shell: bash

      - name: 生成 OPENWRT_PATH 的文件/目录清单（oplist.txt）
        if: always()
        run: |
          cd "${OPENWRT_PATH}"
          echo "===== ${OPENWRT_PATH} 文件和目录清单 =====" > "${WORKSPACE}/oplist.txt"
          # 递归列出（大文件树可能很长）
          ls -laR . >> "${WORKSPACE}/oplist.txt" || true
          echo "===== oplist.txt 前200行 ====="
          sed -n '1,200p' "${WORKSPACE}/oplist.txt" || true
        shell: bash

      - name: Organize Files(整理文件)
        if: steps.compile.outputs.status == 'success'
        # 仅在编译成功时执行本步骤（用户要求）
        run: |
          # 严格模式：未定义变量会导致脚本失败，便于尽早发现问题
          set -euo pipefail
          # shopt 用来启用 nullglob（没有匹配文件时，glob 不返回原始模式）
          shopt -s nullglob 2>/dev/null || true

          # 进入 OpenWrt 输出根目录
          cd "${OPENWRT_PATH}"

          # 1) 复制 .config 到 OPENWRT_PATH 根，命名为 REPO_SHORT_CONFIGTYPE.config，保留原文件
          NEW_CONFIG_NAME="${REPO_SHORT}_${CONFIG_TYPE}.config"
          echo "将 .config 复制为 ${NEW_CONFIG_NAME}（保留原 .config）"
          if [ -f ".config" ]; then
            cp -a ".config" "${OPENWRT_PATH}/${NEW_CONFIG_NAME}" || true
          else
            echo "警告：未在 ${OPENWRT_PATH} 找到 .config"
          fi

          # 2) 遍历每个目标输出目录（bin/targets/*/*），只在这些目录中处理最终镜像
          #    这样可以避免改动 build_dir/ 中的中间产物（例如 ath12k 固件）。
          FIRST_TARGET=""
          for target_dir in bin/targets/*/*; do
            [ -d "${target_dir}" ] || continue
            echo "处理目标输出目录: ${target_dir}"

            # 记录第一个找到的 target 目录，稍后作为 FIRMWARE_PATH 写入环境
            if [ -z "${FIRST_TARGET}" ]; then
              FIRST_TARGET="$(pwd)/${target_dir}"
            fi

            # 进入该目标目录开始处理
            pushd "${target_dir}" >/dev/null

            # 3) 如果存在 config.buildinfo，把它移动到 OPENWRT_PATH 并重命名为 REPOSHORTCONFIGTYPE.buildinfo
            if [ -f config.buildinfo ]; then
              NEW_BUILDINFO_NAME="${REPO_SHORT}${CONFIG_TYPE}.buildinfo"
              echo "移动并重命名 config.buildinfo -> ${OPENWRT_PATH}/${NEW_BUILDINFO_NAME}"
              mv -f config.buildinfo "${OPENWRT_PATH}/${NEW_BUILDINFO_NAME}" || true
            else
              echo "信息：此目录无 config.buildinfo"
            fi

            # 4) 打包当前目标/全局的 ipk 和 apk 为 ipq60xx.Packages.tar.gz（放到 OPENWRT_PATH）
            echo "收集 .ipk/.apk 并创建 ${OPENWRT_PATH}/ipq60xx.Packages.tar.gz"
            PKG_TMP="$(mktemp -d)"
            # 在当前目录查找包
            find . -type f \( -iname '*.ipk' -o -iname '*.apk' \) -print0 \
              | xargs -0 -I{} bash -lc 'mkdir -p "'"${PKG_TMP}"'"/$(dirname "{}"); cp -a "{}" "'"${PKG_TMP}"'"/"{}"' || true
            # 如果当前目录没有找到，再从全局 bin/packages 采集
            if [ "$(find "${PKG_TMP}" -type f | wc -l)" -eq 0 ]; then
              find "${OPENWRT_PATH}/bin/packages" -type f \( -iname '*.ipk' -o -iname '*.apk' \) -print0 \
                | xargs -0 -I{} bash -lc 'mkdir -p "'"${PKG_TMP}"'"/$(dirname "{}"); cp -a "{}" "'"${PKG_TMP}"'"/"{}"' || true
            fi
            # 生成归档（若没有文件也会生成一个空的 tar）
            tar -C "${PKG_TMP}" -czf "${OPENWRT_PATH}/ipq60xx.Packages.tar.gz" . || true
            rm -rf "${PKG_TMP}" || true

            # 5) 重命名该目录下的最终 .bin 镜像（只处理当前目录的 *.bin，避免误改中间产物）
            echo "在 ${target_dir} 内重命名最终 .bin 文件（示例：openwrt-qualcommax-ipq60xx-jdcloud_re-cs-02-squashfs-factory.bin）"
            for file in *.bin; do
              [ -f "${file}" ] || continue

              # 优先匹配 "-ipq60xx-" 后的部分（覆盖你的示例）
              if [[ "${file}" =~ -ipq60xx-(.+)\.bin$ ]]; then
                base_name="${BASH_REMATCH[1]}"
              else
                # 次选：提取包含 squashfs 的尾段（如 re-*-squashfs-*-factory/sysupgrade）
                base_name=$(echo "${file}" | sed -n 's/.*-\([^/]*squashfs[^/]*\)\.bin$/\1/p' || true)
                if [ -z "${base_name}" ]; then
                  # 兜底：使用不带扩展名的整个文件名（保证唯一识别，但不优雅）
                  base_name="${file%.bin}"
                fi
              fi

              # 目标格式: <core>-<REPO_SHORT>-<CONFIG_TYPE>.bin
              newname="${base_name}-${REPO_SHORT}-${CONFIG_TYPE}.bin"

              # 如果目标名已存在，追加时间戳，避免覆盖
              if [ -e "${newname}" ]; then
                ts=$(date +%s)
                newname="${base_name}-${REPO_SHORT}-${CONFIG_TYPE}-${ts}.bin"
              fi

              echo "  重命名: ${file} -> ${newname}"
              mv -f -- "${file}" "${newname}" || echo "  警告: mv 失败: ${file}"
            done

            # 列出当前目录的文件供验证（最多显示前200行）
            echo "重命名后当前目录文件:"
            ls -lah | sed -n '1,200p' || true

            popd >/dev/null
          done

          # 6) 清理一些不必要的根文件（如存在）
          echo "删除可能不需要的文件：feeds.buildinfo version.buildinfo sha256sums profiles.json"
          rm -f "${OPENWRT_PATH}/feeds.buildinfo" "${OPENWRT_PATH}/version.buildinfo" "${OPENWRT_PATH}/sha256sums" "${OPENWRT_PATH}/profiles.json" || true

          # 7) 设置 FIRMWARE_PATH 环境变量，供后续步骤（如发布）使用
          if [ -n "${FIRST_TARGET}" ]; then
            echo "FIRMWARE_PATH=${FIRST_TARGET}" >> "$GITHUB_ENV"
            echo "设置 FIRMWARE_PATH=${FIRST_TARGET}"
          else
            echo "未找到 bin/targets/*/* 下的目标输出目录，FIRMWARE_PATH 将指向 ${OPENWRT_PATH}"
            echo "FIRMWARE_PATH=${OPENWRT_PATH}" >> "$GITHUB_ENV"
          fi
        shell: bash

      - name: Show summary (上传前的文件预览)
        if: steps.compile.outputs.status == 'success'
        run: |
          echo "oplist.txt 在: ${WORKSPACE}/oplist.txt"
          echo "工作区文件预览（前200行）："
          ls -lah "${WORKSPACE}" | sed -n '1,200p' || true

          echo "复制的 config:"
          ls -lah "${OPENWRT_PATH}/${REPO_SHORT}_${CONFIG_TYPE}.config" 2>/dev/null || true

          echo "重命名后的 buildinfo:"
          ls -lah "${OPENWRT_PATH}/${REPO_SHORT}${CONFIG_TYPE}.buildinfo" 2>/dev/null || true

          echo "Packages 归档:"
          ls -lah "${OPENWRT_PATH}/ipq60xx.Packages.tar.gz" 2>/dev/null || true

          echo "FIRMWARE_PATH 内容（若已设置）:"
          if [ -n "${FIRMWARE_PATH:-}" ]; then
            ls -lah "${FIRMWARE_PATH}" | sed -n '1,200p' || true
          else
            echo "FIRMWARE_PATH 未设置"
          fi
        shell: bash

      - name: Upload oplist.txt
        if: steps.compile.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.repo.repo_short }}_${{ matrix.config_type }}-oplist"
          path: "${WORKSPACE}/oplist.txt"

      - name: Upload renamed .config
        if: steps.compile.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.repo.repo_short }}_${{ matrix.config_type }}.config"
          path: "${OPENWRT_PATH}/${REPO_SHORT}_${CONFIG_TYPE}.config"
          if-no-files-found: ignore

      - name: Upload renamed buildinfo
        if: steps.compile.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.repo.repo_short }}_${{ matrix.config_type }}.buildinfo"
          path: "${OPENWRT_PATH}/${REPO_SHORT}${CONFIG_TYPE}.buildinfo"
          if-no-files-found: ignore

      - name: Upload ipq60xx.Packages.tar.gz
        if: steps.compile.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: "ipq60xx.Packages.tar.gz.${{ matrix.repo.repo_short }}_${{ matrix.config_type }}"
          path: "${OPENWRT_PATH}/ipq60xx.Packages.tar.gz"
          if-no-files-found: ignore

      - name: Upload renamed firmware .bin files (如果存在)
        if: steps.compile.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          # 上传所有在 bin/targets/** 下按我们规则重命名后的固件（名称包含 REPO_SHORT-CONFIG_TYPE）
          name: "${{ matrix.repo.repo_short }}_${{ matrix.config_type }}-firmware-bins"
          path: |
            ${{ github.workspace }}/openwrt/bin/**/${{ matrix.repo.repo_short }}-${{ matrix.config_type }}*.bin
          if-no-files-found: ignore

  publish:
    name: Create single Release and upload all artifacts
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Set DATE for release name (UTC 日期)
        run: |
          # 生成 UTC 日期，例如 2025-08-21
          echo "DATE=$(date -u +%F)" >> $GITHUB_ENV
          echo "DATE set to $(date -u +%F)"
        shell: bash

      - name: Download all artifacts from this workflow run（聚合所有矩阵项）
        uses: actions/download-artifact@v4
        with:
          path: downloaded_artifacts

      - name: Prepare release_assets 目录（把下载的 artifacts 平铺并去重前缀）
        run: |
          set -euo pipefail
          ASSET_DIR="${{ github.workspace }}/release_assets"
          rm -rf "${ASSET_DIR}"
          mkdir -p "${ASSET_DIR}"
          # downloaded_artifacts 目录中每个子目录对应一个 artifact，我们把每个文件复制出来并加上 artifact 名为前缀以避免冲突
          for ART in downloaded_artifacts/*; do
            if [ -d "${ART}" ]; then
              ARTNAME=$(basename "${ART}")
              find "${ART}" -type f -print0 | while IFS= read -r -d '' f; do
                BN=$(basename "${f}")
                # 采用 ARTNAME_BASENAME 的方式命名以避免不同 artifact 同名文件冲突
                cp -a "${f}" "${ASSET_DIR}/${ARTNAME}_${BN}" || true
              done
            fi
          done
          echo "已收集到 release_assets:"
          find "${ASSET_DIR}" -type f -print || true
        shell: bash

      - name: Build release body (在 Release 中显示的文档)
        run: |
          BODY="${{ github.workspace }}/release_body.md"
          cat > "${BODY}" <<'EOF'
          **This is OpenWrt Firmware for ${FIRMWARE_TAG}**

          ### 📒 固件信息
          - 这是开启全功能NSS的6.12内核固件，默认主题为Argon；该固件在ImmortalWrt的基础上，添加了额外的软件包cpufreq、ddns、ttyd、upnp、wolplus、samba4、vlmcsd、aria2、autoreboot、uhttpd、wifischedule、frps、frpc、diskman、hd-idle、banip、acme、arpbind、usb-printer、homeproxy、openlist、adguardhome、oaf、sqm、wireguard、watchcat、3cat（**Taiyi**额外增加了filebrowser、dockerman、gecoosac、lucky），并添加了若干工具，具体详见对应机型的config。
          - 🌐 默认地址: **192.168.2.1**
          - 🔑 默认密码: none
          - 🚀 WiFi名称: **Star**
          - 🔑 WiFi密码: 12345678

          ### 📦 包含的文件（自动列出）
          EOF
          # 列出 release_assets 中包含的所有文件名，加入 body
          for f in release_assets/*; do
            echo "- $(basename "${f}")" >> "${BODY}"
          done
          echo "Release 描述文件已准备: ${BODY}"
        shell: bash

      - name: Create or update single GitHub Release and upload assets (使用 REST API)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"
          TAG="${FIRMWARE_TAG}-${DATE}"
          TITLE="${DATE} for ${FIRMWARE_TAG}"
          BODY_FILE="${{ github.workspace }}/release_body.md"
          API="https://api.github.com/repos/${REPO}/releases"

          echo "检查 Release（tag=${TAG}）是否已存在..."
          # 先通过 tag 查询（如果返回有 id，说明已存在）
          resp=$(curl -s -H "Authorization: token ${GITHUB_TOKEN}" "${API}/tags/${TAG}" || true)
          release_id=$(echo "$resp" | jq -r .id 2>/dev/null || true)

          if [ -n "$release_id" ] && [ "$release_id" != "null" ]; then
            echo "Release 已存在 id=${release_id}，后续将把文件上传到该 Release"
            # 获取 upload_url
            upload_url=$(curl -s -H "Authorization: token ${GITHUB_TOKEN}" "${API}/${release_id}" | jq -r .upload_url)
          else
            echo "Release 不存在，正在创建新的 Release..."
            create_resp=$(curl -s -X POST -H "Authorization: token ${GITHUB_TOKEN}" \
              -H "Content-Type: application/json" \
              -d @- "${API}" <<EOF
{
  "tag_name": "${TAG}",
  "name": "${TITLE}",
  "body": "$(sed 's/"/\\"/g' "${BODY_FILE}")",
  "draft": false,
  "prerelease": false
}
EOF
)
            release_id=$(echo "$create_resp" | jq -r .id)
            upload_url=$(echo "$create_resp" | jq -r .upload_url)
            if [ -z "$release_id" ] || [ "$release_id" = "null" ]; then
              echo "创建 Release 失败，返回信息: $create_resp"
              exit 1
            fi
            echo "创建 Release 成功，id=${release_id}"
          fi

          # upload_url 中包含模板部分，去除花括号
          UPLOAD_URL_TEMPLATE="${upload_url%%\{*}"
          echo "上传 URL: ${UPLOAD_URL_TEMPLATE}"

          # 上传 release_assets 下所有文件（逐个上传）
          for asset in release_assets/*; do
            [ -f "$asset" ] || continue
            filename=$(basename "$asset")
            echo "上传 ${filename} ..."
            # 使用 URL encode 的名字参数
            curl --silent --show-error -X POST \
              -H "Authorization: token ${GITHUB_TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"${asset}" \
              "${UPLOAD_URL_TEMPLATE}?name=$(printf '%s' "${filename}" | jq -s -R -r @uri)" \
              | jq -r '.name' || true
          done

          # 列出已上传的 asset 名称以便检查
          echo "已上传的 Release 资产列表:"
          curl -s -H "Authorization: token ${GITHUB_TOKEN}" "${API}/${release_id}" | jq -r '.assets[]?.name' || true
        shell: bash

      - name: Verify release exists (调试/确认)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${FIRMWARE_TAG}-${DATE}"
          echo "列出 Release ${TAG} 的资产（确认）:"
          curl -s -H "Authorization: token ${GITHUB_TOKEN}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}" | jq -r '.assets[]?.name' || true
        shell: bash
